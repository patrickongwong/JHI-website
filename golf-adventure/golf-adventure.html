<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JHI Golf Adventure</title>
    <link rel="icon" type="image/png" href="../assets/wheel.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Georgia, serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            width: min(1200px, 96vw);
            padding: 8px 0;
            align-items: center;
        }
        .title { font-size: 1.2rem; color: #c9a84c; letter-spacing: 2px; }
        .info { display: flex; gap: 20px; font-size: 0.9rem; color: rgba(255,255,255,0.6); }
        .info strong { color: #c9a84c; }
        #gameCanvas {
            border-radius: 8px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.5);
            touch-action: none;
        }
        .controls-hint {
            width: min(1200px, 96vw);
            padding: 8px 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            display: flex;
            justify-content: space-between;
        }
        .mobile-controls {
            display: none;
            width: min(1200px, 96vw);
            justify-content: space-between;
            padding: 8px 0;
            gap: 8px;
        }
        .mobile-btn {
            flex: 1;
            padding: 18px 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-family: Georgia, serif;
            text-align: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-btn:active { background: rgba(201,168,76,0.25); border-color: #c9a84c; color: #c9a84c; }
        .mobile-btn.hit-btn { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); color: #c9a84c; font-weight: bold; }
        .mobile-btn.hit-btn:active { background: rgba(201,168,76,0.4); }
        @media (pointer: coarse) {
            .mobile-controls { display: flex; }
            .controls-hint { display: none; }
        }
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(4px);
        }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 2.2rem; color: #c9a84c; margin-bottom: 8px; }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 20px; font-size: 1.1rem; }
        .overlay button {
            padding: 14px 40px; background: #c9a84c; color: #1a472a;
            border: none; border-radius: 6px; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; font-family: Georgia, serif;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .overlay button:hover { background: #e0c872; }
        .overlay button + button { margin-left: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">JHI GOLF ADVENTURE</div>
    <div class="info">
        <span id="heartsDisplay"></span>
        <span>Hole <strong id="holeNum">1</strong>/8</span>
        <span>Par <strong id="parNum">3</strong></span>
        <span>Strokes <strong id="strokeNum">0</strong></span>
        <span id="coinDisplay" style="color:#c9a84c;">0 coins</span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls-hint">
    <span>A/D or Arrow Keys to move | W or Up to jump | Click &amp; drag near ball to hit</span>
    <span id="statusText"></span>
</div>

<div class="mobile-controls">
    <div class="mobile-btn" id="btnLeft">&#9664; LEFT</div>
    <div class="mobile-btn" id="btnJump">&#9650; JUMP</div>
    <div class="mobile-btn hit-btn" id="btnHit">&#9971; HIT</div>
    <div class="mobile-btn" id="btnRight">RIGHT &#9654;</div>
</div>

<div class="overlay hidden" id="holeOverlay">
    <h2 id="holeMsg">Nice!</h2>
    <p id="holeSummary"></p>
    <button id="nextBtn">Next Hole</button>
</div>

<div class="overlay hidden" id="endOverlay">
    <h2>Round Complete!</h2>
    <p id="endSummary"></p>
    <button id="shareBtn">Share Score</button>
    <button id="replayBtn">Play Again</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    const maxW = 1200, maxH = 600;
    const vw = window.innerWidth * 0.96;
    const vh = window.innerHeight * 0.58;
    canvas.width = Math.min(maxW, vw);
    canvas.height = Math.min(maxH, vh);
    // Scale factor for element sizes
    S = canvas.width / 800;
}
let S = 1;
resize();
window.addEventListener('resize', resize);

// ==================== CONSTANTS ====================
const GRAVITY = 0.45;
const PLAYER_SPEED = 3.8;
const JUMP_FORCE = -10.5;
const BALL_AIR_DRAG = 0.998;
const BALL_GROUND_FRICTION = 0.985;
const BALL_BOUNCE = 0.5;
const MAX_HIT_POWER = 16;
const HIT_RANGE = 50;

// ==================== LEVEL DEFINITIONS ====================
const levels = [

            { x: 500, hp: 2, patrol: [450, 600] },

        par: 4,

    },
    { // Hole 8 - Storm: The Gauntlet
        par: 5,
        playerStart: { x: 40, y: 0 },

        terrain: [
            { x: 0, y: 0, w: 300, h: 0 },
            { x: 300, y: 0, w: 150, h: -40 },
            { x: 450, y: -40, w: 200, h: 0 },
            { x: 750, y: -20, w: 150, h: 0 },
            { x: 1000, y: -50, w: 100, h: 0 },
            { x: 1100, y: -50, w: 50, h: 0 },
            { x: 1150, y: -50, w: 300, h: 0 }
        ],
        platforms: [
            { x: 650, y: -40, w: 80 },
            { x: 900, y: -35, w: 80 }
        ],
        water: [{ x: 650, w: 100 }, { x: 1100, w: 50 }],
        sand: [{ x: 500, w: 80 }],
        enemies: [
            { x: 500, hp: 4, patrol: [460, 640] },
            { x: 800, hp: 5, patrol: [750, 890] },
            { x: 1200, hp: 5, patrol: [1150, 1350] }
        ]
    }
];

// ==================== GAME STATE ====================
let currentHole = 0;
let strokes = 0;
let scores = [];
let cameraX = 0;
let gameTime = 0;

// ==================== EQUIPMENT & ECONOMY ====================
// Reset coins and equipment on every fresh load — no farming by reloading
let coins = 0;
let gameMode = 'play'; // 'play' or 'shop'

const equipment = { club: 0, shaft: 0, boots: 0, shirt: 0 };

// Clear any stale saved state
localStorage.removeItem('jhi-golf-coins');
localStorage.removeItem('jhi-equip-club');
localStorage.removeItem('jhi-equip-shaft');
localStorage.removeItem('jhi-equip-boots');
localStorage.removeItem('jhi-equip-shirt');

function saveProgress() {
    // No-op: coins and equipment are session-only to prevent reload farming
}

// ==================== CHARACTER ====================
let hasCompletedGame = localStorage.getItem('jhi-golf-completed') === 'true';
let patrickUnlocked = localStorage.getItem('jhi-patrick-unlocked') === 'true';
let activeCharacter = localStorage.getItem('jhi-active-character') || 'jj'; // 'jj' or 'patrick'
let psychicMode = false; // when Patrick is active and player is "hitting"
let psychicBallTarget = null; // {x, y} where cursor is pointing

// Cheat code system
let cheatCodeMode = false;
let cheatCodeInput = '';
let teleportAnim = null; // { x, y, frame, maxFrames }

function saveCharacterState() {
    localStorage.setItem('jhi-golf-completed', hasCompletedGame);
    localStorage.setItem('jhi-patrick-unlocked', patrickUnlocked);
    localStorage.setItem('jhi-active-character', activeCharacter);
}

const CLUB_TIERS = [
    { name: 'Copper', power: 1.0, damage: 1, color: '#b87333' },
    { name: 'Silver', power: 1.2, damage: 2, color: '#c0c0c0' },
    { name: 'Steel',  power: 1.4, damage: 3, color: '#71797E' },
    { name: 'Gold',   power: 1.7, damage: 4, color: '#c9a84c' },
    { name: 'Diamond',power: 2.0, damage: 5, color: '#b9f2ff' }
];

const SHAFT_TIERS = [
    { name: 'Standard', color: '#ccc' },
    { name: 'Autoflex', color: '#ff69b4' }
];

const BOOT_TIERS = [
    { name: 'Standard',    maxJumps: 1, color: '#2a2a2a', wings: false },
    { name: 'Double-Jump', maxJumps: 2, color: '#4a3a2a', wings: false },
    { name: 'Triple-Jump', maxJumps: 3, color: '#5a4a3a', wings: false },
    { name: 'Flying',      maxJumps: Infinity, color: '#eee', wings: true }
];

const SHIRT_TIERS = [
    { name: 'Plain White',    hearts: 2, colors: ['#f0f0f0','#e8e8e8','#ddd'] },
    { name: 'Navy Polo',      hearts: 3, colors: ['#4080b8','#3a6fa8','#2d5a8c'] },
    { name: 'Striped',        hearts: 4, colors: ['#3a5a8c','#f0f0f0','#3a5a8c'] },
    { name: 'Gold-Trimmed',   hearts: 5, colors: ['#2d5a8c','#3a6fa8','#c9a84c'] },
    { name: 'Diamond Argyle', hearts: 6, colors: ['#1a1a3a','#b9f2ff','#1a1a3a'] }
];

const SHOP_PRICES = {
    club:  [0, 3, 5, 8, 12],
    shaft: [0, 6],
    boots: [0, 4, 7, 12],
    shirt: [0, 3, 5, 8, 12]
};

function getMaxHearts() { return SHIRT_TIERS[equipment.shirt].hearts; }
function getMaxJumps() { return BOOT_TIERS[equipment.boots].maxJumps; }
function getClubPower() { return CLUB_TIERS[equipment.club].power; }
function getClubDamage() { return CLUB_TIERS[equipment.club].damage; }

// ==================== WIND ====================
let wind = { direction: 0, strength: 0 };

function initWind() {
    const tod = getTimeOfDay();
    if (tod === 'storm') {
        wind.direction = Math.random() < 0.5 ? -1 : 1;
        wind.strength = 0.08 + Math.random() * 0.04;
    } else {
        wind.direction = 0;
        wind.strength = 0;
    }
}

// ==================== ENEMIES ====================
let activeEnemies = [];
let sandProjectiles = [];

function initEnemies() {
    const level = levels[currentHole];
    const baseY = canvas.height - 80 * S;
    activeEnemies = (level.enemies || []).map(e => {
        const gy = getGroundY(e.x);
        return {
            x: e.x,
            y: gy !== null ? gy : baseY,
            hp: e.hp,
            maxHp: e.hp,
            patrol: e.patrol,
            dir: 1,
            speed: getTimeOfDay() === 'storm' ? 1.5 : 1,
            throwCooldown: 120 + Math.random() * 60,
            frame: 0,
            dead: false,
            deathTimer: 0
        };
    });
    sandProjectiles = [];
}

function updateEnemies() {
    const tod = getTimeOfDay();
    const attackRange = 300;

    activeEnemies.forEach(e => {
        if (e.dead) {
            e.deathTimer--;
            return;
        }

        // Patrol
        e.x += e.dir * e.speed;
        if (e.x <= e.patrol[0]) e.dir = 1;
        if (e.x >= e.patrol[1]) e.dir = -1;
        e.frame += 0.05;

        const gy = getGroundY(e.x);
        if (gy !== null) e.y = gy;

        // Throw sand
        e.throwCooldown = Math.max(0, e.throwCooldown - 1);
        const dist = Math.abs(player.x - e.x);
        if (dist < attackRange && e.throwCooldown <= 0) {
            const angle = Math.atan2(
                (player.y + player.h / 2) - (e.y - 20),
                player.x - e.x
            );
            const throwSpeed = 4;
            sandProjectiles.push({
                x: e.x,
                y: e.y - 20,
                vx: Math.cos(angle) * throwSpeed,
                vy: Math.sin(angle) * throwSpeed - 2,
                damage: tod === 'storm' ? 2 : 1
            });
            e.throwCooldown = 120 + Math.random() * 60;
        }

        // Ball collision
        if (ball.active && !ball.sunk) {
            const bdx = ball.x - e.x;
            const bdy = ball.y - (e.y - 15);
            const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
            if (bdist < 20 && (Math.abs(ball.vx) > 1 || Math.abs(ball.vy) > 1)) {
                e.hp -= getClubDamage();
                ball.vx *= 0.5;
                ball.vy *= 0.5;
                spawnParticles(e.x, e.y - 15, '#d4a853', 10, 3);
                if (e.hp <= 0) {
                    e.dead = true;
                    e.deathTimer = 60;
                    spawnParticles(e.x, e.y - 15, '#d4a853', 20, 5);
                }
            }
        }
    });

    activeEnemies = activeEnemies.filter(e => !e.dead || e.deathTimer > 0);
}

function updateSandProjectiles() {
    sandProjectiles.forEach(p => {
        p.vy += GRAVITY * 0.5;
        p.x += p.vx;
        p.y += p.vy;

        const dx = p.x - player.x;
        const dy = p.y - (player.y + player.h / 2);
        if (Math.sqrt(dx * dx + dy * dy) < 20) {
            damagePlayer(p.damage);
            p.hit = true;
            spawnParticles(p.x, p.y, '#d4a853', 6, 2);
        }

        const gy = getGroundY(p.x);
        if ((gy !== null && p.y > gy) || p.y > canvas.height + 20) {
            p.hit = true;
        }
    });
    sandProjectiles = sandProjectiles.filter(p => !p.hit);
}

function getGroundY(x) {
    const level = levels[currentHole];
    const baseY = canvas.height - 80 * S;
    for (const t of level.terrain) {
        if (x >= t.x && x < t.x + t.w) {
            if (t.h === 0) return baseY + t.y;
            const progress = (x - t.x) / t.w;
            return (baseY + t.y) + t.h * progress;
        }
    }
    return null;
}

function getPlatformAt(x, y, vy) {
    const level = levels[currentHole];
    for (const p of (level.platforms || [])) {
        const platY = canvas.height - 80 * S + (p.y || 0);
        if (x >= p.x && x <= p.x + p.w) {
            if (y <= platY && y + vy >= platY - 5) {
                return platY;
            }
        }
    }
    return null;
}

// Player
const player = {
    x: 0, y: 0, vx: 0, vy: 0,
    w: 20, h: 50,
    onGround: false, facing: 1,
    walking: false, walkFrame: 0,
    hp: 2, maxHp: 2,
    jumpsLeft: 1,
    jumpHeld: false,
    buyHeld: false,
    invincible: 0
};

// Ball
const ball = {
    x: 0, y: 0, vx: 0, vy: 0, r: 7,
    onGround: false, active: true, sunk: false,
    justHit: 0 // grace frames after hit
};

// Hole target
const hole = { x: 0, y: 0, r: 15 };

// Aim state
let aiming = false;
let aimStart = { x: 0, y: 0 };
let aimEnd = { x: 0, y: 0 };

// Mobile auto-hit state
let mobileHitMode = false;
let mobileAimAngle = 0;
let mobileAimPower = 0;
let mobileAimDir = 1;
let mobileAimPhase = 'angle'; // 'angle' or 'power'

// Input
const keys = {};

// Particles
let particles = [];

function spawnParticles(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = (Math.random() * 0.5 + 0.5) * speed;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - Math.random() * 2,
            life: 1,
            decay: 0.01 + Math.random() * 0.02,
            size: 1.5 + Math.random() * 2.5,
            color
        });
    }
}

function updateHeartsDisplay() {
    const el = document.getElementById('heartsDisplay');
    if (!el) return;
    let s = '';
    for (let i = 0; i < player.maxHp; i++) {
        s += i < player.hp ? '\u2764' : '\u2661';
    }
    el.textContent = s;
}

function damagePlayer(amount) {
    if (player.invincible > 0) return;
    player.hp -= amount;
    player.invincible = 90; // ~1.5 seconds at 60fps
    updateHeartsDisplay();
    spawnParticles(player.x, player.y + player.h / 2, '#f44', 8, 3);

    if (player.hp <= 0) {
        strokes++;
        document.getElementById('strokeNum').textContent = strokes;
        document.getElementById('statusText').textContent = 'KO! +1 penalty';
        player.hp = player.maxHp;
        updateHeartsDisplay();
        const level = levels[currentHole];
        const pGY = getGroundY(level.playerStart.x) || (canvas.height - 80 * S);
        player.x = level.playerStart.x;
        player.y = pGY - player.h;
        player.vx = 0; player.vy = 0;
    }
}

// ==================== INIT ====================
function initHole() {
    const level = levels[currentHole];
    const baseY = canvas.height - 80 * S;

    const pGroundY = getGroundY(level.playerStart.x);
    player.x = level.playerStart.x;
    player.y = (pGroundY || baseY) - player.h;
    player.vx = 0; player.vy = 0;
    player.onGround = true; player.facing = 1;

    const bGroundY = getGroundY(level.ballStart.x);
    ball.x = level.ballStart.x;
    ball.y = (bGroundY || baseY) - ball.r;
    ball.vx = 0; ball.vy = 0;
    ball.onGround = true; ball.active = true; ball.sunk = false;
    ball.justHit = 0;

    const hGroundY = getGroundY(level.holePos.x);
    hole.x = level.holePos.x;
    hole.y = (hGroundY || baseY);

    strokes = 0;
    aiming = false;
    mobileHitMode = false;
    psychicMode = false;
    psychicBallTarget = null;
    cameraX = 0;
    particles = [];

    player.maxHp = getMaxHearts();
    player.hp = player.maxHp;
    player.jumpsLeft = getMaxJumps() === Infinity ? 99 : getMaxJumps();
    player.invincible = 0;
    initEnemies();
    initWind();
    updateHeartsDisplay();
    document.getElementById('coinDisplay').textContent = coins + ' coins';

    document.getElementById('holeNum').textContent = currentHole + 1;
    document.getElementById('parNum').textContent = level.par;
    document.getElementById('strokeNum').textContent = 0;
    document.getElementById('statusText').textContent = 'Walk to the ball';
}

// ==================== INPUT ====================
document.addEventListener('keydown', e => {
    if (cheatCodeMode) {
        e.preventDefault();
        if (e.key === 'Escape') {
            cheatCodeMode = false;
            cheatCodeInput = '';
        } else if (e.key === 'Backspace') {
            cheatCodeInput = cheatCodeInput.slice(0, -1);
        } else if (e.key === 'Enter') {
            if (cheatCodeInput.toLowerCase() === 'password') {
                cheatCodeMode = false;
                cheatCodeInput = '';
                if (!patrickUnlocked) {
                    hasCompletedGame = true;
                    patrickUnlocked = true;
                    activeCharacter = 'patrick';
                    saveCharacterState();
                    saveProgress();
                    shopMessage = 'Patrick Wong unlocked!';
                    shopMessageTimer = 120;
                    teleportAnim = { x: 1150, y: canvas.height - 80 * S - 56, frame: 0, maxFrames: 60 };
                } else {
                    shopMessage = 'Already unlocked!';
                    shopMessageTimer = 90;
                }
            } else {
                shopMessage = 'Wrong code...';
                shopMessageTimer = 90;
                cheatCodeMode = false;
                cheatCodeInput = '';
            }
        } else if (e.key.length === 1) {
            cheatCodeInput += e.key;
        }
        return;
    }
    keys[e.key.toLowerCase()] = true;
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function setupMobileBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('touchcancel', e => { keys[key] = false; });
}
setupMobileBtn('btnLeft', 'a');
setupMobileBtn('btnRight', 'd');
setupMobileBtn('btnJump', 'w');

// Mobile HIT button
const btnHit = document.getElementById('btnHit');
btnHit.addEventListener('touchstart', e => {
    e.preventDefault();
    handleMobileHit();
});
btnHit.addEventListener('click', e => {
    e.preventDefault();
    handleMobileHit();
});

function handleMobileHit() {
    if (activeCharacter === 'patrick') {
        if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
        if (!playerNearBall()) return;
        if (!psychicMode) {
            psychicMode = true;
            psychicBallTarget = { x: ball.x, y: ball.y - 50 };
            strokes++;
            document.getElementById('strokeNum').textContent = strokes;
        } else {
            psychicMode = false;
            psychicBallTarget = null;
            ball.onGround = false;
            ball.justHit = 0;
        }
        return;
    }

    if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
    if (!playerNearBall()) return;

    if (!mobileHitMode) {
        // Start aim - angle phase
        mobileHitMode = true;
        mobileAimPhase = 'angle';
        mobileAimAngle = -0.4; // start angle
        mobileAimDir = -1; // sweeping upward
        mobileAimPower = 10;
        btnHit.textContent = 'SET ANGLE';
    } else if (mobileAimPhase === 'angle') {
        // Lock angle, start power phase
        mobileAimPhase = 'power';
        mobileAimPower = 3;
        mobileAimDir = 1;
        btnHit.textContent = 'SET POWER';
    } else if (mobileAimPhase === 'power') {
        // Execute hit
        const dir = player.facing;
        const clubPow = getClubPower();
        ball.vx = Math.cos(mobileAimAngle) * mobileAimPower * dir * clubPow;
        ball.vy = Math.sin(mobileAimAngle) * mobileAimPower * clubPow;
        ball.onGround = false;
        ball.justHit = 10;
        strokes++;
        document.getElementById('strokeNum').textContent = strokes;
        spawnParticles(ball.x, ball.y, '#fff', 8, 3);
        mobileHitMode = false;
        btnHit.textContent = '\u26F3 HIT';
    }
}

// Aim with mouse/touch on canvas
function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const t = e.touches ? e.touches[0] : e;
    return {
        x: (t.clientX - rect.left) * scaleX + cameraX,
        y: (t.clientY - rect.top) * scaleY
    };
}

function ballIsSettled() {
    return Math.abs(ball.vx) < 0.5 && Math.abs(ball.vy) < 0.5;
}

canvas.addEventListener('mousedown', e => startAim(getCanvasPos(e)));
canvas.addEventListener('mousemove', e => moveAim(getCanvasPos(e)));
canvas.addEventListener('mouseup', e => endAim(getCanvasPos(e)));
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length === 1) startAim(getCanvasPos(e)); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveAim(getCanvasPos(e)); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endAim(aimEnd); }, { passive: false });

function playerNearBall() {
    return Math.abs(player.x - ball.x) < HIT_RANGE;
}

function startAim(pos) {
    if (activeCharacter === 'patrick') {
        if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
        if (!playerNearBall()) return;
        psychicMode = true;
        psychicBallTarget = { x: pos.x, y: pos.y };
        strokes++;
        document.getElementById('strokeNum').textContent = strokes;
        return;
    }
    if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
    if (!playerNearBall()) return;
    const dx = pos.x - ball.x, dy = pos.y - ball.y;
    if (Math.sqrt(dx * dx + dy * dy) > 100) return;
    aiming = true;
    aimStart = { ...pos };
    aimEnd = { ...pos };
}

function moveAim(pos) {
    if (activeCharacter === 'patrick' && psychicMode) {
        psychicBallTarget = { x: pos.x, y: pos.y };
        return;
    }
    if (!aiming) return;
    aimEnd = { ...pos };
}

function endAim(pos) {
    if (activeCharacter === 'patrick' && psychicMode) {
        psychicMode = false;
        psychicBallTarget = null;
        ball.onGround = false;
        ball.justHit = 0;
        return;
    }
    if (!aiming) return;
    aiming = false;
    const dx = aimStart.x - aimEnd.x;
    const dy = aimStart.y - aimEnd.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 8) return;

    const power = Math.min(dist / 8, MAX_HIT_POWER) * getClubPower();
    const angle = Math.atan2(dy, dx);
    ball.vx = Math.cos(angle) * power;
    ball.vy = Math.sin(angle) * power;
    ball.onGround = false;
    ball.justHit = 10; // grace frames
    strokes++;
    document.getElementById('strokeNum').textContent = strokes;
    spawnParticles(ball.x, ball.y, '#fff', 8, 3);
}

// ==================== UPDATE ====================
function update() {
    const level = levels[currentHole];
    if (ball.sunk) return;
    gameTime++;
    if (player.invincible > 0) player.invincible--;

    // Mobile aim animation
    if (mobileHitMode) {
        if (mobileAimPhase === 'angle') {
            mobileAimAngle += mobileAimDir * 0.03;
            if (mobileAimAngle < -1.4) mobileAimDir = 1;
            if (mobileAimAngle > -0.1) mobileAimDir = -1;
        } else if (mobileAimPhase === 'power') {
            mobileAimPower += mobileAimDir * 0.2;
            if (mobileAimPower > MAX_HIT_POWER) mobileAimDir = -1;
            if (mobileAimPower < 3) mobileAimDir = 1;
        }
    }

    // --- Player movement ---
    player.walking = false;
    if (keys['a'] || keys['arrowleft']) {
        player.vx = -PLAYER_SPEED;
        player.facing = -1;
        player.walking = true;
    } else if (keys['d'] || keys['arrowright']) {
        player.vx = PLAYER_SPEED;
        player.facing = 1;
        player.walking = true;
    } else {
        player.vx = 0;
    }

    const jumpPressed = keys['w'] || keys['arrowup'] || keys[' '];
    if (jumpPressed && !player.jumpHeld) {
        const maxJ = getMaxJumps();
        if (player.onGround || player.jumpsLeft > 0) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
            if (maxJ !== Infinity) {
                player.jumpsLeft--;
            }
            if (BOOT_TIERS[equipment.boots].wings && !player.onGround) {
                spawnParticles(player.x, player.y + player.h * 0.8, '#fff', 4, 1.5);
            }
        }
        player.jumpHeld = true;
    }
    if (!jumpPressed) player.jumpHeld = false;

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    if (player.walking) player.walkFrame += 0.15;
    else player.walkFrame = 0;

    // Player ground collision
    const pGroundY = getGroundY(player.x);
    const pPlatY = getPlatformAt(player.x, player.y + player.h, player.vy);
    const effectiveGround = pPlatY !== null ? pPlatY : pGroundY;

    if (effectiveGround !== null && player.y + player.h >= effectiveGround) {
        player.y = effectiveGround - player.h;
        player.vy = 0;
        player.onGround = true;
        player.jumpsLeft = getMaxJumps() === Infinity ? 99 : getMaxJumps();
    } else if (effectiveGround === null) {
        player.onGround = false;
    }

    if (player.y > canvas.height + 50) {
        damagePlayer(1);
        if (player.hp > 0) {
            const pGY = getGroundY(level.playerStart.x) || (canvas.height - 80 * S);
            player.x = level.playerStart.x;
            player.y = pGY - player.h;
            player.vx = 0; player.vy = 0;
        }
    }
    player.x = Math.max(10, player.x);

    // --- Ball physics ---
    if (ball.active) {
        if (ball.justHit > 0) ball.justHit--;

        // Psychic levitation
        if (activeCharacter === 'patrick' && psychicMode && psychicBallTarget) {
            const pdx = psychicBallTarget.x - ball.x;
            const pdy = psychicBallTarget.y - ball.y;
            ball.vx = pdx * 0.12;
            ball.vy = pdy * 0.12;
            ball.onGround = false;
            ball.justHit = 5;
        }

        if (!ball.onGround) {
            // Gravity
            ball.vy += GRAVITY;
            // Air drag
            ball.vx *= BALL_AIR_DRAG;
            ball.vy *= BALL_AIR_DRAG;
            // Quadratic drag at high speed
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (speed > 2) {
                const drag = 0.0005 * speed;
                ball.vx -= ball.vx * drag;
                ball.vy -= ball.vy * drag;
            }
            // Wind force
            if (wind.strength > 0) {
                ball.vx += wind.direction * wind.strength;
            }
        }

        ball.x += ball.vx;
        ball.y += ball.vy;

        // Ground collision (skip if just hit)
        if (ball.justHit <= 0) {
            const bGroundY = getGroundY(ball.x);
            const bPlatY = getPlatformAt(ball.x, ball.y + ball.r, ball.vy);
            const bEffGround = bPlatY !== null ? bPlatY : bGroundY;

            // If ball is rolling on ground, snap to terrain surface (handles downhill slopes)
            if (ball.onGround && bEffGround !== null && ball.y + ball.r < bEffGround) {
                ball.y = bEffGround - ball.r;
            }

            if (bEffGround !== null && ball.y + ball.r >= bEffGround) {
                ball.y = bEffGround - ball.r;

                // Slope normal calculation
                const slopeCheck = 4;
                const gyL = getGroundY(ball.x - slopeCheck);
                const gyR = getGroundY(ball.x + slopeCheck);

                if (gyL !== null && gyR !== null) {
                    const tx = slopeCheck * 2;
                    const ty = gyR - gyL;
                    const tLen = Math.sqrt(tx * tx + ty * ty);
                    // Normal pointing UP (away from ground) in canvas coords
                    const nx = ty / tLen;
                    const ny = -tx / tLen;

                    const dot = ball.vx * nx + ball.vy * ny;

                    if (dot < 0) { // moving into ground
                        if (Math.abs(dot) > 2) {
                            // Bounce with energy loss
                            const bounceFactor = BALL_BOUNCE * Math.max(0.3, 1 - Math.abs(dot) * 0.02);
                            ball.vx -= (1 + bounceFactor) * dot * nx;
                            ball.vy -= (1 + bounceFactor) * dot * ny;
                            ball.vx *= 0.95;
                            ball.onGround = false;
                            spawnParticles(ball.x, bEffGround, '#4a8', 3, 1.5);
                        } else {
                            // Settle onto surface
                            ball.vx -= dot * nx;
                            ball.vy -= dot * ny;
                            ball.onGround = true;
                        }
                    } else {
                        // Ball on surface but not moving into it - settle
                        ball.vy = 0;
                        ball.onGround = true;
                    }

                    // Slope gravity - ball rolls downhill
                    if (ball.onGround) {
                        const slopeAngle = Math.atan2(ty, tx);
                        ball.vx += Math.sin(slopeAngle) * 0.15;
                    }
                } else {
                    // No slope info - simple bounce
                    if (Math.abs(ball.vy) > 2) {
                        ball.vy = -ball.vy * BALL_BOUNCE;
                        ball.onGround = false;
                    } else {
                        ball.vy = 0;
                        ball.onGround = true;
                    }
                }

                // Rolling friction
                if (ball.onGround) {
                    const groundSpeed = Math.abs(ball.vx);
                    if (groundSpeed > 0.1) {
                        const frictionCoeff = groundSpeed > 3 ? BALL_GROUND_FRICTION : 0.975;
                        ball.vx *= frictionCoeff;
                    }
                }

                // Sand trap friction
                for (const s of (level.sand || [])) {
                    if (ball.x >= s.x && ball.x <= s.x + s.w) {
                        ball.vx *= 0.88;
                        if (Math.abs(ball.vx) < 0.5) ball.vx *= 0.8;
                    }
                }
            } else if (bEffGround === null) {
                ball.onGround = false;
            }
        }

        // Ball falls in water
        for (const w of (level.water || [])) {
            const waterY = canvas.height - 80 * S;
            if (ball.x >= w.x && ball.x <= w.x + w.w && ball.y > waterY - 10) {
                const resetY = getGroundY(level.ballStart.x) || (canvas.height - 80 * S);
                ball.x = level.ballStart.x;
                ball.y = resetY - ball.r;
                ball.vx = 0; ball.vy = 0;
                ball.onGround = true;
                ball.justHit = 0;
                strokes++;
                document.getElementById('strokeNum').textContent = strokes;
                document.getElementById('statusText').textContent = 'Water! +1 penalty';
                spawnParticles(ball.x, waterY, '#48f', 12, 3);
                break;
            }
        }

        // Ball falls into void
        if (ball.y > canvas.height + 60) {
            const resetY = getGroundY(level.ballStart.x) || (canvas.height - 80 * S);
            ball.x = level.ballStart.x;
            ball.y = resetY - ball.r;
            ball.vx = 0; ball.vy = 0;
            ball.onGround = true;
            ball.justHit = 0;
            strokes++;
            document.getElementById('strokeNum').textContent = strokes;
        }

        // Stop ball when barely moving on ground
        if (ball.onGround) {
            ball.vy = 0; // Always zero out vertical velocity on ground
            if (Math.abs(ball.vx) < 0.15) {
                ball.vx *= 0.8;
                if (Math.abs(ball.vx) < 0.02) ball.vx = 0;
            }
        }

        // --- Enemies ---
        updateEnemies();
        updateSandProjectiles();

        // Check hole
        const hDx = ball.x - hole.x;
        const hDy = (ball.y + ball.r) - hole.y;
        const hDist = Math.sqrt(hDx * hDx + hDy * hDy);
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);

        if (hDist < hole.r && speed < 7) {
            ball.sunk = true;
            ball.x = hole.x;
            ball.y = hole.y - ball.r;
            ball.vx = 0; ball.vy = 0;
            spawnParticles(hole.x, hole.y, '#c9a84c', 15, 4);
            onHoleSunk();
        }

        // Gravity pull near hole
        if (hDist < hole.r + 15 && speed < 4 && ball.onGround) {
            ball.vx += (hole.x - ball.x) * 0.008;
        }
    }

    // --- Particles ---
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life -= p.decay;
        return p.life > 0;
    });

    // --- Camera ---
    const target = (Math.abs(ball.vx) > 2 || Math.abs(ball.vy) > 2) ? ball.x : player.x;
    const idealCam = target - canvas.width * 0.35;
    cameraX += (idealCam - cameraX) * 0.08;
    cameraX = Math.max(0, cameraX);

    // Status
    if (!ball.sunk) {
        if (playerNearBall() && ball.onGround && ballIsSettled()) {
            document.getElementById('statusText').textContent = 'Click & drag the ball to hit!';
        } else if (ballIsSettled() && !playerNearBall()) {
            document.getElementById('statusText').textContent = 'Walk closer to the ball';
        } else if (!ballIsSettled()) {
            document.getElementById('statusText').textContent = '';
        }
    }
}

// ==================== TIME OF DAY ====================
// Holes 1-2: morning/day, 3-4: late afternoon/sunset, 5-6: night
function getTimeOfDay() {
    if (currentHole <= 1) return 'day';
    if (currentHole <= 3) return 'afternoon';
    if (currentHole <= 5) return 'night';
    return 'storm';
}
