                grassBot: '#4a4a52',
                grassBlade: '#9a9aa0',
                dirt: '#5a5a60',
                earth: '#3a3a42',
                platGrass: '#8a8a8e',
                platDark: '#5a5a62',
                platBlade: '#a0a0a8',
                ambientTint: 'rgba(50, 80, 200, 0.03)',
            };
            return {
                sky: ['#0d2137', '#1a3a5c', '#1a3050', '#2d6a4f', '#1a472a'],
                starAlpha: 0.6,
                cloudAlpha: 0.06,
                sunMoon: 'moon',
                sunY: 50,
                hillFar: 'rgba(25, 60, 40, 0.6)',
                hillNear: 'rgba(30, 75, 50, 0.5)',
                grassTop: '#3a9960',
                grassMid: '#2d7a4a',
                grassBot: '#1f5a35',
                grassBlade: '#4ab06a',
                dirt: '#5a3e1b',
                earth: '#3d2810',
                platGrass: '#3a9960',
                platDark: '#2d6a4f',
                platBlade: '#5cc07a',
                ambientTint: 'rgba(100, 150, 255, 0.03)',
            };
        }

        function simulateTrajectory(startX, startY, vx, vy, steps) {
            const points = [];
            let x = startX, y = startY;
            for (let i = 0; i < steps; i++) {
                vy += getGravity();
                vx *= BALL_AIR_DRAG;
                vy *= BALL_AIR_DRAG;
                x += vx;
                y += vy;
                points.push({ x, y });
                const gy = getGroundY(x);
                if (gy !== null && y >= gy) break;
            }
            return points;
        }

        // ==================== DRAWING ====================
        function draw() {
            const W = canvas.width, H = canvas.height;
            const level = levels[currentHole];
            const baseY = H - 80 * S;
            const theme = getTheme();
            const tod = getTimeOfDay();

            ctx.save();

            // Sky gradient
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
            skyGrad.addColorStop(0, theme.sky[0]);
            skyGrad.addColorStop(0.25, theme.sky[1]);
            skyGrad.addColorStop(0.5, theme.sky[2]);
            skyGrad.addColorStop(0.75, theme.sky[3]);
            skyGrad.addColorStop(1, theme.sky[4]);
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // Stars (fade in with afternoon, full at night)
            if (theme.starAlpha > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                if (tod === 'space') {
                    // Dense starfield for space
                    const spaceStarCount = 80;
                    for (let i = 0; i < spaceStarCount; i++) {
                        const sx = (i * 97 + 31) % W;
                        const sy = 10 + (i * 53 + 17) % (H * 0.7);
                        const blink = 0.3 + 0.7 * Math.abs(Math.sin(gameTime * 0.01 + i * 0.7));
                        ctx.globalAlpha = blink * theme.starAlpha;
                        ctx.beginPath();
                        ctx.arc(sx, sy, 0.8 + (i % 4) * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    const starSeed = [23, 67, 134, 201, 278, 345, 412, 489, 556, 623, 690, 45, 112, 179, 246, 313, 380, 447, 514, 581];
                    starSeed.forEach((sx, i) => {
                        const sy = 10 + (i * 37 + sx) % (H * 0.35);
                        const blink = 0.3 + 0.7 * Math.abs(Math.sin(gameTime * 0.01 + i));
                        ctx.globalAlpha = blink * theme.starAlpha;
                        ctx.beginPath();
                        ctx.arc(sx % W, sy, 1 + (i % 3) * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
                ctx.globalAlpha = 1;
            }

            // Sun / Sunset / Moon
            if (tod === 'day') {
                // Sun with glow
                const sunX = W - 100, sunY = 60;
                const sunGlow = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 60);
                sunGlow.addColorStop(0, 'rgba(255, 240, 150, 0.9)');
                sunGlow.addColorStop(0.3, 'rgba(255, 220, 100, 0.3)');
                sunGlow.addColorStop(0.7, 'rgba(255, 200, 80, 0.08)');
                sunGlow.addColorStop(1, 'rgba(255, 200, 80, 0)');
                ctx.fillStyle = sunGlow;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 60, 0, Math.PI * 2);
                ctx.fill();
                // Sun rays
                ctx.strokeStyle = 'rgba(255, 230, 120, 0.12)';
                ctx.lineWidth = 1.5;
                for (let r = 0; r < 12; r++) {
                    const a = r * Math.PI / 6 + gameTime * 0.003;
                    ctx.beginPath();
                    ctx.moveTo(sunX + Math.cos(a) * 22, sunY + Math.sin(a) * 22);
                    ctx.lineTo(sunX + Math.cos(a) * (36 + Math.sin(gameTime * 0.02 + r) * 4), sunY + Math.sin(a) * (36 + Math.sin(gameTime * 0.02 + r) * 4));
                    ctx.stroke();
                }
                // Sun body
                ctx.fillStyle = '#ffe866';
                ctx.beginPath();
                ctx.arc(sunX, sunY, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
                ctx.beginPath();
                ctx.arc(sunX - 4, sunY - 4, 8, 0, Math.PI * 2);
                ctx.fill();
            } else if (tod === 'afternoon') {
                // Setting sun at horizon
                const sunX = W * 0.75, sunY = baseY - 60;
                // Horizon glow
                const horizGlow = ctx.createRadialGradient(sunX, sunY + 20, 10, sunX, sunY + 20, 150);
                horizGlow.addColorStop(0, 'rgba(255, 160, 50, 0.35)');
                horizGlow.addColorStop(0.4, 'rgba(255, 100, 50, 0.15)');
                horizGlow.addColorStop(1, 'rgba(255, 80, 30, 0)');
                ctx.fillStyle = horizGlow;
                ctx.fillRect(0, baseY - 180, W, 200);
                // Sun body (partially behind horizon)
                const sunGrad = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 25);
                sunGrad.addColorStop(0, '#ffe080');
                sunGrad.addColorStop(0.6, '#ff9944');
                sunGrad.addColorStop(1, '#e85530');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
                ctx.fill();
                // Sun glow ring
                ctx.fillStyle = 'rgba(255, 180, 80, 0.15)';
                ctx.beginPath();
                ctx.arc(sunX, sunY, 35, 0, Math.PI * 2);
                ctx.fill();
            } else if (tod === 'space') {
                // Earth in background
                const earthX = W * 0.75, earthY = H * 0.35;
                const earthR = H * 0.45;
                // Outer glow
                const outerGlow = ctx.createRadialGradient(earthX, earthY, earthR * 0.9, earthX, earthY, earthR * 1.3);
                outerGlow.addColorStop(0, 'rgba(80, 160, 255, 0.15)');
                outerGlow.addColorStop(1, 'rgba(80, 160, 255, 0)');
                ctx.fillStyle = outerGlow;
                ctx.beginPath();
                ctx.arc(earthX, earthY, earthR * 1.3, 0, Math.PI * 2);
                ctx.fill();
                // Blue ocean base
                ctx.save();
                ctx.beginPath();
                ctx.arc(earthX, earthY, earthR, 0, Math.PI * 2);
                ctx.clip();
                const oceanGrad = ctx.createRadialGradient(earthX - earthR * 0.3, earthY - earthR * 0.3, earthR * 0.1, earthX, earthY, earthR);
                oceanGrad.addColorStop(0, '#4a90d9');
                oceanGrad.addColorStop(0.5, '#2a60a8');
                oceanGrad.addColorStop(1, '#1a3a6a');
                ctx.fillStyle = oceanGrad;
                ctx.beginPath();
                ctx.arc(earthX, earthY, earthR, 0, Math.PI * 2);
                ctx.fill();
                // Landmasses (simplified continents)
                ctx.fillStyle = 'rgba(50, 140, 60, 0.6)';
                ctx.beginPath();
                ctx.ellipse(earthX - earthR * 0.2, earthY - earthR * 0.15, earthR * 0.35, earthR * 0.25, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(60, 150, 50, 0.5)';
                ctx.beginPath();
                ctx.ellipse(earthX + earthR * 0.3, earthY + earthR * 0.1, earthR * 0.25, earthR * 0.4, 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(45, 130, 55, 0.45)';
                ctx.beginPath();
                ctx.ellipse(earthX - earthR * 0.4, earthY + earthR * 0.35, earthR * 0.2, earthR * 0.15, 0.2, 0, Math.PI * 2);
                ctx.fill();
                // Cloud swirls (slowly rotating)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                for (let ci = 0; ci < 6; ci++) {
                    const angle = ci * Math.PI / 3 + gameTime * 0.0005;
                    const cr = earthR * (0.3 + (ci % 3) * 0.15);
                    const cx = earthX + Math.cos(angle) * cr;
                    const cy = earthY + Math.sin(angle) * cr * 0.6;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, earthR * 0.18, earthR * 0.05, angle, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                // Atmosphere edge glow
                ctx.strokeStyle = 'rgba(100, 180, 255, 0.4)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(earthX, earthY, earthR, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // Moon (night)
                ctx.fillStyle = 'rgba(255, 250, 220, 0.9)';
                ctx.beginPath();
                ctx.arc(W - 80, 50, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(240, 230, 190, 0.3)';
                ctx.beginPath();
                ctx.arc(W - 80, 50, 30, 0, Math.PI * 2);
                ctx.fill();
                // Moon craters
                ctx.fillStyle = 'rgba(200, 190, 160, 0.2)';
                ctx.beginPath(); ctx.arc(W - 88, 45, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(W - 74, 55, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(W - 80, 42, 2, 0, Math.PI * 2); ctx.fill();
            }

            if (tod !== 'space') {
                // Distant hills (parallax)
                const hillOffset = cameraX * 0.15;
                ctx.fillStyle = theme.hillFar;
                ctx.beginPath();
                ctx.moveTo(0, baseY);
                const hillStep = isMobile ? 6 : 2;
                for (let x = 0; x <= W; x += hillStep) {
                    const hx = x + hillOffset;
                    const hy = baseY - 40 - Math.sin(hx * 0.008) * 25 - Math.sin(hx * 0.003) * 40;
                    ctx.lineTo(x, hy);
                }
                ctx.lineTo(W, baseY);
                ctx.closePath();
                ctx.fill();

                // Trees on distant hills
                if (tod === 'day' || tod === 'afternoon') {
                    const treeColor = tod === 'day' ? 'rgba(30, 90, 45, 0.5)' : 'rgba(25, 55, 35, 0.5)';
                    ctx.fillStyle = treeColor;
                    for (let tx = 20; tx < W; tx += 35 + (tx * 7 % 20)) {
                        const hx = tx + hillOffset;
                        const treeBase = baseY - 40 - Math.sin(hx * 0.008) * 25 - Math.sin(hx * 0.003) * 40;
                        const treeH = 12 + (tx * 3 % 10);
                        ctx.beginPath();
                        ctx.moveTo(tx - 5, treeBase);
                        ctx.lineTo(tx, treeBase - treeH);
                        ctx.lineTo(tx + 5, treeBase);
                        ctx.closePath();
                        ctx.fill();
                    }
                }

                // Closer hills
                ctx.fillStyle = theme.hillNear;
                ctx.beginPath();
                ctx.moveTo(0, baseY);
                for (let x = 0; x <= W; x += hillStep) {
                    const hx = x + cameraX * 0.3;
                    const hy = baseY - 20 - Math.sin(hx * 0.012 + 1) * 18 - Math.sin(hx * 0.005) * 25;
                    ctx.lineTo(x, hy);
                }
                ctx.lineTo(W, baseY);
                ctx.closePath();
                ctx.fill();

                // Clouds
                ctx.fillStyle = `rgba(255,255,255,${theme.cloudAlpha})`;
                const cloudOffset = cameraX * 0.2;
                [100, 300, 550, 750, 950].forEach((cx, i) => {
                    const x = cx - cloudOffset + (i % 2) * 50;
                    const y = 40 + i * 18 + Math.sin(gameTime * 0.005 + i) * 3;
                    ctx.beginPath();
                    ctx.ellipse(x, y, 55 + i * 12, 16, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(x + 30, y + 5, 35, 12, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // Extra cloud body for fluffier look
                    ctx.beginPath();
                    ctx.ellipse(x - 20, y + 3, 30, 10, 0, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Afternoon tint on clouds
                if (tod === 'afternoon') {
                    ctx.fillStyle = 'rgba(255, 140, 60, 0.06)';
                    [100, 300, 550, 750, 950].forEach((cx, i) => {
                        const x = cx - cloudOffset + (i % 2) * 50;
                        const y = 40 + i * 18 + Math.sin(gameTime * 0.005 + i) * 3;
                        ctx.beginPath();
                        ctx.ellipse(x, y, 55 + i * 12, 16, 0, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
            } // end if (tod !== 'space')

            // Camera transform (with zoom for range finder)
            if (cameraZoom !== 1) {
                ctx.translate(canvas.width / 2, canvas.height);
                ctx.scale(cameraZoom, cameraZoom);
                ctx.translate(-canvas.width / 2, -canvas.height);
            }
            ctx.translate(-cameraX, 0);

            // --- Draw terrain ---
            level.terrain.forEach(t => {
                const startY = baseY + t.y;
                const endY = baseY + t.y + t.h;

                // Earth layer
                ctx.fillStyle = theme.earth;
                ctx.beginPath();
                ctx.moveTo(t.x, startY + 12);
                ctx.lineTo(t.x + t.w, endY + 12);
                ctx.lineTo(t.x + t.w, H + 20);
                ctx.lineTo(t.x, H + 20);
                ctx.closePath();
                ctx.fill();

                // Dirt layer with subtle texture
                ctx.fillStyle = theme.dirt;
                ctx.beginPath();
                ctx.moveTo(t.x, startY + 6);
                ctx.lineTo(t.x + t.w, endY + 6);
                ctx.lineTo(t.x + t.w, H + 20);
                ctx.lineTo(t.x, H + 20);
                ctx.closePath();
                ctx.fill();

                // Dirt texture (rocks/pebbles) - skip on mobile for performance
                if (!isMobile) {
                    ctx.fillStyle = 'rgba(0,0,0,0.08)';
                    for (let rx = t.x + 8; rx < t.x + t.w - 8; rx += 15 + (rx * 13 % 12)) {
                        const progress = (rx - t.x) / t.w;
                        const ry = startY + t.h * progress + 14 + (rx * 7 % 20);
                        if (ry < H) {
                            ctx.beginPath();
                            ctx.ellipse(rx, ry, 2 + (rx % 3), 1.5, (rx % 4) * 0.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }

                // Main grass
                if (isMobile) {
                    ctx.fillStyle = theme.grassMid;
                } else {
                    const grassGrad = ctx.createLinearGradient(0, startY - 5, 0, startY + 15);
                    grassGrad.addColorStop(0, theme.grassTop);
                    grassGrad.addColorStop(0.3, theme.grassMid);
                    grassGrad.addColorStop(1, theme.grassBot);
                    ctx.fillStyle = grassGrad;
                }
                ctx.beginPath();
                ctx.moveTo(t.x, startY);
                ctx.lineTo(t.x + t.w, endY);
                ctx.lineTo(t.x + t.w, endY + 12);
                ctx.lineTo(t.x, startY + 12);
                ctx.closePath();
                ctx.fill();

                if (tod === 'space') {
                    // Lunar terrain: craters and rocky texture
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    for (let cx = t.x + 15; cx < t.x + t.w - 15; cx += 30 + (cx * 13 % 25)) {
                        const progress = (cx - t.x) / t.w;
                        const cy = startY + t.h * progress + 2;
                        ctx.beginPath();
                        ctx.ellipse(cx, cy, 6 + (cx * 7 % 5), 2.5, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Rocky texture dots
                    ctx.fillStyle = 'rgba(180,180,190,0.3)';
                    for (let rx = t.x + 5; rx < t.x + t.w - 5; rx += 8 + (rx * 11 % 7)) {
                        const progress = (rx - t.x) / t.w;
                        const ry = startY + t.h * progress - 1 + (rx * 3 % 4);
                        ctx.beginPath();
                        ctx.arc(rx, ry, 0.8 + (rx % 3) * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // Grass blades on top edge (wind animation)
                    ctx.strokeStyle = theme.grassBlade;
                    ctx.lineWidth = 1.5;
                    const windPhase = gameTime * 0.015;
                    const grassStep = isMobile ? 12 : 6;
                    for (let gx = t.x; gx < t.x + t.w; gx += grassStep + Math.random() * 4) {
                        const progress = (gx - t.x) / t.w;
                        const gy = startY + t.h * progress;
                        const bladeH = 4 + Math.random() * 5;
                        const lean = Math.sin(gx * 0.3 + windPhase) * 1.8;
                        ctx.beginPath();
                        ctx.moveTo(gx, gy);
                        ctx.quadraticCurveTo(gx + lean, gy - bladeH * 0.6, gx + lean * 1.2, gy - bladeH);
                        ctx.stroke();
                    }

                    // Occasional flowers/details in daytime
                    if (tod === 'day') {
                        const flowerColors = ['#e85', '#e58', '#fe6', '#8cf'];
                        for (let fx = t.x + 20; fx < t.x + t.w - 20; fx += 40 + (fx * 11 % 30)) {
                            const progress = (fx - t.x) / t.w;
                            const fy = startY + t.h * progress - 3;
                            ctx.fillStyle = flowerColors[Math.floor(fx * 3) % flowerColors.length];
                            ctx.beginPath();
                            ctx.arc(fx, fy, 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                } // end else (not space)
            });

            // Platforms
            (level.platforms || []).forEach(p => {
                const py = baseY + (p.y || 0);
                // Platform with depth
                ctx.fillStyle = theme.platDark;
                ctx.fillRect(p.x, py + 8, p.w, 22);
                ctx.fillStyle = theme.platGrass;
                ctx.fillRect(p.x, py, p.w, 10);
                // Top highlight
                ctx.fillStyle = theme.grassBlade;
                ctx.fillRect(p.x, py, p.w, 3);
                // Grass on platform
                if (tod !== 'space') {
                    ctx.strokeStyle = theme.platBlade;
                    ctx.lineWidth = 1;
                    for (let gx = p.x + 3; gx < p.x + p.w - 3; gx += 5) {
                        const lean = Math.sin(gx * 0.4 + gameTime * 0.015) * 1;
                        ctx.beginPath();
                        ctx.moveTo(gx, py);
                        ctx.lineTo(gx + lean, py - 3 - (gx * 7 % 3));
                        ctx.stroke();
                    }
                }
            });

            // Water
            (level.water || []).forEach(w => {
                const wy = baseY;
                // Deep water with time-of-day tinting
                const waterGrad = ctx.createLinearGradient(0, wy - 8, 0, H);
                if (tod === 'day') {
                    waterGrad.addColorStop(0, 'rgba(40, 140, 230, 0.7)');
                    waterGrad.addColorStop(0.5, 'rgba(30, 100, 200, 0.8)');
                    waterGrad.addColorStop(1, 'rgba(15, 60, 140, 0.9)');
                } else if (tod === 'afternoon') {
                    waterGrad.addColorStop(0, 'rgba(80, 100, 160, 0.7)');
                    waterGrad.addColorStop(0.5, 'rgba(50, 60, 120, 0.8)');
                    waterGrad.addColorStop(1, 'rgba(30, 30, 80, 0.9)');
                } else {
                    waterGrad.addColorStop(0, 'rgba(20, 80, 160, 0.7)');
                    waterGrad.addColorStop(0.5, 'rgba(15, 50, 120, 0.8)');
                    waterGrad.addColorStop(1, 'rgba(8, 25, 70, 0.9)');
                }
                ctx.fillStyle = waterGrad;
                ctx.fillRect(w.x, wy - 8, w.w, H - wy + 20);

                // Sunset reflection on water
                if (tod === 'afternoon') {
                    const reflGrad = ctx.createLinearGradient(w.x, wy, w.x + w.w, wy + 30);
                    reflGrad.addColorStop(0, 'rgba(255, 140, 50, 0.12)');
                    reflGrad.addColorStop(1, 'rgba(255, 100, 30, 0)');
                    ctx.fillStyle = reflGrad;
                    ctx.fillRect(w.x, wy - 5, w.w, 35);
                }

                // Animated waves on surface
                const waveColor = tod === 'day' ? 'rgba(140, 210, 255, 0.45)' :
                    tod === 'afternoon' ? 'rgba(180, 160, 140, 0.35)' :
                        'rgba(120, 200, 255, 0.4)';
                ctx.strokeStyle = waveColor;
                ctx.lineWidth = 1.5;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    for (let wx = w.x; wx <= w.x + w.w; wx += 3) {
                        const waveY = wy - 5 + i * 8 + Math.sin(wx * 0.08 + gameTime * 0.05 + i * 2) * 2.5;
                        if (wx === w.x) ctx.moveTo(wx, waveY);
                        else ctx.lineTo(wx, waveY);
                    }
                    ctx.stroke();
                }

                // Surface shimmer
                const shimmerAlpha = tod === 'day' ? 0.14 : 0.08;
                ctx.fillStyle = `rgba(255,255,255,${shimmerAlpha})`;
                for (let i = 0; i < 4; i++) {
                    const sx = w.x + w.w * (0.15 + i * 0.22) + Math.sin(gameTime * 0.03 + i) * 5;
                    const sy = wy - 3 + Math.sin(gameTime * 0.04 + i * 1.5) * 2;
                    ctx.beginPath();
                    ctx.ellipse(sx, sy, 6 + Math.sin(gameTime * 0.02 + i) * 2, 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Sand traps
            (level.sand || []).forEach(s => {
                const sy = getGroundY(s.x + s.w / 2) || baseY;
                // Sand base
                const sandGrad = ctx.createLinearGradient(s.x, sy - 4, s.x, sy + 5);
                if (tod === 'day') {
                    sandGrad.addColorStop(0, '#f0d88a');
                    sandGrad.addColorStop(1, '#d4b868');
                } else if (tod === 'afternoon') {
                    sandGrad.addColorStop(0, '#d4b070');
                    sandGrad.addColorStop(1, '#b89050');
                } else {
                    sandGrad.addColorStop(0, '#b8a060');
                    sandGrad.addColorStop(1, '#9a8048');
                }
                ctx.fillStyle = sandGrad;
                ctx.fillRect(s.x, sy - 4, s.w, 8);
                // Sand texture dots
                ctx.fillStyle = 'rgba(160, 130, 50, 0.4)';
                for (let i = 0; i < 12; i++) {
                    const dx = s.x + 4 + (i * (s.w - 8) / 12) + Math.sin(i * 2.3) * 3;
                    const dy = sy - 2 + Math.sin(i * 1.7) * 2.5;
                    ctx.beginPath();
                    ctx.arc(dx, dy, 1 + (i % 3) * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Sand edge highlight
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(s.x, sy - 4);
                ctx.lineTo(s.x + s.w, sy - 4);
                ctx.stroke();
            });

            // --- Asteroids ---
            drawAsteroids();

            // --- Enemies ---
            drawEnemies();

            // --- Boss ---
            drawBoss();

            // --- Hole/flag ---
            // Green patch around hole (so it blends into terrain)
            ctx.fillStyle = theme.grassMid;
            ctx.beginPath();
            ctx.ellipse(hole.x, hole.y + 3, hole.r + 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = theme.grassTop;
            ctx.beginPath();
            ctx.ellipse(hole.x, hole.y + 2, hole.r + 4, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Flag shadow on ground
            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.beginPath();
            ctx.ellipse(hole.x + 8, hole.y + 3, 14, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // Flag pole
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(hole.x, hole.y + 3);
            ctx.lineTo(hole.x, hole.y - 57);
            ctx.stroke();

            // Flag with wave
            const flagWave = Math.sin(gameTime * 0.06) * 3;
            ctx.fillStyle = '#c9a84c';
            ctx.beginPath();
            ctx.moveTo(hole.x, hole.y - 57);
            ctx.quadraticCurveTo(hole.x + 14 + flagWave, hole.y - 50, hole.x + 25, hole.y - 47);
            ctx.quadraticCurveTo(hole.x + 14 - flagWave, hole.y - 44, hole.x, hole.y - 37);
            ctx.fill();

            // Hole (cup) — sunk into the ground
            ctx.fillStyle = '#0a0a0a';
            ctx.beginPath();
            ctx.ellipse(hole.x, hole.y + 3, hole.r, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            // Hole rim
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.ellipse(hole.x, hole.y + 3, hole.r, 5, 0, 0, Math.PI * 2);
            ctx.stroke();
            // Inner shadow for depth
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(hole.x, hole.y + 4, hole.r - 3, 3, 0, 0, Math.PI * 2);
            ctx.fill();

            // --- Ball ---
            if (ball.active && !ball.sunk) {
                // "Ready to hit" glow when player is near and ball is settled
                if (playerNearBall() && ball.onGround && ballIsSettled()) {
                    const glowPulse = 0.25 + 0.15 * Math.sin(gameTime * 0.08);
                    const glowR = ball.r + 8 + Math.sin(gameTime * 0.06) * 2;
                    const glowGrad = ctx.createRadialGradient(ball.x, ball.y, ball.r, ball.x, ball.y, glowR);
                    glowGrad.addColorStop(0, `rgba(201, 168, 76, ${glowPulse})`);
                    glowGrad.addColorStop(1, 'rgba(201, 168, 76, 0)');
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, glowR, 0, Math.PI * 2);
                    ctx.fillStyle = glowGrad;
                    ctx.fill();
                }
                // Shadow
                const bGround = getGroundY(ball.x);
                if (bGround !== null) {
                    const shadowDist = Math.max(0, bGround - (ball.y + ball.r));
                    const shadowAlpha = Math.max(0.05, 0.3 - shadowDist * 0.003);
                    const shadowScale = Math.max(0.6, 1 - shadowDist * 0.005);
                    ctx.beginPath();
                    ctx.ellipse(ball.x, bGround, (ball.r + 2) * shadowScale, 3 * shadowScale, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
                    ctx.fill();
                }
                // Psychic glow
                if (activeCharacter === 'patrick' && psychicMode) {
                    const pGlow = 0.3 + 0.15 * Math.sin(gameTime * 0.1);
                    ctx.fillStyle = `rgba(138, 43, 226, ${pGlow})`;
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r + 8, 0, Math.PI * 2);
                    ctx.fill();
                    // Purple trail particles
                    if (gameTime % 3 === 0) {
                        spawnParticles(ball.x, ball.y, '#8a2be2', 1, 1);
                    }
                }
                // Ball with better shading
                const bGrad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.1, ball.x, ball.y, ball.r);
                bGrad.addColorStop(0, '#fff');
                bGrad.addColorStop(0.4, '#f5f5f5');
                bGrad.addColorStop(0.8, '#ddd');
                bGrad.addColorStop(1, '#aaa');
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fillStyle = bGrad;
                ctx.fill();
                // Dimple dots
                ctx.fillStyle = 'rgba(0,0,0,0.06)';
                for (let a = 0; a < 6; a++) {
                    const da = a * Math.PI / 3 + gameTime * 0.01;
                    const dr = ball.r * 0.55;
                    ctx.beginPath();
                    ctx.arc(ball.x + Math.cos(da) * dr, ball.y + Math.sin(da) * dr, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // --- Aim line ---
            if (aiming && activeCharacter === 'jj') {
                const dx = aimStart.x - aimEnd.x;
                const dy = aimStart.y - aimEnd.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const power = Math.min(dist / 8, MAX_HIT_POWER);
                const angle = Math.atan2(dy, dx);
                const lineLen = power * 5;

                // Dotted trajectory preview
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(ball.x + Math.cos(angle) * lineLen, ball.y + Math.sin(angle) * lineLen);
                ctx.stroke();
                ctx.setLineDash([]);

                // Power indicator
                const pRatio = power / MAX_HIT_POWER;
                const dotColor = pRatio < 0.4 ? '#4ade80' : pRatio < 0.7 ? '#fbbf24' : '#ef4444';
                ctx.beginPath();
                ctx.arc(ball.x + Math.cos(angle) * lineLen, ball.y + Math.sin(angle) * lineLen, 5, 0, Math.PI * 2);
                ctx.fillStyle = dotColor;
                ctx.fill();

                // Power text
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${11 * S}px Georgia`;
                ctx.fillText(Math.round(pRatio * 100) + '%', ball.x + Math.cos(angle) * lineLen + 10, ball.y + Math.sin(angle) * lineLen - 8);

                // Autoflex trajectory preview
                if (equipment.shaft >= 1) {
                    const simVx = Math.cos(angle) * power;
                    const simVy = Math.sin(angle) * power;
                    const pts = simulateTrajectory(ball.x, ball.y, simVx, simVy, 25);
                    ctx.fillStyle = 'rgba(255, 105, 180, 0.5)';
                    pts.forEach((p, i) => {
                        if (i % 2 === 0) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                }
            }

            // Mobile aim visualization
            if (mobileHitMode) {
                const dir = player.facing;
                const power = mobileAimPower;
                const angle = mobileAimAngle;
                const endX = ball.x + Math.cos(angle) * power * 5 * dir;
                const endY = ball.y + Math.sin(angle) * power * 5;

                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = mobileAimPhase === 'angle' ? 'rgba(255,200,50,0.7)' : 'rgba(100,255,100,0.7)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                ctx.setLineDash([]);

                // Arrow tip
                ctx.beginPath();
                ctx.arc(endX, endY, 5, 0, Math.PI * 2);
                ctx.fillStyle = mobileAimPhase === 'angle' ? '#fbbf24' : '#4ade80';
                ctx.fill();

                // Power bar
                if (mobileAimPhase === 'power') {
                    const barW = 60, barH = 8;
                    const bx = ball.x - barW / 2, by = ball.y - 30;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(bx, by, barW, barH);
                    const pRatio = power / MAX_HIT_POWER;
                    const barColor = pRatio < 0.4 ? '#4ade80' : pRatio < 0.7 ? '#fbbf24' : '#ef4444';
                    ctx.fillStyle = barColor;
                    ctx.fillRect(bx, by, barW * pRatio, barH);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(bx, by, barW, barH);
                }

                // Autoflex trajectory preview (mobile)
                if (equipment.shaft >= 1 && mobileAimPhase === 'power') {
                    const dir = player.facing;
                    const simVx = Math.cos(mobileAimAngle) * mobileAimPower * dir * getClubPower();
                    const simVy = Math.sin(mobileAimAngle) * mobileAimPower * getClubPower();
                    const pts = simulateTrajectory(ball.x, ball.y, simVx, simVy, 25);
                    ctx.fillStyle = 'rgba(255, 105, 180, 0.5)';
                    pts.forEach((p, i) => {
                        if (i % 2 === 0) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    });
                }
            }

            // --- Player ---
            drawPlayer();

            // --- Particles ---
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            ctx.restore();

            // Ambient lighting overlay (after camera restore so it covers the full canvas)
            if (theme.ambientTint !== 'none') {
                ctx.fillStyle = theme.ambientTint;
                ctx.fillRect(0, 0, W, H);
            }

            // Vignette effect
            ctx.fillStyle = getCachedVignette(W, H, tod);
            ctx.fillRect(0, 0, W, H);

            // Storm effects (rain, lightning, wind indicator)
            drawStormEffects();

            // HUD - Hearts
            for (let i = 0; i < player.maxHp; i++) {
                const hx = 15 + i * 22;
                ctx.fillStyle = i < player.hp ? '#e53e3e' : 'rgba(255,255,255,0.2)';
                ctx.beginPath();
                ctx.moveTo(hx, 20);
                ctx.bezierCurveTo(hx, 17, hx - 5, 12, hx - 8, 15);
                ctx.bezierCurveTo(hx - 13, 20, hx, 28, hx, 30);
                ctx.bezierCurveTo(hx, 28, hx + 13, 20, hx + 8, 15);
                ctx.bezierCurveTo(hx + 5, 12, hx, 17, hx, 20);
                ctx.fill();
            }

            // HUD - Coins
            ctx.fillStyle = '#c9a84c';
            ctx.font = 'bold 14px Georgia';
            ctx.textAlign = 'right';
            ctx.fillText(coins + ' coins', W - 15, 25);
            ctx.textAlign = 'left';

            // HUD - Club tier
            ctx.fillStyle = CLUB_TIERS[equipment.club].color;
            ctx.font = '11px Georgia';
            ctx.fillText(CLUB_TIERS[equipment.club].name + ' Club', 15, H - 12);
        }

        function drawEnemies() {
            const tod = getTimeOfDay();
            const isStorm = tod === 'storm';

            activeEnemies.forEach(e => {
                if (e.dead) {
                    ctx.globalAlpha = e.deathTimer / 60;
                    ctx.fillStyle = '#d4a853';
                    for (let i = 0; i < 5; i++) {
                        const ox = Math.sin(i * 1.3 + e.deathTimer * 0.1) * (60 - e.deathTimer);
                        const oy = -Math.abs(Math.cos(i * 0.9 + e.deathTimer * 0.15)) * (60 - e.deathTimer);
                        ctx.beginPath();
                        ctx.arc(e.x + ox, e.y - 10 + oy, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    return;
                }

                // Sandbag body
                ctx.fillStyle = '#d4a853';
                ctx.beginPath();
                ctx.moveTo(e.x - 12, e.y);
                ctx.lineTo(e.x - 14, e.y - 22);
                ctx.quadraticCurveTo(e.x, e.y - 32, e.x + 14, e.y - 22);
                ctx.lineTo(e.x + 12, e.y);
                ctx.closePath();
                ctx.fill();

                // Tied top
                ctx.strokeStyle = '#8a6a30';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(e.x - 4, e.y - 28);
                ctx.lineTo(e.x, e.y - 32);
                ctx.lineTo(e.x + 4, e.y - 28);
                ctx.stroke();

                // Texture lines
                ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(e.x - 8, e.y - 8);
                ctx.lineTo(e.x + 8, e.y - 8);
                ctx.moveTo(e.x - 10, e.y - 16);
                ctx.lineTo(e.x + 10, e.y - 16);
                ctx.stroke();

                // Legs
                const legSwing = Math.sin(e.frame * 4) * 3;
                ctx.strokeStyle = '#8a6a30';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(e.x - 5, e.y);
                ctx.lineTo(e.x - 5 - legSwing, e.y + 8);
                ctx.moveTo(e.x + 5, e.y);
                ctx.lineTo(e.x + 5 + legSwing, e.y + 8);
                ctx.stroke();

                // Eyes
                if (isStorm) {
                    // Red glowing eyes
                    const glow1 = ctx.createRadialGradient(e.x - 4, e.y - 18, 1, e.x - 4, e.y - 18, 6);
                    glow1.addColorStop(0, 'rgba(255, 0, 0, 0.8)');
                    glow1.addColorStop(1, 'rgba(255, 0, 0, 0)');
                    ctx.fillStyle = glow1;
                    ctx.beginPath();
                    ctx.arc(e.x - 4, e.y - 18, 6, 0, Math.PI * 2);
                    ctx.fill();
                    const glow2 = ctx.createRadialGradient(e.x + 4, e.y - 18, 1, e.x + 4, e.y - 18, 6);
                    glow2.addColorStop(0, 'rgba(255, 0, 0, 0.8)');
                    glow2.addColorStop(1, 'rgba(255, 0, 0, 0)');
                    ctx.fillStyle = glow2;
                    ctx.beginPath();
                    ctx.arc(e.x + 4, e.y - 18, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff0000';
                } else {
                    ctx.fillStyle = '#2a2a2a';
                }
                ctx.beginPath();
                ctx.arc(e.x - 4, e.y - 18, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(e.x + 4, e.y - 18, 2, 0, Math.PI * 2);
                ctx.fill();

                // HP bar
                if (e.hp < e.maxHp) {
                    const barW = 24, barH = 3;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(e.x - barW / 2, e.y - 38, barW, barH);
                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(e.x - barW / 2, e.y - 38, barW * (e.hp / e.maxHp), barH);
                }
            });

            // Sand projectiles
            sandProjectiles.forEach(p => {
                ctx.fillStyle = '#c4a040';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(200, 160, 60, 0.4)';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawAsteroids() {
            const baseY = canvas.height - 80 * S;
            activeAsteroids.forEach(a => {
                // Shadow on ground
                const groundY = getGroundY(a.x) || baseY;
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath();
                ctx.ellipse(a.x, groundY, a.radius * 0.7, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Irregular rock body (8-point polygon)
                const grad = ctx.createRadialGradient(a.x - a.radius * 0.3, a.y - a.radius * 0.3, 2, a.x, a.y, a.radius);
                grad.addColorStop(0, '#c0c0c0');
                grad.addColorStop(1, '#606060');
                ctx.fillStyle = grad;
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const variation = 0.75 + 0.25 * Math.sin(a.phase * 2 + i * 1.7);
                    const r = a.radius * variation;
                    const px = a.x + Math.cos(angle) * r;
                    const py = a.y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();

                // Crater marks
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.arc(a.x - a.radius * 0.3, a.y - a.radius * 0.1, a.radius * 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(a.x + a.radius * 0.2, a.y + a.radius * 0.25, a.radius * 0.15, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawBoss() {
            if (!boss) return;

            // Death animation
            if (boss.dead) {
                const alpha = boss.deathTimer / 90;
                ctx.globalAlpha = alpha;
                for (let i = 0; i < 10; i++) {
                    const color = i % 2 === 0 ? '#c9a84c' : '#ff4444';
                    const expand = (90 - boss.deathTimer) * 1.5;
                    const ox = Math.sin(i * 1.3 + boss.deathTimer * 0.1) * expand;
                    const oy = -Math.abs(Math.cos(i * 0.9 + boss.deathTimer * 0.15)) * expand;
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(boss.x + ox, boss.y - 25 + oy, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                return;
            }

            // Red aura glow (pulsing)
            const auraPulse = 0.3 + 0.15 * Math.sin(gameTime * 0.05);
            const auraGrad = ctx.createRadialGradient(boss.x, boss.y - 25, 10, boss.x, boss.y - 25, 60);
            auraGrad.addColorStop(0, `rgba(255, 0, 0, ${auraPulse})`);
            auraGrad.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = auraGrad;
            ctx.beginPath();
            ctx.arc(boss.x, boss.y - 25, 60, 0, Math.PI * 2);
            ctx.fill();

            // Body: 2x size sandbag shape
            ctx.fillStyle = '#b08040';
            ctx.beginPath();
            ctx.moveTo(boss.x - 24, boss.y);
            ctx.lineTo(boss.x - 28, boss.y - 44);
            ctx.quadraticCurveTo(boss.x, boss.y - 64, boss.x + 28, boss.y - 44);
            ctx.lineTo(boss.x + 24, boss.y);
            ctx.closePath();
            ctx.fill();

            // Red tint overlay
            ctx.fillStyle = 'rgba(180, 30, 30, 0.2)';
            ctx.beginPath();
            ctx.moveTo(boss.x - 24, boss.y);
            ctx.lineTo(boss.x - 28, boss.y - 44);
            ctx.quadraticCurveTo(boss.x, boss.y - 64, boss.x + 28, boss.y - 44);
            ctx.lineTo(boss.x + 24, boss.y);
            ctx.closePath();
            ctx.fill();

            // Crown-like tied top (zigzag)
            ctx.strokeStyle = '#8a4a20';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(boss.x - 12, boss.y - 56);
            ctx.lineTo(boss.x - 6, boss.y - 64);
            ctx.lineTo(boss.x, boss.y - 56);
            ctx.lineTo(boss.x + 6, boss.y - 64);
            ctx.lineTo(boss.x + 12, boss.y - 56);
            ctx.stroke();

            // Texture lines
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(boss.x - 16, boss.y - 16);
            ctx.lineTo(boss.x + 16, boss.y - 16);
            ctx.moveTo(boss.x - 20, boss.y - 32);
            ctx.lineTo(boss.x + 20, boss.y - 32);
            ctx.stroke();

            // Legs (thick sticks, no walking)
            ctx.strokeStyle = '#8a4a20';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(boss.x - 10, boss.y);
            ctx.lineTo(boss.x - 10, boss.y + 12);
            ctx.moveTo(boss.x + 10, boss.y);
            ctx.lineTo(boss.x + 10, boss.y + 12);
            ctx.stroke();

            // Glowing red eyes
            const eyePulse = 0.6 + 0.4 * Math.sin(gameTime * 0.08);
            // Left eye glow
            const eyeGlow1 = ctx.createRadialGradient(boss.x - 8, boss.y - 36, 1, boss.x - 8, boss.y - 36, 8);
            eyeGlow1.addColorStop(0, `rgba(255, 0, 0, ${eyePulse})`);
            eyeGlow1.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = eyeGlow1;
            ctx.beginPath();
            ctx.arc(boss.x - 8, boss.y - 36, 8, 0, Math.PI * 2);
            ctx.fill();
            // Right eye glow
            const eyeGlow2 = ctx.createRadialGradient(boss.x + 8, boss.y - 36, 1, boss.x + 8, boss.y - 36, 8);
            eyeGlow2.addColorStop(0, `rgba(255, 0, 0, ${eyePulse})`);
            eyeGlow2.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = eyeGlow2;
            ctx.beginPath();
            ctx.arc(boss.x + 8, boss.y - 36, 8, 0, Math.PI * 2);
            ctx.fill();
            // Solid red eye dots
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(boss.x - 8, boss.y - 36, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(boss.x + 8, boss.y - 36, 3.5, 0, Math.PI * 2);
            ctx.fill();

            // Windup telegraph for boulder
            if (boss.attackPhase === 'boulder' && boss.windupTimer > 0) {
                const flash = Math.sin(gameTime * 0.3) > 0 ? 1 : 0.3;
                ctx.globalAlpha = flash;
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 20px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('!', boss.x, boss.y - 72);
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }

            // HP bar
            const barW = 50, barH = 5;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(boss.x - barW / 2, boss.y - 74, barW, barH);
            const hpRatio = boss.hp / boss.maxHp;
            const hpColor = hpRatio > 0.5 ? '#4ade80' : hpRatio > 0.25 ? '#fbbf24' : '#ef4444';
            ctx.fillStyle = hpColor;
            ctx.fillRect(boss.x - barW / 2, boss.y - 74, barW * hpRatio, barH);

            // Shockwave visualization
            if (bossShockwave) {
                const alpha = bossShockwave.timer / 60;
                ctx.strokeStyle = `rgba(210, 170, 80, ${alpha * 0.6})`;
                ctx.lineWidth = 2;
                // Left wave edge lines
                for (let i = 0; i < 3; i++) {
                    const lx = bossShockwave.leftX + i * 8;
                    const gy = getGroundY(lx) || (canvas.height - 80 * S);
                    ctx.beginPath();
                    ctx.moveTo(lx, gy);
                    ctx.lineTo(lx + 4, gy - 12 - i * 3);
                    ctx.stroke();
                }
                // Right wave edge lines
                for (let i = 0; i < 3; i++) {
                    const rx = bossShockwave.rightX - i * 8;
                    const gy = getGroundY(rx) || (canvas.height - 80 * S);
                    ctx.beginPath();
                    ctx.moveTo(rx, gy);
                    ctx.lineTo(rx - 4, gy - 12 - i * 3);
                    ctx.stroke();
                }
            }

            // Boss projectiles
            bossProjectiles.forEach(p => {
                if (p.type === 'boulder') {
                    // Large gray circle with crater
                    const r = p.radius || 12;
                    ctx.fillStyle = '#888';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath();
                    ctx.arc(p.x - r * 0.2, p.y - r * 0.1, r * 0.35, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Sand projectile with outer glow
                    ctx.fillStyle = '#c9a84c';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(200, 160, 60, 0.4)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawStormEffects() {
            if (getTimeOfDay() !== 'storm') return;
            const W = canvas.width, H = canvas.height;

            // Rain
            ctx.strokeStyle = 'rgba(180, 200, 255, 0.3)';
            ctx.lineWidth = 1;
            const rainAngle = wind.direction * 3;
            const rainCount = isMobile ? 35 : 80;
            for (let i = 0; i < rainCount; i++) {
                const rx = (i * 17 + gameTime * 3 * (1 + (i % 3) * 0.3)) % (W + 100) - 50;
                const ry = (i * 31 + gameTime * 8 * (1 + (i % 2) * 0.5)) % (H + 50) - 25;
                ctx.beginPath();
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx + rainAngle, ry + 12 + (i % 4) * 2);
                ctx.stroke();
            }

            // Lightning flash
            if (Math.random() < 0.003) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.fillRect(0, 0, W, H);
            }

            // Wind indicator
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = 'bold 14px Georgia';
            ctx.textAlign = 'center';
            const windArrow = wind.direction > 0 ? 'Wind >>>' : '<<< Wind';
            ctx.fillText(windArrow, W / 2, 20);
            ctx.textAlign = 'left';
        }

        function drawPlayer() {
            // Invincibility flash
            const playerFlashing = player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0;

            const x = player.x;
            const y = player.y;
            const f = player.facing;
            const H = player.h; // total height = 56
            // Scale everything relative to player height
            const u = H / 56; // unit scale

            ctx.save();
            ctx.translate(x, y);
            if (f === -1) ctx.scale(-1, 1);
            if (playerFlashing) ctx.globalAlpha = 0.3;
            const isSpace = getTimeOfDay() === 'space' && gameMode === 'play';
            if (isSpace && activeCharacter === 'jj') {
                ctx.translate((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2);
            }

            const legSwing = player.walking
                ? Math.sin(player.walkFrame * 4) * 7
                : (isSpace && activeCharacter === 'jj' ? Math.sin(gameTime * 0.15) * 3 : 0);

            // Proportions: head ~16u, torso ~22u, legs ~18u = 56u total
            const headTop = 0;
            const headCenter = 8 * u;
            const neckY = 16 * u;
            const torsoTop = neckY;
            const torsoBot = 38 * u;
            const legTop = torsoBot;
            const footY = H;

            const lFootX = (-5 - legSwing) * u;
            const rFootX = (5 + legSwing) * u;
            const nearBall = Math.abs(player.x - ball.x) < HIT_RANGE && ball.onGround;

            if (activeCharacter === 'patrick') {
                drawPatrickBody(u, headTop, headCenter, neckY, torsoTop, torsoBot, legTop, footY, H, legSwing, lFootX, rFootX, nearBall);
            } else {

                {
                    // Shadow
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    ctx.ellipse(0, H, 14 * u, 4 * u, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // --- Legs (khaki pants) ---
                    ctx.lineCap = 'round';

                    // Left leg
                    ctx.strokeStyle = '#b09870';
                    ctx.lineWidth = 5 * u;
                    ctx.beginPath();
                    ctx.moveTo(-4 * u, legTop);
                    ctx.lineTo(lFootX, footY - 3 * u);
                    ctx.stroke();

                    // Right leg
                    ctx.beginPath();
                    ctx.moveTo(4 * u, legTop);
                    ctx.lineTo(rFootX, footY - 3 * u);
                    ctx.stroke();

                    // Shoes
                    ctx.fillStyle = BOOT_TIERS[equipment.boots].color;
                    ctx.beginPath();
                    ctx.roundRect(lFootX - 3 * u, footY - 4 * u, 8 * u, 5 * u, 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.roundRect(rFootX - 3 * u, footY - 4 * u, 8 * u, 5 * u, 2);
                    ctx.fill();

                    if (BOOT_TIERS[equipment.boots].wings) {
                        ctx.fillStyle = 'rgba(255,255,255,0.8)';
                        ctx.beginPath();
                        ctx.moveTo(lFootX - 3 * u, footY - 4 * u);
                        ctx.lineTo(lFootX - 8 * u, footY - 8 * u);
                        ctx.lineTo(lFootX - 2 * u, footY - 6 * u);
                        ctx.closePath();
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(rFootX - 3 * u, footY - 4 * u);
                        ctx.lineTo(rFootX - 8 * u, footY - 8 * u);
                        ctx.lineTo(rFootX - 2 * u, footY - 6 * u);
                        ctx.closePath();
                        ctx.fill();
                    }

                    // --- Body (shirt based on equipment tier) ---
                    const shirtColors = SHIRT_TIERS[equipment.shirt].colors;
                    const shirtGrad = ctx.createLinearGradient(-8 * u, torsoTop, 8 * u, torsoBot);
                    shirtGrad.addColorStop(0, shirtColors[0]);
                    shirtGrad.addColorStop(0.5, shirtColors[1]);
                    shirtGrad.addColorStop(1, shirtColors[2]);
                    ctx.fillStyle = shirtGrad;
                    ctx.beginPath();
                    ctx.moveTo(-9 * u, torsoTop);
                    ctx.lineTo(9 * u, torsoTop);
                    ctx.lineTo(8 * u, torsoBot);
                    ctx.lineTo(-8 * u, torsoBot);
                    ctx.closePath();
                    ctx.fill();

                    // Shirt pattern based on tier
                    if (equipment.shirt === 0) {
                        // Plain white - no pattern
                    }
                    if (equipment.shirt === 1) {
                        ctx.fillStyle = 'rgba(255,255,255,0.18)';
                        [[-4, 19], [2, 19], [0, 23], [4, 23], [-4, 27], [2, 27], [-2, 31], [4, 31]].forEach(([dx, dy]) => {
                            ctx.beginPath();
                            ctx.arc(dx * u, dy * u, 1 * u, 0, Math.PI * 2);
                            ctx.fill();
                        });
                    }
                    if (equipment.shirt === 2) {
                        // Striped
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 1.5 * u;
                        for (let sy = torsoTop + 4 * u; sy < torsoBot - 2 * u; sy += 4 * u) {
                            ctx.beginPath();
                            ctx.moveTo(-8 * u, sy);
                            ctx.lineTo(8 * u, sy);
                            ctx.stroke();
                        }
                    }
                    if (equipment.shirt === 3) {
                        // Gold trim
                        ctx.strokeStyle = '#c9a84c';
                        ctx.lineWidth = 1.5 * u;
                        ctx.strokeRect(-9 * u, torsoTop, 18 * u, torsoBot - torsoTop);
                    }
                    if (equipment.shirt === 4) {
                        // Diamond argyle
                        ctx.strokeStyle = 'rgba(185, 242, 255, 0.4)';
                        ctx.lineWidth = 1 * u;
                        for (let dy = torsoTop + 5 * u; dy < torsoBot - 5 * u; dy += 8 * u) {
                            ctx.beginPath();
                            ctx.moveTo(0, dy - 4 * u);
                            ctx.lineTo(5 * u, dy);
                            ctx.lineTo(0, dy + 4 * u);
                            ctx.lineTo(-5 * u, dy);
                            ctx.closePath();
                            ctx.stroke();
                        }
                    }

                    // Collar
                    ctx.strokeStyle = shirtColors[2];
                    ctx.lineWidth = 1.5 * u;
                    ctx.beginPath();
                    ctx.moveTo(-5 * u, torsoTop);
                    ctx.lineTo(0, torsoTop + 2 * u);
                    ctx.lineTo(5 * u, torsoTop);
                    ctx.stroke();

                    // Button line
                    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                    ctx.lineWidth = 0.8 * u;
                    ctx.beginPath();
                    ctx.moveTo(0, torsoTop + 2 * u);
                    ctx.lineTo(0, torsoBot);
                    ctx.stroke();

                    // Belt
                    ctx.fillStyle = '#5a4a30';
                    ctx.fillRect(-8 * u, torsoBot - 2 * u, 16 * u, 3 * u);
                    ctx.fillStyle = '#c9a84c';
                    ctx.fillRect(-1.5 * u, torsoBot - 2 * u, 3 * u, 3 * u); // buckle

                    // --- Arms ---
                    ctx.lineCap = 'round';

                    // Left sleeve + arm
                    ctx.strokeStyle = shirtColors[1];
                    ctx.lineWidth = 5 * u;
                    ctx.beginPath();
                    ctx.moveTo(-9 * u, torsoTop + 2 * u);
                    ctx.lineTo(-12 * u, torsoTop + 8 * u);
                    ctx.stroke();
                    ctx.strokeStyle = '#c4956a';
                    ctx.lineWidth = 3.5 * u;
                    ctx.beginPath();
                    ctx.moveTo(-12 * u, torsoTop + 8 * u);
                    ctx.lineTo(-13 * u, torsoBot - 2 * u);
                    ctx.stroke();

                    // Right sleeve + arm (holding club if near ball, or range finder)
                    ctx.strokeStyle = shirtColors[1];
                    ctx.lineWidth = 5 * u;
                    ctx.beginPath();
                    ctx.moveTo(9 * u, torsoTop + 2 * u);
                    ctx.lineTo(12 * u, torsoTop + 8 * u);
                    ctx.stroke();

                    ctx.strokeStyle = '#c4956a';
                    ctx.lineWidth = 3.5 * u;
                    if (player.rangeFinder) {
                        // Right arm raised, holding range finder to eye
                        ctx.beginPath();
                        ctx.moveTo(12 * u, torsoTop + 8 * u);
                        ctx.lineTo(8 * u, headCenter - 1 * u);
                        ctx.stroke();
                        // Range finder device (small rectangle at eye level)
                        ctx.fillStyle = '#222';
                        ctx.fillRect(5 * u, headCenter - 3 * u, 6 * u, 3 * u);
                        // Lens circle
                        ctx.fillStyle = '#4af';
                        ctx.beginPath();
                        ctx.arc(10 * u, headCenter - 1.5 * u, 1.2 * u, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (nearBall) {
                        ctx.beginPath();
                        ctx.moveTo(12 * u, torsoTop + 8 * u);
                        ctx.lineTo(15 * u, torsoTop + 12 * u);
                        ctx.stroke();
                        // Golf club shaft
                        ctx.strokeStyle = SHAFT_TIERS[equipment.shaft].color;
                        ctx.lineWidth = 2 * u;
                        ctx.beginPath();
                        ctx.moveTo(15 * u, torsoTop + 12 * u);
                        ctx.lineTo(17 * u, footY - 2 * u);
                        ctx.stroke();
                        // Club head
                        ctx.fillStyle = CLUB_TIERS[equipment.club].color;
                        ctx.beginPath();
                        ctx.roundRect(14 * u, footY - 4 * u, 8 * u, 3.5 * u, 1.5);
                        ctx.fill();
                        // Grip
                        ctx.fillStyle = '#333';
                        ctx.fillRect(14 * u, torsoTop + 11 * u, 3 * u, 4 * u);
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(12 * u, torsoTop + 8 * u);
                        ctx.lineTo(14 * u, torsoBot - 2 * u);
                        ctx.stroke();
                    }

                    // --- Head ---
                    ctx.fillStyle = '#c4956a';
                    ctx.beginPath();
                    ctx.ellipse(0, headCenter, 9 * u, 9.5 * u, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Ears
                    ctx.fillStyle = '#b8876a';
                    ctx.beginPath();
                    ctx.ellipse(-9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);
                    ctx.fill();

                    // Hair
                    ctx.fillStyle = '#1a1a1a';
                    ctx.beginPath();
                    ctx.ellipse(0, headTop + 2 * u, 8.5 * u, 5 * u, 0, Math.PI, Math.PI * 2);
                    ctx.fill();
                    ctx.fillRect(-9 * u, headTop + 2 * u, 2.5 * u, 5 * u);
                    ctx.fillRect(6.5 * u, headTop + 2 * u, 2.5 * u, 5 * u);

                    // Glasses
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1.5 * u;
                    ctx.strokeRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);
                    ctx.strokeRect(1 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);
                    ctx.beginPath();
                    ctx.moveTo(-1 * u, headCenter - 1 * u);
                    ctx.lineTo(1 * u, headCenter - 1 * u);
                    ctx.stroke();
                    // Temple arms
                    ctx.beginPath();
                    ctx.moveTo(-7.5 * u, headCenter - 2 * u);
                    ctx.lineTo(-9.5 * u, headCenter - 2.5 * u);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(7.5 * u, headCenter - 2 * u);
                    ctx.lineTo(9.5 * u, headCenter - 2.5 * u);
                    ctx.stroke();
                    // Lens tint
                    ctx.fillStyle = 'rgba(150, 200, 255, 0.12)';
                    ctx.fillRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);
                    ctx.fillRect(1 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);

                    // Eyes
                    if (isSpace && activeCharacter === 'jj') {
                        // Wide frightened eyes - white backgrounds
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.ellipse(-4 * u, headCenter - 0.5 * u, 2.5 * u, 2 * u, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.ellipse(4.5 * u, headCenter - 0.5 * u, 2.5 * u, 2 * u, 0, 0, Math.PI * 2);
                        ctx.fill();
                        // Tiny shrunken pupils
                        ctx.fillStyle = '#2a2a2a';
                        ctx.beginPath();
                        ctx.arc(-4 * u, headCenter - 0.5 * u, 0.6 * u, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4.5 * u, headCenter - 0.5 * u, 0.6 * u, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = '#2a2a2a';
                        ctx.beginPath();
                        ctx.arc(-4 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(4.5 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // Nose
                    ctx.strokeStyle = '#a07858';
                    ctx.lineWidth = 0.8 * u;
                    ctx.beginPath();
                    ctx.moveTo(0, headCenter);
                    ctx.lineTo(0.5 * u, headCenter + 2.5 * u);
                    ctx.stroke();

                    // Expression based on time of day (JJ only)
                    {
                        const tod = gameMode === 'shop' ? 'day' : getTimeOfDay();
                        ctx.strokeStyle = '#8a5a3a';
                        ctx.lineWidth = 1 * u;
                        if (tod === 'day') {
                            // Big smile
                            ctx.beginPath();
                            ctx.arc(0, headCenter + 3 * u, 3.5 * u, 0.1, Math.PI - 0.1);
                            ctx.stroke();
                        } else if (tod === 'afternoon') {
                            // Slight smile / neutral
                            ctx.beginPath();
                            ctx.moveTo(-3 * u, headCenter + 4.5 * u);
                            ctx.lineTo(3 * u, headCenter + 4.5 * u);
                            ctx.stroke();
                        } else if (tod === 'night') {
                            // Worried - slight frown
                            ctx.beginPath();
                            ctx.arc(0, headCenter + 6 * u, 3 * u, Math.PI + 0.3, -0.3);
                            ctx.stroke();
                        } else if (tod === 'space') {
                            // Space - terrified! Large O mouth, raised eyebrows, sweat drops
                            // Large open "O" mouth
                            ctx.fillStyle = '#5a2a1a';
                            ctx.beginPath();
                            ctx.ellipse(0, headCenter + 4.5 * u, 3 * u, 2.5 * u, 0, 0, Math.PI * 2);
                            ctx.fill();
                            // Raised eyebrows (higher than storm)
                            ctx.strokeStyle = '#1a1a1a';
                            ctx.lineWidth = 1.2 * u;
                            ctx.beginPath();
                            ctx.moveTo(-7 * u, headCenter - 6 * u);
                            ctx.quadraticCurveTo(-4 * u, headCenter - 8.5 * u, -1 * u, headCenter - 6 * u);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.moveTo(1 * u, headCenter - 6 * u);
                            ctx.quadraticCurveTo(4 * u, headCenter - 8.5 * u, 7 * u, headCenter - 6 * u);
                            ctx.stroke();
                            // Animated sweat drops flying off head
                            const sweatPhase = Math.sin(gameTime * 0.1);
                            const sweatY1 = headTop - 2 * u + sweatPhase * 4 * u;
                            const sweatY2 = headTop - 1 * u + Math.sin(gameTime * 0.1 + 1.5) * 4 * u;
                            ctx.fillStyle = 'rgba(100, 180, 255, 0.8)';
                            ctx.beginPath();
                            ctx.ellipse(-8 * u, sweatY1, 1 * u, 1.5 * u, 0, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.beginPath();
                            ctx.ellipse(8 * u, sweatY2, 1 * u, 1.5 * u, 0, 0, Math.PI * 2);
                            ctx.fill();
                        } else {
                            // Storm - scared! Open mouth, eyebrows up
                            // Scared open mouth
                            ctx.fillStyle = '#5a2a1a';
                            ctx.beginPath();
                            ctx.ellipse(0, headCenter + 4.5 * u, 2.5 * u, 2 * u, 0, 0, Math.PI * 2);
                            ctx.fill();
                            // Eyebrow raise (draw raised eyebrows above the glasses)
                            ctx.strokeStyle = '#1a1a1a';
                            ctx.lineWidth = 1.2 * u;
                            ctx.beginPath();
                            ctx.moveTo(-7 * u, headCenter - 5 * u);
                            ctx.quadraticCurveTo(-4 * u, headCenter - 7 * u, -1 * u, headCenter - 5 * u);
                            ctx.stroke();
                            ctx.beginPath();
                            ctx.moveTo(1 * u, headCenter - 5 * u);
                            ctx.quadraticCurveTo(4 * u, headCenter - 7 * u, 7 * u, headCenter - 5 * u);
                            ctx.stroke();
                        }
                    }

                } // end JJ standing body

            } // end JJ character

            if (playerFlashing) ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawPatrickBody(u, headTop, headCenter, neckY, torsoTop, torsoBot, legTop, footY, H, legSwing, lFootX, rFootX, nearBall) {

            shirtGrad.addColorStop(1, '#1a1040');
            ctx.fillStyle = shirtGrad;

            ctx.moveTo(-9 * u, torsoTop);

            ctx.fillStyle = '#2a2a2a';

            ctx.beginPath();
            ctx.ellipse(-9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);

            ctx.beginPath();
            ctx.ellipse(9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);

            // Hair (straight black, neat)
            ctx.fillStyle = '#0a0a0a';
