<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JHI Golf Adventure</title>
    <link rel="icon" type="image/png" href="../assets/wheel.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(160deg, #1e5631 0%, #2d6a4f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Georgia, serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            width: min(1200px, 96vw);
            padding: 8px 0;
            align-items: center;
        }

        .title {
            font-size: 1.2rem;
            color: #c9a84c;
            letter-spacing: 2px;
        }

        .info {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .info strong {
            color: #c9a84c;
        }

        #gameCanvas {
            border-radius: 8px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
            touch-action: none;
        }

        .controls-hint {
            width: min(1200px, 96vw);
            padding: 8px 0;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: space-between;
        }

        .gameboy-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px 16px;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 50;
            pointer-events: none;
            background: linear-gradient(160deg, #1e5631 0%, #2d6a4f 100%);
            border-top: 2px solid rgba(201, 168, 76, 0.4);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
        }

        .gameboy-controls::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(88deg, transparent, transparent 3px, rgba(255, 255, 255, 0.015) 3px, rgba(255, 255, 255, 0.015) 4px),
                repeating-linear-gradient(92deg, transparent, transparent 5px, rgba(0, 0, 0, 0.02) 5px, rgba(0, 0, 0, 0.02) 6px);
            pointer-events: none;
            border-radius: inherit;
        }

        @media (pointer: coarse) {
            .gameboy-controls {
                display: flex;
            }

            .controls-hint {
                display: none;
            }

            body {
                justify-content: flex-start;
                padding-top: 5px;
            }
        }

        /* D-pad */
        .dpad {
            display: grid;
            grid-template-columns: 50px 50px 50px;
            grid-template-rows: 50px 50px 50px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .dpad-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d2818;
            color: #c9a84c;
            font-size: 0;
            position: relative;
            border: 1px solid rgba(201, 168, 76, 0.3);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .dpad-btn::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border: 8px solid transparent;
        }

        .dpad-up::after {
            border-bottom-color: #c9a84c;
            border-top: 0;
            margin-top: -4px;
        }

        .dpad-down::after {
            content: none;
        }

        .dpad-left::after {
            border-right-color: #c9a84c;
            border-left: 0;
            margin-left: -4px;
        }

        .dpad-right::after {
            border-left-color: #c9a84c;
            border-right: 0;
            margin-right: -4px;
        }

        .dpad-btn:active {
            background: #c9a84c;
        }

        .dpad-up:active::after {
            border-bottom-color: #0d2818;
        }

        .dpad-down:active::after {
            content: none;
        }

        .dpad-down:active svg circle,
        .dpad-down:active svg line {
            stroke: #0d2818;
        }

        .dpad-left:active::after {
            border-right-color: #0d2818;
        }

        .dpad-right:active::after {
            border-left-color: #0d2818;
        }

        .dpad-up {
            grid-column: 2;
            grid-row: 1;
            border-radius: 8px 8px 0 0;
        }

        .dpad-left {
            grid-column: 1;
            grid-row: 2;
            border-radius: 8px 0 0 8px;
        }

        .dpad-center {
            grid-column: 2;
            grid-row: 2;
            background: #1a472a;
            border: 1px solid rgba(201, 168, 76, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dpad-center::after {
            content: '';
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(201, 168, 76, 0.2);
        }

        .dpad-right {
            grid-column: 3;
            grid-row: 2;
            border-radius: 0 8px 8px 0;
        }

        .dpad-down {
            grid-column: 2;
            grid-row: 3;
            border-radius: 0 0 8px 8px;
        }

        /* Hide corner cells */
        .dpad> :nth-child(n) {
            box-sizing: border-box;
        }

        /* A/B buttons */
        .ab-buttons {
            position: relative;
            width: 130px;
            height: 120px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .ab-btn {
            position: absolute;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #c9a84c;
            color: #1a472a;
            font-weight: bold;
            font-size: 1.1rem;
            font-family: Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(26, 71, 42, 0.4);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .ab-btn:active {
            background: #e0c872;
        }

        #gbA {
            right: 0;
            top: 0;
        }

        #gbB {
            left: 0;
            bottom: 0;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 2.2rem;
            color: #c9a84c;
            margin-bottom: 8px;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .overlay button {
            padding: 14px 40px;
            background: #c9a84c;
            color: #1a472a;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: Georgia, serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .overlay button:hover {
            background: #e0c872;
        }

        .overlay button+button {
            margin-left: 10px;
        }

        #leaderboardTable::-webkit-scrollbar { width: 6px; }
        #leaderboardTable::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 3px; }
        #leaderboardBody tr { border-bottom: 1px solid rgba(255,255,255,0.08); }
        #leaderboardBody td { padding: 5px 4px; font-size: 0.85rem; color: rgba(255,255,255,0.8); }
        #leaderboardBody tr:nth-child(1) td { color: #ffd700; }
        #leaderboardBody tr:nth-child(2) td { color: #c0c0c0; }
        #leaderboardBody tr:nth-child(3) td { color: #cd7f32; }
    </style>
</head>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ==================== AUDIO SYSTEM ====================
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const sounds = {};
        const bgMusic = new Audio('sounds/background-music.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.225;
        let musicStarted = false;

        function loadSound(name, url) {
            fetch(url)
                .then(r => r.arrayBuffer())
                .then(buf => audioCtx.decodeAudioData(buf))
                .then(decoded => { sounds[name] = decoded; });
        }
        loadSound('swing', 'sounds/swing.mp3');
        loadSound('applause', 'sounds/applause.wav');

        function playSound(name, volume = 1.0) {
            if (!sounds[name]) return;
            const source = audioCtx.createBufferSource();
            source.buffer = sounds[name];
            const gain = audioCtx.createGain();
            gain.gain.value = volume;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start(0);
        }

        function startMusic() {
            if (musicStarted) return;
            musicStarted = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            bgMusic.play().catch(() => {});
        }

        // Start music on first user interaction
        ['click', 'touchstart', 'keydown'].forEach(evt => {
            document.addEventListener(evt, startMusic, { once: false });
        });

            S = canvas.width / 800;

            const key = W + ',' + H + ',' + tod;

                cachedVignetteKey = key;
                const vigGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.75);

                vigGrad.addColorStop(1, (tod === 'night' || tod === 'storm') ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.1)');

        function initEnemies() {
            const level = levels[currentHole];
            const baseY = canvas.height - 80 * S;
            activeEnemies = (level.enemies || []).map(e => {
                const gy = getGroundY(e.x);
                return {
                    x: e.x,
                    y: gy !== null ? gy : baseY,
                    hp: e.hp,
                    maxHp: e.hp,
                    patrol: e.patrol,

                };
            });

        function updateEnemies() {
            const tod = getTimeOfDay();
            const attackRange = 300;

            activeEnemies.forEach(e => {
                if (e.dead) {
                    e.deathTimer--;
                    return;
                }

                // Patrol
                e.x += e.dir * e.speed;
                if (e.x <= e.patrol[0]) e.dir = 1;
                if (e.x >= e.patrol[1]) e.dir = -1;
                e.frame += 0.05;

                const gy = getGroundY(e.x);
                if (gy !== null) e.y = gy;

                // Throw sand
                e.throwCooldown = Math.max(0, e.throwCooldown - 1);
                const dist = Math.abs(player.x - e.x);
                if (dist < attackRange && e.throwCooldown <= 0) {
                    const angle = Math.atan2(
                        (player.y + player.h / 2) - (e.y - 20),
                        player.x - e.x
                    );
                    const throwSpeed = 4;
                    sandProjectiles.push({
                        x: e.x,
                        y: e.y - 20,
                        vx: Math.cos(angle) * throwSpeed,
                        vy: Math.sin(angle) * throwSpeed - 2,
                        damage: tod === 'storm' ? 2 : 1
                    });
                    e.throwCooldown = 120 + Math.random() * 60;
                }

                // Ball collision
                if (ball.active && !ball.sunk) {
                    const bdx = ball.x - e.x;
                    const bdy = ball.y - (e.y - 15);
                    const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
                    if (bdist < 20 && (Math.abs(ball.vx) > 1 || Math.abs(ball.vy) > 1)) {
                        e.hp -= getClubDamage();
                        ball.vx *= 0.5;
                        ball.vy *= 0.5;
                        spawnParticles(e.x, e.y - 15, '#d4a853', 10, 3);
                        if (e.hp <= 0) {
                            e.dead = true;
                            e.deathTimer = 60;
                            spawnParticles(e.x, e.y - 15, '#d4a853', 20, 5);
                        }
                    }
                }
            });

            activeEnemies = activeEnemies.filter(e => !e.dead || e.deathTimer > 0);
        }

        function updateSandProjectiles() {
            sandProjectiles.forEach(p => {
                p.vy += getGravity() * 0.5;
                p.x += p.vx;
                p.y += p.vy;

                const dx = p.x - player.x;
                const dy = p.y - (player.y + player.h / 2);
                if (Math.sqrt(dx * dx + dy * dy) < 20) {
                    damagePlayer(p.damage);
                    p.hit = true;
                    spawnParticles(p.x, p.y, '#d4a853', 6, 2);
                }

                const gy = getGroundY(p.x);
                if ((gy !== null && p.y > gy) || p.y > canvas.height + 20) {
                    p.hit = true;
                }
            });
            sandProjectiles = sandProjectiles.filter(p => !p.hit);
        }

        function updateBoss() {
            if (!boss || boss.dead) {
                if (boss && boss.dead) {
                    boss.deathTimer--;
                    if (boss.deathTimer <= 0) boss = null;
                }
                // Update boss projectiles even after death
                bossProjectiles.forEach(p => {
                    p.vy += getGravity() * 0.5;
                    p.x += p.vx;
                    p.y += p.vy;
                    const dx = p.x - player.x;
                    const dy = p.y - (player.y + player.h / 2);
                    if (Math.sqrt(dx * dx + dy * dy) < 20) {
                        damagePlayer(p.damage);
                        p.hit = true;
                        spawnParticles(p.x, p.y, p.type === 'boulder' ? '#888' : '#d4a853', 6, 2);
                    }
                    const gy = getGroundY(p.x);
                    if ((gy !== null && p.y > gy) || p.y > canvas.height + 20) {
                        p.hit = true;
                        if (p.type === 'boulder') {
                            spawnParticles(p.x, p.y, '#888', 10, 4);
                        }
                    }
                });
                bossProjectiles = bossProjectiles.filter(p => !p.hit);
                // Shockwave update
                if (bossShockwave) {
                    bossShockwave.leftX -= bossShockwave.speed;
                    bossShockwave.rightX += bossShockwave.speed;
                    bossShockwave.timer--;
                    if (!bossShockwave.hitPlayer && player.onGround) {
                        if (player.x >= bossShockwave.leftX && player.x <= bossShockwave.rightX) {
                            damagePlayer(2);
                            bossShockwave.hitPlayer = true;
                        }
                    }
                    if (bossShockwave.timer <= 0) bossShockwave = null;
                }
                return;
            }

            // Attack timer
            boss.attackTimer--;

            if (boss.attackTimer <= 0 && boss.attackPhase === 'idle') {
                const attack = boss.attackCycle[boss.attackIndex % boss.attackCycle.length];
                boss.attackPhase = attack;
                boss.windupTimer = 0;

                if (attack === 'barrage') {
                    // Fire 3 sand projectiles in fan spread
                    const baseAngle = Math.atan2(
                        (player.y + player.h / 2) - (boss.y - 25),
                        player.x - boss.x
                    );
                    [-0.3, 0, 0.3].forEach(offset => {
                        const angle = baseAngle + offset;
                        bossProjectiles.push({
                            x: boss.x,
                            y: boss.y - 25,
                            vx: Math.cos(angle) * 5,
                            vy: Math.sin(angle) * 5 - 2,
                            damage: 2,
                            type: 'sand'
                        });
                    });
                    boss.attackTimer = 120;
                    boss.attackPhase = 'idle';
                    boss.attackIndex++;
                } else if (attack === 'slam') {
                    boss.windupTimer = 30;
                    boss.slamY = boss.y;
                    boss.slamActive = false;
                } else if (attack === 'boulder') {
                    boss.windupTimer = 60;
                }
            }

            // Slam windup and execution
            if (boss.attackPhase === 'slam') {
                if (boss.windupTimer > 0) {
                    boss.windupTimer--;
                    boss.y = boss.slamY - (30 - boss.windupTimer) * 1.5; // Rise up
                } else if (!boss.slamActive) {
                    boss.slamActive = true;
                    boss.y = boss.slamY; // Slam down
                    // Create shockwave
                    bossShockwave = {
                        leftX: boss.x,
                        rightX: boss.x,
                        speed: 5,
                        timer: 60,
                        hitPlayer: false,
                        originX: boss.x
                    };
                    // Knock ball away if close
                    if (ball.active && !ball.sunk) {
                        const bdx = ball.x - boss.x;
                        const bdy = ball.y - boss.y;
                        const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
                        if (bdist < 100) {
                            const nx = bdx / (bdist || 1);
                            const ny = bdy / (bdist || 1);
                            ball.vx += nx * 6;
                            ball.vy += ny * 4 - 3;
                        }
                    }
                    spawnParticles(boss.x, boss.y, '#d4a853', 15, 5);
                    boss.attackTimer = 150;
                    boss.attackPhase = 'idle';
                    boss.attackIndex++;
                }
            }

            // Boulder windup and execution
            if (boss.attackPhase === 'boulder') {
                boss.windupTimer--;
                if (boss.windupTimer <= 0) {
                    const angle = Math.atan2(
                        (player.y + player.h / 2) - (boss.y - 25),
                        player.x - boss.x
                    );
                    bossProjectiles.push({
                        x: boss.x,
                        y: boss.y - 25,
                        vx: Math.cos(angle) * 3,
                        vy: Math.sin(angle) * 3 - 2,
                        damage: 3,
                        type: 'boulder',
                        radius: 12
                    });
                    boss.attackTimer = 150;
                    boss.attackPhase = 'idle';
                    boss.attackIndex++;
                }
            }

            // Ball collision with boss
            if (ball.active && !ball.sunk) {
                const bdx = ball.x - boss.x;
                const bdy = ball.y - (boss.y - 25);
                const bdist = Math.sqrt(bdx * bdx + bdy * bdy);
                if (bdist < 35 && (Math.abs(ball.vx) > 1 || Math.abs(ball.vy) > 1)) {
                    boss.hp -= getClubDamage();
                    // Bounce ball back (reflect using normal vector)
                    const nx = bdx / (bdist || 1);
                    const ny = bdy / (bdist || 1);
                    const dot = ball.vx * nx + ball.vy * ny;
                    const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                    ball.vx = (ball.vx - 2 * dot * nx) * 0.7;
                    ball.vy = (ball.vy - 2 * dot * ny) * 0.7;
                    spawnParticles(boss.x, boss.y - 25, '#d4a853', 10, 3);

                    if (boss.hp <= 0) {
                        boss.dead = true;
                        boss.deathTimer = 90;
                        // Massive particle burst
                        spawnParticles(boss.x, boss.y - 30, '#c9a84c', 40, 6);
                        spawnParticles(boss.x, boss.y - 30, '#ff4444', 20, 5);
                    }
                }
            }

            // Player contact damage
            const pdx = player.x - boss.x;
            const pdy = (player.y + player.h / 2) - (boss.y - 25);
            if (Math.sqrt(pdx * pdx + pdy * pdy) < 40) {
                damagePlayer(1);
            }

            // Boss projectile update
            bossProjectiles.forEach(p => {
                p.vy += getGravity() * 0.5;
                p.x += p.vx;
                p.y += p.vy;

                const dx = p.x - player.x;
                const dy = p.y - (player.y + player.h / 2);
                if (Math.sqrt(dx * dx + dy * dy) < 20) {
                    damagePlayer(p.damage);
                    p.hit = true;
                    spawnParticles(p.x, p.y, p.type === 'boulder' ? '#888' : '#d4a853', 6, 2);
                }

                const gy = getGroundY(p.x);
                if ((gy !== null && p.y > gy) || p.y > canvas.height + 20) {
                    p.hit = true;
                    if (p.type === 'boulder') {
                        spawnParticles(p.x, p.y, '#888', 10, 4);
                    }
                }
            });
            bossProjectiles = bossProjectiles.filter(p => !p.hit);

            // Shockwave update
            if (bossShockwave) {
                bossShockwave.leftX -= bossShockwave.speed;
                bossShockwave.rightX += bossShockwave.speed;
                bossShockwave.timer--;
                if (!bossShockwave.hitPlayer && player.onGround) {
                    if (player.x >= bossShockwave.leftX && player.x <= bossShockwave.rightX) {
                        damagePlayer(2);
                        bossShockwave.hitPlayer = true;
                    }
                }
                if (bossShockwave.timer <= 0) bossShockwave = null;
            }
        }

        function getGroundY(x) {
            const level = levels[currentHole];
            const baseY = canvas.height - 80 * S;
            for (const t of level.terrain) {
                if (x >= t.x && x < t.x + t.w) {
                    if (t.h === 0) return baseY + t.y;
                    const progress = (x - t.x) / t.w;
                    return (baseY + t.y) + t.h * progress;
                }
            }
            return null;
        }

        function getPlatformAt(x, y, vy) {
            const level = levels[currentHole];
            for (const p of (level.platforms || [])) {
                const platY = canvas.height - 80 * S + (p.y || 0);
                if (x >= p.x && x <= p.x + p.w) {
                    if (y <= platY && y + vy >= platY - 5) {
                        return platY;
                    }
                }
            }
            return null;
        }

        function damagePlayer(amount) {
            if (player.invincible > 0) return;

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && gameMode === 'cinematic') {
                cinematicSkipped = true;
                return;
            }
            if (changelogMode) {
                e.preventDefault();
                if (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ') {
                    changelogMode = false;
                }
                return;
            }
            if (shopDialogueMode) {
                e.preventDefault();
                if (e.key === 'Escape') {
                    shopDialogueMode = false;
                } else if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') {
                    shopDialogueSelection = 0;
                } else if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') {
                    shopDialogueSelection = 1;
                } else if (e.key === 'Enter' || e.key === ' ') {
                    shopDialogueMode = false;
                    if (shopDialogueSelection === 0) {
                        changelogMode = true;
                        changelogScroll = 0;
                    } else {
                        cheatCodeMode = true;
                        cheatCodeInput = '';
                    }
                }
                return;

            if (cheatCodeMode) {
                e.preventDefault();
                if (e.key === 'Escape') {
                    cheatCodeMode = false;
                    cheatCodeInput = '';
                } else if (e.key === 'Backspace') {
                    cheatCodeInput = cheatCodeInput.slice(0, -1);
                } else if (e.key === 'Enter') {
                    if (cheatCodeInput.toLowerCase() === 'password') {
                        cheatCodeMode = false;
                        cheatCodeInput = '';
                        if (!patrickUnlocked) {
                            if (!usedPatrick && !confirm('If you choose to use the powers of Patrick Wong, you will be ineligible to submit to the leaderboard. Continue?')) {
                                cheatCodeMode = false;
                                cheatCodeInput = '';
                            } else {
                                hasCompletedGame = true;
                                patrickUnlocked = true;
                                activeCharacter = 'patrick';
                                usedPatrick = true;
                                saveCharacterState();
                                saveProgress();
                                shopMessage = 'Patrick Wong unlocked!';
                                shopMessageTimer = 120;
                                teleportAnim = { x: 1150, y: canvas.height - 80 * S - 56, frame: 0, maxFrames: 60 };
                            }
                        } else {
                            shopMessage = 'Already unlocked!';
                            shopMessageTimer = 90;
                        }
                    } else {
                        shopMessage = 'Wrong code...';
                        shopMessageTimer = 90;
                        cheatCodeMode = false;
                        cheatCodeInput = '';
                    }
                } else if (e.key.length === 1) {
                    cheatCodeInput += e.key;
                }
                return;
            }
            if (e.key === ' ') {
                e.preventDefault();
                if (gameMode === 'play' && activeCharacter !== 'patrick') {
                    handleMobileHit();
                }
                return;
            }
            keys[e.key.toLowerCase()] = true;
        });
        document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Gameboy-style controls
        function setupGBBtn(id, keyDown, keyUp) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', e => { e.preventDefault(); keys[keyDown] = true; });
            btn.addEventListener('touchend', e => { e.preventDefault(); keys[keyDown] = false; if (keyUp) keyUp(); });
            btn.addEventListener('touchcancel', e => { keys[keyDown] = false; if (keyUp) keyUp(); });
        }

        setupGBBtn('gbLeft', 'a');
        setupGBBtn('gbRight', 'd');
        setupGBBtn('gbUp', 'w');
        setupGBBtn('gbDown', 'crouchKey');

        // A button = jump
        setupGBBtn('gbA', 'w');

        // B button = hit
        const gbB = document.getElementById('gbB');
        if (gbB) {
            gbB.addEventListener('touchstart', e => { e.preventDefault(); handleMobileHit(); });
            gbB.addEventListener('click', e => { e.preventDefault(); handleMobileHit(); });
        }

        function handleMobileHit() {
            // In dialogue mode, B toggles selection
            if (shopDialogueMode) {
                shopDialogueSelection = shopDialogueSelection === 0 ? 1 : 0;
                return;
            }
            // In changelog mode, B closes it
            if (changelogMode) {
                changelogMode = false;
                return;
            }
            if (activeCharacter === 'patrick') {
                if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
                if (!playerNearBall()) return;
                if (!psychicMode) {
                    psychicMode = true;
                    psychicBallTarget = { x: ball.x, y: ball.y - 50 };
                    strokes++;
                    document.getElementById('strokeNum').textContent = strokes;
                } else {
                    psychicMode = false;
                    psychicBallTarget = null;
                    ball.onGround = false;
                    ball.justHit = 0;
                }
                return;
            }

            if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
            if (!playerNearBall()) return;

            if (!mobileHitMode) {
                // Start aim - angle phase
                mobileHitMode = true;
                mobileAimPhase = 'angle';
                mobileAimAngle = -0.4; // start angle
                mobileAimDir = -1; // sweeping upward
                mobileAimPower = 10;
                if (gbB) gbB.textContent = 'AIM';
                document.getElementById('statusText').textContent = 'Press SPACE to set angle';
            } else if (mobileAimPhase === 'angle') {
                // Lock angle, start power phase
                mobileAimPhase = 'power';
                mobileAimPower = 3;
                mobileAimDir = 1;
                if (gbB) gbB.textContent = 'POW';
                document.getElementById('statusText').textContent = 'Press SPACE to set power';
            } else if (mobileAimPhase === 'power') {
                // Execute hit
                const dir = player.facing;
                const clubPow = getClubPower();
                ball.vx = Math.cos(mobileAimAngle) * mobileAimPower * dir * clubPow;
                ball.vy = Math.sin(mobileAimAngle) * mobileAimPower * clubPow;
                ball.onGround = false;
                ball.justHit = 10;
                strokes++;
                document.getElementById('strokeNum').textContent = strokes;
                spawnParticles(ball.x, ball.y, '#fff', 8, 3);
                playSound('swing', 0.6);
                mobileHitMode = false;
                if (gbB) gbB.textContent = 'B';
                document.getElementById('statusText').textContent = '';
            }
        }

        // Aim with mouse/touch on canvas
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const t = e.touches ? e.touches[0] : e;
            return {
                x: (t.clientX - rect.left) * scaleX + cameraX,
                y: (t.clientY - rect.top) * scaleY
            };
        }

        function ballIsSettled() {
            return Math.abs(ball.vx) < 0.5 && Math.abs(ball.vy) < 0.5;
        }

        canvas.addEventListener('mousedown', e => startAim(getCanvasPos(e)));
        canvas.addEventListener('mousemove', e => moveAim(getCanvasPos(e)));
        canvas.addEventListener('mouseup', e => endAim(getCanvasPos(e)));
        canvas.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length === 1) startAim(getCanvasPos(e)); }, { passive: false });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); moveAim(getCanvasPos(e)); }, { passive: false });
        canvas.addEventListener('touchend', e => { e.preventDefault(); endAim(aimEnd); }, { passive: false });

        function playerNearBall() {
            return Math.abs(player.x - ball.x) < HIT_RANGE;
        }

        function startAim(pos) {
            if (activeCharacter === 'patrick') {
                if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
                if (!playerNearBall()) return;
                psychicMode = true;
                psychicBallTarget = { x: pos.x, y: pos.y };
                strokes++;
                document.getElementById('strokeNum').textContent = strokes;
                return;
            }
            // JJ on desktop uses spacebar hit — skip mouse drag aim
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (!isTouchDevice) return;
            if (ball.sunk || !ball.onGround || !ballIsSettled()) return;
            if (!playerNearBall()) return;
            const dx = pos.x - ball.x, dy = pos.y - ball.y;
            if (Math.sqrt(dx * dx + dy * dy) > 100) return;
            aiming = true;
            aimStart = { ...pos };
            aimEnd = { ...pos };
        }

        function moveAim(pos) {
            if (activeCharacter === 'patrick' && psychicMode) {
                psychicBallTarget = { x: pos.x, y: pos.y };
                return;
            }
            if (!aiming) return;
            aimEnd = { ...pos };
        }

        function endAim(pos) {
            if (activeCharacter === 'patrick' && psychicMode) {
                psychicMode = false;
                psychicBallTarget = null;
                ball.onGround = false;
                ball.justHit = 0;
                return;
            }
            if (!aiming) return;
            aiming = false;
            const dx = aimStart.x - aimEnd.x;
            const dy = aimStart.y - aimEnd.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 8) return;

            const power = Math.min(dist / 8, MAX_HIT_POWER) * getClubPower();
            const angle = Math.atan2(dy, dx);
            ball.vx = Math.cos(angle) * power;
            ball.vy = Math.sin(angle) * power;
            ball.onGround = false;
            ball.justHit = 10; // grace frames
            strokes++;
            document.getElementById('strokeNum').textContent = strokes;
            spawnParticles(ball.x, ball.y, '#fff', 8, 3);
            playSound('swing', 0.6);
        }

        // ==================== UPDATE ====================
        function update() {
            const level = levels[currentHole];
            if (ball.sunk) return;
            gameTime++;
            if (player.invincible > 0) player.invincible--;

            // Mobile aim animation
            if (mobileHitMode) {
                if (mobileAimPhase === 'angle') {
                    mobileAimAngle += mobileAimDir * 0.03;
                    if (mobileAimAngle < -1.4) mobileAimDir = 1;
                    if (mobileAimAngle > -0.1) mobileAimDir = -1;
                } else if (mobileAimPhase === 'power') {
                    mobileAimPower += mobileAimDir * 0.2;
                    if (mobileAimPower > MAX_HIT_POWER) mobileAimDir = -1;
                    if (mobileAimPower < 3) mobileAimDir = 1;
                }
            }

            // --- Range Finder ---
            player.rangeFinder = !!(keys['s'] || keys['arrowdown'] || keys['crouchKey']);

            // --- Player movement ---
            player.walking = false;
            if (player.rangeFinder) {
                player.vx = 0;
            } else if (keys['a'] || keys['arrowleft']) {
                player.vx = -PLAYER_SPEED;
                player.facing = -1;
                player.walking = true;
            } else if (keys['d'] || keys['arrowright']) {
                player.vx = PLAYER_SPEED;
                player.facing = 1;
                player.walking = true;
            } else {
                player.vx = 0;
            }

            // Cancel swing if player moves or jumps during aim
            if ((mobileHitMode || aiming) && (player.walking || keys['w'] || keys['arrowup'])) {
                mobileHitMode = false;
                mobileAimPhase = 'angle';
                aiming = false;
                const gbB = document.getElementById('gbB');
                if (gbB) gbB.textContent = 'B';
                document.getElementById('statusText').textContent = '';
            }

            const jumpPressed = keys['w'] || keys['arrowup'];
            if (jumpPressed && !player.jumpHeld) {
                const maxJ = getMaxJumps();
                if (player.onGround || player.jumpsLeft > 0) {
                    player.vy = JUMP_FORCE;
                    player.onGround = false;
                    if (maxJ !== Infinity) {
                        player.jumpsLeft--;
                    }
                    if (BOOT_TIERS[equipment.boots].wings && !player.onGround) {
                        spawnParticles(player.x, player.y + player.h * 0.8, '#fff', 4, 1.5);
                    }
                }
                player.jumpHeld = true;
            }
            if (!jumpPressed) player.jumpHeld = false;

            player.vy += getGravity();
            player.x += player.vx;
            player.y += player.vy;

            if (player.walking) player.walkFrame += 0.15;
            else player.walkFrame = 0;

            // Player ground collision
            const pGroundY = getGroundY(player.x);
            const pPlatY = getPlatformAt(player.x, player.y + player.h, player.vy);
            const effectiveGround = pPlatY !== null ? pPlatY : pGroundY;

            if (effectiveGround !== null && player.y + player.h >= effectiveGround) {
                player.y = effectiveGround - player.h;
                player.vy = 0;
                player.onGround = true;
                player.jumpsLeft = getMaxJumps() === Infinity ? 99 : getMaxJumps();
            } else if (effectiveGround === null) {
                player.onGround = false;
            }

            if (player.y > canvas.height + 50) {
                damagePlayer(1);
                if (player.hp > 0) {
                    const pGY = getGroundY(level.playerStart.x) || (canvas.height - 80 * S);
                    player.x = level.playerStart.x;
                    player.y = pGY - player.h;
                    player.vx = 0; player.vy = 0;
                }
            }
            player.x = Math.max(10, player.x);

            // --- Ball physics ---
            if (ball.active) {
                if (ball.justHit > 0) ball.justHit--;

                // Psychic levitation
                if (activeCharacter === 'patrick' && psychicMode && psychicBallTarget) {
                    const pdx = psychicBallTarget.x - ball.x;
                    const pdy = psychicBallTarget.y - ball.y;
                    ball.vx = pdx * 0.12;
                    ball.vy = pdy * 0.12;
                    ball.onGround = false;
                    ball.justHit = 5;
                }

                if (!ball.onGround) {
                    // Gravity
                    ball.vy += getGravity();
                    // Air drag
                    ball.vx *= BALL_AIR_DRAG;
                    ball.vy *= BALL_AIR_DRAG;
                    // Quadratic drag at high speed
                    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                    if (speed > 2) {
                        const drag = 0.0005 * speed;
                        ball.vx -= ball.vx * drag;
                        ball.vy -= ball.vy * drag;
                    }
                    // Wind force
                    if (wind.strength > 0) {
                        ball.vx += wind.direction * wind.strength;
                    }
                }

                ball.x += ball.vx;
                ball.y += ball.vy;

                // Ground collision (skip if just hit)
                if (ball.justHit <= 0) {
                    const bGroundY = getGroundY(ball.x);
                    const bPlatY = getPlatformAt(ball.x, ball.y + ball.r, ball.vy);
                    const bEffGround = bPlatY !== null ? bPlatY : bGroundY;

                    // If ball is rolling on ground, snap to terrain surface (handles downhill slopes)
                    if (ball.onGround && bEffGround !== null && ball.y + ball.r < bEffGround) {
                        ball.y = bEffGround - ball.r;
                    }

                    if (bEffGround !== null && ball.y + ball.r >= bEffGround) {
                        ball.y = bEffGround - ball.r;

                        // Slope normal calculation
                        const slopeCheck = 4;
                        const gyL = getGroundY(ball.x - slopeCheck);
                        const gyR = getGroundY(ball.x + slopeCheck);

                        if (gyL !== null && gyR !== null) {
                            const tx = slopeCheck * 2;
                            const ty = gyR - gyL;
                            const tLen = Math.sqrt(tx * tx + ty * ty);
                            // Normal pointing UP (away from ground) in canvas coords
                            const nx = ty / tLen;
                            const ny = -tx / tLen;

                            const dot = ball.vx * nx + ball.vy * ny;

                            if (dot < 0) { // moving into ground
                                if (Math.abs(dot) > 2) {
                                    // Bounce with energy loss
                                    const bounceFactor = BALL_BOUNCE * Math.max(0.3, 1 - Math.abs(dot) * 0.02);
                                    ball.vx -= (1 + bounceFactor) * dot * nx;
                                    ball.vy -= (1 + bounceFactor) * dot * ny;
                                    ball.vx *= 0.95;
                                    ball.onGround = false;
                                    spawnParticles(ball.x, bEffGround, '#4a8', 3, 1.5);
                                } else {
                                    // Settle onto surface
                                    ball.vx -= dot * nx;
                                    ball.vy -= dot * ny;
                                    ball.onGround = true;
                                }
                            } else {
                                // Ball on surface but not moving into it - settle
                                ball.vy = 0;
                                ball.onGround = true;
                            }

                            // Slope gravity - ball rolls downhill
                            if (ball.onGround) {
                                const slopeAngle = Math.atan2(ty, tx);
                                ball.vx += Math.sin(slopeAngle) * 0.15;
                            }
                        } else {
                            // No slope info - simple bounce
                            if (Math.abs(ball.vy) > 2) {
                                ball.vy = -ball.vy * BALL_BOUNCE;
                                ball.onGround = false;
                            } else {
                                ball.vy = 0;
                                ball.onGround = true;
                            }
                        }

                        // Rolling friction
                        if (ball.onGround) {
                            const groundSpeed = Math.abs(ball.vx);
                            if (groundSpeed > 0.1) {
                                const frictionCoeff = groundSpeed > 3 ? BALL_GROUND_FRICTION : 0.975;
                                ball.vx *= frictionCoeff;
                            }
                        }

                        // Sand trap friction
                        for (const s of (level.sand || [])) {
                            if (ball.x >= s.x && ball.x <= s.x + s.w) {
                                ball.vx *= 0.88;
                                if (Math.abs(ball.vx) < 0.5) ball.vx *= 0.8;
                            }
                        }
                    } else if (bEffGround === null) {
                        ball.onGround = false;
                    }
                }

                // Ball falls in water
                for (const w of (level.water || [])) {
                    const waterY = canvas.height - 80 * S;
                    if (ball.x >= w.x && ball.x <= w.x + w.w && ball.y > waterY - 10) {
                        const resetY = getGroundY(level.ballStart.x) || (canvas.height - 80 * S);
                        ball.x = level.ballStart.x;
                        ball.y = resetY - ball.r;
                        ball.vx = 0; ball.vy = 0;
                        ball.onGround = true;
                        ball.justHit = 0;
                        strokes++;
                        document.getElementById('strokeNum').textContent = strokes;
                        document.getElementById('statusText').textContent = 'Water! +1 penalty';
                        spawnParticles(ball.x, waterY, '#48f', 12, 3);
                        break;
                    }
                }

                // Ball falls into void
                if (ball.y > canvas.height + 60) {
                    const resetY = getGroundY(level.ballStart.x) || (canvas.height - 80 * S);
                    ball.x = level.ballStart.x;
                    ball.y = resetY - ball.r;
                    ball.vx = 0; ball.vy = 0;
                    ball.onGround = true;
                    ball.justHit = 0;
                    strokes++;
                    document.getElementById('strokeNum').textContent = strokes;
                }

                // Stop ball when barely moving on ground
                if (ball.onGround) {
                    ball.vy = 0; // Always zero out vertical velocity on ground
                    if (Math.abs(ball.vx) < 0.15) {
                        ball.vx *= 0.8;
                        if (Math.abs(ball.vx) < 0.02) ball.vx = 0;
                    }
                }

                // --- Enemies ---
                updateEnemies();
                updateSandProjectiles();

                // --- Asteroids ---
                activeAsteroids.forEach(a => {
                    a.phase += a.driftSpeed * 0.02;
                    a.x = a.baseX + Math.sin(a.phase) * a.driftRange * 0.3;
                    a.y = a.baseY + Math.sin(a.phase * 0.7) * a.driftRange * 0.5;

                    // Ball-asteroid collision
                    if (ball.active && !ball.sunk) {
                        const dx = ball.x - a.x;
                        const dy = ball.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < a.radius + ball.r) {
                            // Reflect ball off asteroid
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const dot = ball.vx * nx + ball.vy * ny;
                            ball.vx = (ball.vx - 2 * dot * nx) * 0.8;
                            ball.vy = (ball.vy - 2 * dot * ny) * 0.8;
                            // Push ball outside asteroid
                            ball.x = a.x + nx * (a.radius + ball.r + 1);
                            ball.y = a.y + ny * (a.radius + ball.r + 1);
                            // Spawn gray particles
                            spawnParticles(ball.x, ball.y, '#888', 8, 3);
                        }
                    }
                });

                // --- Boss ---
                if (boss) updateBoss();

                // Check hole
                const hDx = ball.x - hole.x;
                const hDy = (ball.y + ball.r) - hole.y;
                const hDist = Math.sqrt(hDx * hDx + hDy * hDy);
                const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
                const bossAlive = boss && !boss.dead;

                if (hDist < hole.r && speed < 7 && !bossAlive) {
                    ball.sunk = true;
                    ball.x = hole.x;
                    ball.y = hole.y - ball.r;
                    ball.vx = 0; ball.vy = 0;
                    spawnParticles(hole.x, hole.y, '#c9a84c', 15, 4);
                    onHoleSunk();
                }

                // Gravity pull near hole
                if (hDist < hole.r + 15 && speed < 4 && ball.onGround && !bossAlive) {
                    ball.vx += (hole.x - ball.x) * 0.008;
                }
            }

            // --- Particles ---
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.08;
                p.life -= p.decay;
                return p.life > 0;
            });

            // --- Camera ---
            if (player.rangeFinder) {
                // Zoom out to show full course
                const level = levels[currentHole];
                const maxTerrainX = level.terrain.reduce((max, t) => Math.max(max, t.x + t.w), 0);
                const targetZoom = Math.min(1, canvas.width / (maxTerrainX + 100));
                cameraZoom += (targetZoom - cameraZoom) * 0.06;
                const idealCam = (maxTerrainX / 2) * cameraZoom - canvas.width * 0.5;
                cameraX += (idealCam - cameraX) * 0.05;
            } else {
                cameraZoom += (1 - cameraZoom) * 0.08;
                const ballMoving = Math.abs(ball.vx) > 2 || Math.abs(ball.vy) > 2;
                const psychicActive = activeCharacter === 'patrick' && psychicMode;
                const target = (ballMoving || psychicActive) ? ball.x : player.x;
                const idealCam = target - canvas.width * 0.35;
                cameraX += (idealCam - cameraX) * 0.08;
            }
            cameraX = Math.max(0, cameraX);

            // Status
            if (!ball.sunk) {
                if (playerNearBall() && ball.onGround && ballIsSettled() && !mobileHitMode) {
                    const hitMsg = activeCharacter === 'patrick' ? 'Click the ball to aim!' : 'Press SPACE to hit!';
                    document.getElementById('statusText').textContent = hitMsg;
                } else if (ballIsSettled() && !playerNearBall() && !mobileHitMode) {
                    document.getElementById('statusText').textContent = 'Walk closer to the ball';
                } else if (!ballIsSettled()) {
                    document.getElementById('statusText').textContent = '';
                }
            }
        }

        // ==================== TIME OF DAY ====================
        // Holes 1-2: morning/day, 3-4: late afternoon/sunset, 5-6: night
        function getTimeOfDay() {
            if (currentHole <= 1) return 'day';
            if (currentHole <= 3) return 'afternoon';
            if (currentHole <= 5) return 'night';
            if (currentHole <= 7) return 'storm';
            return 'space';
        }
