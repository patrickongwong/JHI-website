function simulateTrajectory(startX, startY, vx, vy, steps) {
    const points = [];
    let x = startX, y = startY;
    for (let i = 0; i < steps; i++) {
        vy += GRAVITY;
        vx *= BALL_AIR_DRAG;
        vy *= BALL_AIR_DRAG;
        x += vx;
        y += vy;
        points.push({ x, y });
        const gy = getGroundY(x);
        if (gy !== null && y >= gy) break;
    }
    return points;
}

// ==================== DRAWING ====================
function draw() {
    const W = canvas.width, H = canvas.height;
    const level = levels[currentHole];
    const baseY = H - 80 * S;
    const theme = getTheme();
    const tod = getTimeOfDay();

    ctx.save();

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, theme.sky[0]);
    skyGrad.addColorStop(0.25, theme.sky[1]);
    skyGrad.addColorStop(0.5, theme.sky[2]);
    skyGrad.addColorStop(0.75, theme.sky[3]);
    skyGrad.addColorStop(1, theme.sky[4]);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Stars (fade in with afternoon, full at night)
    if (theme.starAlpha > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        const starSeed = [23, 67, 134, 201, 278, 345, 412, 489, 556, 623, 690, 45, 112, 179, 246, 313, 380, 447, 514, 581];
        starSeed.forEach((sx, i) => {
            const sy = 10 + (i * 37 + sx) % (H * 0.35);
            const blink = 0.3 + 0.7 * Math.abs(Math.sin(gameTime * 0.01 + i));
            ctx.globalAlpha = blink * theme.starAlpha;
            ctx.beginPath();
            ctx.arc(sx % W, sy, 1 + (i % 3) * 0.3, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    // Sun / Sunset / Moon
    if (tod === 'day') {
        // Sun with glow
        const sunX = W - 100, sunY = 60;
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 10, sunX, sunY, 60);
        sunGlow.addColorStop(0, 'rgba(255, 240, 150, 0.9)');
        sunGlow.addColorStop(0.3, 'rgba(255, 220, 100, 0.3)');
        sunGlow.addColorStop(0.7, 'rgba(255, 200, 80, 0.08)');
        sunGlow.addColorStop(1, 'rgba(255, 200, 80, 0)');
        ctx.fillStyle = sunGlow;
        ctx.beginPath();
        ctx.arc(sunX, sunY, 60, 0, Math.PI * 2);
        ctx.fill();
        // Sun rays
        ctx.strokeStyle = 'rgba(255, 230, 120, 0.12)';
        ctx.lineWidth = 1.5;
        for (let r = 0; r < 12; r++) {
            const a = r * Math.PI / 6 + gameTime * 0.003;
            ctx.beginPath();
            ctx.moveTo(sunX + Math.cos(a) * 22, sunY + Math.sin(a) * 22);
            ctx.lineTo(sunX + Math.cos(a) * (36 + Math.sin(gameTime * 0.02 + r) * 4), sunY + Math.sin(a) * (36 + Math.sin(gameTime * 0.02 + r) * 4));
            ctx.stroke();
        }
        // Sun body
        ctx.fillStyle = '#ffe866';
        ctx.beginPath();
        ctx.arc(sunX, sunY, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255, 255, 200, 0.6)';
        ctx.beginPath();
        ctx.arc(sunX - 4, sunY - 4, 8, 0, Math.PI * 2);
        ctx.fill();
    } else if (tod === 'afternoon') {
        // Setting sun at horizon
        const sunX = W * 0.75, sunY = baseY - 60;
        // Horizon glow
        const horizGlow = ctx.createRadialGradient(sunX, sunY + 20, 10, sunX, sunY + 20, 150);
        horizGlow.addColorStop(0, 'rgba(255, 160, 50, 0.35)');
        horizGlow.addColorStop(0.4, 'rgba(255, 100, 50, 0.15)');
        horizGlow.addColorStop(1, 'rgba(255, 80, 30, 0)');
        ctx.fillStyle = horizGlow;
        ctx.fillRect(0, baseY - 180, W, 200);
        // Sun body (partially behind horizon)
        const sunGrad = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 25);
        sunGrad.addColorStop(0, '#ffe080');
        sunGrad.addColorStop(0.6, '#ff9944');
        sunGrad.addColorStop(1, '#e85530');
        ctx.fillStyle = sunGrad;
        ctx.beginPath();
        ctx.arc(sunX, sunY, 22, 0, Math.PI * 2);
        ctx.fill();
        // Sun glow ring
        ctx.fillStyle = 'rgba(255, 180, 80, 0.15)';
        ctx.beginPath();
        ctx.arc(sunX, sunY, 35, 0, Math.PI * 2);
        ctx.fill();
    } else {
        // Moon (night)
        ctx.fillStyle = 'rgba(255, 250, 220, 0.9)';
        ctx.beginPath();
        ctx.arc(W - 80, 50, 22, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(240, 230, 190, 0.3)';
        ctx.beginPath();
        ctx.arc(W - 80, 50, 30, 0, Math.PI * 2);
        ctx.fill();
        // Moon craters
        ctx.fillStyle = 'rgba(200, 190, 160, 0.2)';
        ctx.beginPath(); ctx.arc(W - 88, 45, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(W - 74, 55, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(W - 80, 42, 2, 0, Math.PI * 2); ctx.fill();
    }

    // Distant hills (parallax)
    const hillOffset = cameraX * 0.15;
    ctx.fillStyle = theme.hillFar;
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 2) {
        const hx = x + hillOffset;
        const hy = baseY - 40 - Math.sin(hx * 0.008) * 25 - Math.sin(hx * 0.003) * 40;
        ctx.lineTo(x, hy);
    }
    ctx.lineTo(W, baseY);
    ctx.closePath();
    ctx.fill();

    // Trees on distant hills
    if (tod === 'day' || tod === 'afternoon') {
        const treeColor = tod === 'day' ? 'rgba(30, 90, 45, 0.5)' : 'rgba(25, 55, 35, 0.5)';
        ctx.fillStyle = treeColor;
        for (let tx = 20; tx < W; tx += 35 + (tx * 7 % 20)) {
            const hx = tx + hillOffset;
            const treeBase = baseY - 40 - Math.sin(hx * 0.008) * 25 - Math.sin(hx * 0.003) * 40;
            const treeH = 12 + (tx * 3 % 10);
            ctx.beginPath();
            ctx.moveTo(tx - 5, treeBase);
            ctx.lineTo(tx, treeBase - treeH);
            ctx.lineTo(tx + 5, treeBase);
            ctx.closePath();
            ctx.fill();
        }
    }

    // Closer hills
    ctx.fillStyle = theme.hillNear;
    ctx.beginPath();
    ctx.moveTo(0, baseY);
    for (let x = 0; x <= W; x += 2) {
        const hx = x + cameraX * 0.3;
        const hy = baseY - 20 - Math.sin(hx * 0.012 + 1) * 18 - Math.sin(hx * 0.005) * 25;
        ctx.lineTo(x, hy);
    }
    ctx.lineTo(W, baseY);
    ctx.closePath();
    ctx.fill();

    // Clouds
    ctx.fillStyle = `rgba(255,255,255,${theme.cloudAlpha})`;
    const cloudOffset = cameraX * 0.2;
    [100, 300, 550, 750, 950].forEach((cx, i) => {
        const x = cx - cloudOffset + (i % 2) * 50;
        const y = 40 + i * 18 + Math.sin(gameTime * 0.005 + i) * 3;
        ctx.beginPath();
        ctx.ellipse(x, y, 55 + i * 12, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + 30, y + 5, 35, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        // Extra cloud body for fluffier look
        ctx.beginPath();
        ctx.ellipse(x - 20, y + 3, 30, 10, 0, 0, Math.PI * 2);
        ctx.fill();
    });

    // Afternoon tint on clouds
    if (tod === 'afternoon') {
        ctx.fillStyle = 'rgba(255, 140, 60, 0.06)';
        [100, 300, 550, 750, 950].forEach((cx, i) => {
            const x = cx - cloudOffset + (i % 2) * 50;
            const y = 40 + i * 18 + Math.sin(gameTime * 0.005 + i) * 3;
            ctx.beginPath();
            ctx.ellipse(x, y, 55 + i * 12, 16, 0, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // Camera transform
    ctx.translate(-cameraX, 0);

    // --- Draw terrain ---
    level.terrain.forEach(t => {
        const startY = baseY + t.y;
        const endY = baseY + t.y + t.h;

        // Earth layer
        ctx.fillStyle = theme.earth;
        ctx.beginPath();
        ctx.moveTo(t.x, startY + 12);
        ctx.lineTo(t.x + t.w, endY + 12);
        ctx.lineTo(t.x + t.w, H + 20);
        ctx.lineTo(t.x, H + 20);
        ctx.closePath();
        ctx.fill();

        // Dirt layer with subtle texture
        ctx.fillStyle = theme.dirt;
        ctx.beginPath();
        ctx.moveTo(t.x, startY + 6);
        ctx.lineTo(t.x + t.w, endY + 6);
        ctx.lineTo(t.x + t.w, H + 20);
        ctx.lineTo(t.x, H + 20);
        ctx.closePath();
        ctx.fill();

        // Dirt texture (rocks/pebbles)
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        for (let rx = t.x + 8; rx < t.x + t.w - 8; rx += 15 + (rx * 13 % 12)) {
            const progress = (rx - t.x) / t.w;
            const ry = startY + t.h * progress + 14 + (rx * 7 % 20);
            if (ry < H) {
                ctx.beginPath();
                ctx.ellipse(rx, ry, 2 + (rx % 3), 1.5, (rx % 4) * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Main grass
        const grassGrad = ctx.createLinearGradient(0, startY - 5, 0, startY + 15);
        grassGrad.addColorStop(0, theme.grassTop);
        grassGrad.addColorStop(0.3, theme.grassMid);
        grassGrad.addColorStop(1, theme.grassBot);
        ctx.fillStyle = grassGrad;
        ctx.beginPath();
        ctx.moveTo(t.x, startY);
        ctx.lineTo(t.x + t.w, endY);
        ctx.lineTo(t.x + t.w, endY + 12);
        ctx.lineTo(t.x, startY + 12);
        ctx.closePath();
        ctx.fill();

        // Grass blades on top edge (wind animation)
        ctx.strokeStyle = theme.grassBlade;
        ctx.lineWidth = 1.5;
        const windPhase = gameTime * 0.015;
        for (let gx = t.x; gx < t.x + t.w; gx += 6 + Math.random() * 4) {
            const progress = (gx - t.x) / t.w;
            const gy = startY + t.h * progress;
            const bladeH = 4 + Math.random() * 5;
            const lean = Math.sin(gx * 0.3 + windPhase) * 1.8;
            ctx.beginPath();
            ctx.moveTo(gx, gy);
            ctx.quadraticCurveTo(gx + lean, gy - bladeH * 0.6, gx + lean * 1.2, gy - bladeH);
            ctx.stroke();
        }

        // Occasional flowers/details in daytime
        if (tod === 'day') {
            const flowerColors = ['#e85', '#e58', '#fe6', '#8cf'];
            for (let fx = t.x + 20; fx < t.x + t.w - 20; fx += 40 + (fx * 11 % 30)) {
                const progress = (fx - t.x) / t.w;
                const fy = startY + t.h * progress - 3;
                ctx.fillStyle = flowerColors[Math.floor(fx * 3) % flowerColors.length];
                ctx.beginPath();
                ctx.arc(fx, fy, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    });

    // Platforms
    (level.platforms || []).forEach(p => {
        const py = baseY + (p.y || 0);
        // Platform with depth
        ctx.fillStyle = theme.platDark;
        ctx.fillRect(p.x, py + 8, p.w, 22);
        ctx.fillStyle = theme.platGrass;
        ctx.fillRect(p.x, py, p.w, 10);
        // Top highlight
        ctx.fillStyle = theme.grassBlade;
        ctx.fillRect(p.x, py, p.w, 3);
        // Grass on platform
        ctx.strokeStyle = theme.platBlade;
        ctx.lineWidth = 1;
        for (let gx = p.x + 3; gx < p.x + p.w - 3; gx += 5) {
            const lean = Math.sin(gx * 0.4 + gameTime * 0.015) * 1;
            ctx.beginPath();
            ctx.moveTo(gx, py);
            ctx.lineTo(gx + lean, py - 3 - (gx * 7 % 3));
            ctx.stroke();
        }
    });

    // Water
    (level.water || []).forEach(w => {
        const wy = baseY;
        // Deep water with time-of-day tinting
        const waterGrad = ctx.createLinearGradient(0, wy - 8, 0, H);
        if (tod === 'day') {
            waterGrad.addColorStop(0, 'rgba(40, 140, 230, 0.7)');
            waterGrad.addColorStop(0.5, 'rgba(30, 100, 200, 0.8)');
            waterGrad.addColorStop(1, 'rgba(15, 60, 140, 0.9)');
        } else if (tod === 'afternoon') {
            waterGrad.addColorStop(0, 'rgba(80, 100, 160, 0.7)');
            waterGrad.addColorStop(0.5, 'rgba(50, 60, 120, 0.8)');
            waterGrad.addColorStop(1, 'rgba(30, 30, 80, 0.9)');
        } else {
            waterGrad.addColorStop(0, 'rgba(20, 80, 160, 0.7)');
            waterGrad.addColorStop(0.5, 'rgba(15, 50, 120, 0.8)');
            waterGrad.addColorStop(1, 'rgba(8, 25, 70, 0.9)');
        }
        ctx.fillStyle = waterGrad;
        ctx.fillRect(w.x, wy - 8, w.w, H - wy + 20);

        // Sunset reflection on water
        if (tod === 'afternoon') {
            const reflGrad = ctx.createLinearGradient(w.x, wy, w.x + w.w, wy + 30);
            reflGrad.addColorStop(0, 'rgba(255, 140, 50, 0.12)');
            reflGrad.addColorStop(1, 'rgba(255, 100, 30, 0)');
            ctx.fillStyle = reflGrad;
            ctx.fillRect(w.x, wy - 5, w.w, 35);
        }

        // Animated waves on surface
        const waveColor = tod === 'day' ? 'rgba(140, 210, 255, 0.45)' :
                          tod === 'afternoon' ? 'rgba(180, 160, 140, 0.35)' :
                          'rgba(120, 200, 255, 0.4)';
        ctx.strokeStyle = waveColor;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            for (let wx = w.x; wx <= w.x + w.w; wx += 3) {
                const waveY = wy - 5 + i * 8 + Math.sin(wx * 0.08 + gameTime * 0.05 + i * 2) * 2.5;
                if (wx === w.x) ctx.moveTo(wx, waveY);
                else ctx.lineTo(wx, waveY);
            }
            ctx.stroke();
        }

        // Surface shimmer
        const shimmerAlpha = tod === 'day' ? 0.14 : 0.08;
        ctx.fillStyle = `rgba(255,255,255,${shimmerAlpha})`;
        for (let i = 0; i < 4; i++) {
            const sx = w.x + w.w * (0.15 + i * 0.22) + Math.sin(gameTime * 0.03 + i) * 5;
            const sy = wy - 3 + Math.sin(gameTime * 0.04 + i * 1.5) * 2;
            ctx.beginPath();
            ctx.ellipse(sx, sy, 6 + Math.sin(gameTime * 0.02 + i) * 2, 2, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Sand traps
    (level.sand || []).forEach(s => {
        const sy = getGroundY(s.x + s.w / 2) || baseY;
        // Sand base
        const sandGrad = ctx.createLinearGradient(s.x, sy - 4, s.x, sy + 5);
        if (tod === 'day') {
            sandGrad.addColorStop(0, '#f0d88a');
            sandGrad.addColorStop(1, '#d4b868');
        } else if (tod === 'afternoon') {
            sandGrad.addColorStop(0, '#d4b070');
            sandGrad.addColorStop(1, '#b89050');
        } else {
            sandGrad.addColorStop(0, '#b8a060');
            sandGrad.addColorStop(1, '#9a8048');
        }
        ctx.fillStyle = sandGrad;
        ctx.fillRect(s.x, sy - 4, s.w, 8);
        // Sand texture dots
        ctx.fillStyle = 'rgba(160, 130, 50, 0.4)';
        for (let i = 0; i < 12; i++) {
            const dx = s.x + 4 + (i * (s.w - 8) / 12) + Math.sin(i * 2.3) * 3;
            const dy = sy - 2 + Math.sin(i * 1.7) * 2.5;
            ctx.beginPath();
            ctx.arc(dx, dy, 1 + (i % 3) * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        // Sand edge highlight
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(s.x, sy - 4);
        ctx.lineTo(s.x + s.w, sy - 4);
        ctx.stroke();
    });

    // --- Enemies ---
    drawEnemies();

    // --- Hole/flag ---
    // Flag shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(hole.x + 8, hole.y, 14, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Flag pole
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(hole.x, hole.y);
    ctx.lineTo(hole.x, hole.y - 60);
    ctx.stroke();

    // Flag with wave
    const flagWave = Math.sin(gameTime * 0.06) * 3;
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath();
    ctx.moveTo(hole.x, hole.y - 60);
    ctx.quadraticCurveTo(hole.x + 14 + flagWave, hole.y - 53, hole.x + 25, hole.y - 50);
    ctx.quadraticCurveTo(hole.x + 14 - flagWave, hole.y - 47, hole.x, hole.y - 40);
    ctx.fill();


    // Hole (cup)
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.ellipse(hole.x, hole.y, hole.r, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hole rim
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(hole.x, hole.y, hole.r, 6, 0, 0, Math.PI * 2);
    ctx.stroke();

    // --- Ball ---
    if (ball.active && !ball.sunk) {
        // "Ready to hit" glow when player is near and ball is settled
        if (playerNearBall() && ball.onGround && ballIsSettled()) {
            const glowPulse = 0.25 + 0.15 * Math.sin(gameTime * 0.08);
            const glowR = ball.r + 8 + Math.sin(gameTime * 0.06) * 2;
            const glowGrad = ctx.createRadialGradient(ball.x, ball.y, ball.r, ball.x, ball.y, glowR);
            glowGrad.addColorStop(0, `rgba(201, 168, 76, ${glowPulse})`);
            glowGrad.addColorStop(1, 'rgba(201, 168, 76, 0)');
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, glowR, 0, Math.PI * 2);
            ctx.fillStyle = glowGrad;
            ctx.fill();
        }
        // Shadow
        const bGround = getGroundY(ball.x);
        if (bGround !== null) {
            const shadowDist = Math.max(0, bGround - (ball.y + ball.r));
            const shadowAlpha = Math.max(0.05, 0.3 - shadowDist * 0.003);
            const shadowScale = Math.max(0.6, 1 - shadowDist * 0.005);
            ctx.beginPath();
            ctx.ellipse(ball.x, bGround, (ball.r + 2) * shadowScale, 3 * shadowScale, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
            ctx.fill();
        }
        // Psychic glow
        if (activeCharacter === 'patrick' && psychicMode) {
            const pGlow = 0.3 + 0.15 * Math.sin(gameTime * 0.1);
            ctx.fillStyle = `rgba(138, 43, 226, ${pGlow})`;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r + 8, 0, Math.PI * 2);
            ctx.fill();
            // Purple trail particles
            if (gameTime % 3 === 0) {
                spawnParticles(ball.x, ball.y, '#8a2be2', 1, 1);
            }
        }
        // Ball with better shading
        const bGrad = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.1, ball.x, ball.y, ball.r);
        bGrad.addColorStop(0, '#fff');
        bGrad.addColorStop(0.4, '#f5f5f5');
        bGrad.addColorStop(0.8, '#ddd');
        bGrad.addColorStop(1, '#aaa');
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = bGrad;
        ctx.fill();
        // Dimple dots
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        for (let a = 0; a < 6; a++) {
            const da = a * Math.PI / 3 + gameTime * 0.01;
            const dr = ball.r * 0.55;
            ctx.beginPath();
            ctx.arc(ball.x + Math.cos(da) * dr, ball.y + Math.sin(da) * dr, 1, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // --- Aim line ---
    if (aiming && activeCharacter === 'jj') {
        const dx = aimStart.x - aimEnd.x;
        const dy = aimStart.y - aimEnd.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const power = Math.min(dist / 8, MAX_HIT_POWER);
        const angle = Math.atan2(dy, dx);
        const lineLen = power * 5;

        // Dotted trajectory preview
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y);
        ctx.lineTo(ball.x + Math.cos(angle) * lineLen, ball.y + Math.sin(angle) * lineLen);
        ctx.stroke();
        ctx.setLineDash([]);

        // Power indicator
        const pRatio = power / MAX_HIT_POWER;
        const dotColor = pRatio < 0.4 ? '#4ade80' : pRatio < 0.7 ? '#fbbf24' : '#ef4444';
        ctx.beginPath();
        ctx.arc(ball.x + Math.cos(angle) * lineLen, ball.y + Math.sin(angle) * lineLen, 5, 0, Math.PI * 2);
        ctx.fillStyle = dotColor;
        ctx.fill();

        // Power text
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${11 * S}px Georgia`;
        ctx.fillText(Math.round(pRatio * 100) + '%', ball.x + Math.cos(angle) * lineLen + 10, ball.y + Math.sin(angle) * lineLen - 8);

        // Autoflex trajectory preview
        if (equipment.shaft >= 1) {
            const simVx = Math.cos(angle) * power;
            const simVy = Math.sin(angle) * power;
            const pts = simulateTrajectory(ball.x, ball.y, simVx, simVy, 25);
            ctx.fillStyle = 'rgba(255, 105, 180, 0.5)';
            pts.forEach((p, i) => {
                if (i % 2 === 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
    }

    // Mobile aim visualization
    if (mobileHitMode) {
        const dir = player.facing;
        const power = mobileAimPower;
        const angle = mobileAimAngle;
        const endX = ball.x + Math.cos(angle) * power * 5 * dir;
        const endY = ball.y + Math.sin(angle) * power * 5;

        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = mobileAimPhase === 'angle' ? 'rgba(255,200,50,0.7)' : 'rgba(100,255,100,0.7)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.setLineDash([]);

        // Arrow tip
        ctx.beginPath();
        ctx.arc(endX, endY, 5, 0, Math.PI * 2);
        ctx.fillStyle = mobileAimPhase === 'angle' ? '#fbbf24' : '#4ade80';
        ctx.fill();

        // Power bar
        if (mobileAimPhase === 'power') {
            const barW = 60, barH = 8;
            const bx = ball.x - barW / 2, by = ball.y - 30;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(bx, by, barW, barH);
            const pRatio = power / MAX_HIT_POWER;
            const barColor = pRatio < 0.4 ? '#4ade80' : pRatio < 0.7 ? '#fbbf24' : '#ef4444';
            ctx.fillStyle = barColor;
            ctx.fillRect(bx, by, barW * pRatio, barH);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(bx, by, barW, barH);
        }

        // Autoflex trajectory preview (mobile)
        if (equipment.shaft >= 1 && mobileAimPhase === 'power') {
            const dir = player.facing;
            const simVx = Math.cos(mobileAimAngle) * mobileAimPower * dir * getClubPower();
            const simVy = Math.sin(mobileAimAngle) * mobileAimPower * getClubPower();
            const pts = simulateTrajectory(ball.x, ball.y, simVx, simVy, 25);
            ctx.fillStyle = 'rgba(255, 105, 180, 0.5)';
            pts.forEach((p, i) => {
                if (i % 2 === 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
    }

    // --- Player ---
    drawPlayer();

    // --- Particles ---
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.restore();

    // Ambient lighting overlay (after camera restore so it covers the full canvas)
    if (theme.ambientTint !== 'none') {
        ctx.fillStyle = theme.ambientTint;
        ctx.fillRect(0, 0, W, H);
    }

    // Vignette effect
    const vigGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.75);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, (tod === 'night' || tod === 'storm') ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.1)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);

    // Storm effects (rain, lightning, wind indicator)
    drawStormEffects();

    // HUD - Hearts
    for (let i = 0; i < player.maxHp; i++) {
        const hx = 15 + i * 22;
        ctx.fillStyle = i < player.hp ? '#e53e3e' : 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.moveTo(hx, 20);
        ctx.bezierCurveTo(hx, 17, hx - 5, 12, hx - 8, 15);
        ctx.bezierCurveTo(hx - 13, 20, hx, 28, hx, 30);
        ctx.bezierCurveTo(hx, 28, hx + 13, 20, hx + 8, 15);
        ctx.bezierCurveTo(hx + 5, 12, hx, 17, hx, 20);
        ctx.fill();
    }

    // HUD - Coins
    ctx.fillStyle = '#c9a84c';
    ctx.font = 'bold 14px Georgia';
    ctx.textAlign = 'right';
    ctx.fillText(coins + ' coins', W - 15, 25);
    ctx.textAlign = 'left';

    // HUD - Club tier
    ctx.fillStyle = CLUB_TIERS[equipment.club].color;
    ctx.font = '11px Georgia';
    ctx.fillText(CLUB_TIERS[equipment.club].name + ' Club', 15, H - 12);
}

function drawEnemies() {
    const tod = getTimeOfDay();
    const isStorm = tod === 'storm';

    activeEnemies.forEach(e => {
        if (e.dead) {
            ctx.globalAlpha = e.deathTimer / 60;
            ctx.fillStyle = '#d4a853';
            for (let i = 0; i < 5; i++) {
                const ox = Math.sin(i * 1.3 + e.deathTimer * 0.1) * (60 - e.deathTimer);
                const oy = -Math.abs(Math.cos(i * 0.9 + e.deathTimer * 0.15)) * (60 - e.deathTimer);
                ctx.beginPath();
                ctx.arc(e.x + ox, e.y - 10 + oy, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            return;
        }

        // Sandbag body
        ctx.fillStyle = '#d4a853';
        ctx.beginPath();
        ctx.moveTo(e.x - 12, e.y);
        ctx.lineTo(e.x - 14, e.y - 22);
        ctx.quadraticCurveTo(e.x, e.y - 32, e.x + 14, e.y - 22);
        ctx.lineTo(e.x + 12, e.y);
        ctx.closePath();
        ctx.fill();

        // Tied top
        ctx.strokeStyle = '#8a6a30';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(e.x - 4, e.y - 28);
        ctx.lineTo(e.x, e.y - 32);
        ctx.lineTo(e.x + 4, e.y - 28);
        ctx.stroke();

        // Texture lines
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(e.x - 8, e.y - 8);
        ctx.lineTo(e.x + 8, e.y - 8);
        ctx.moveTo(e.x - 10, e.y - 16);
        ctx.lineTo(e.x + 10, e.y - 16);
        ctx.stroke();

        // Legs
        const legSwing = Math.sin(e.frame * 4) * 3;
        ctx.strokeStyle = '#8a6a30';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(e.x - 5, e.y);
        ctx.lineTo(e.x - 5 - legSwing, e.y + 8);
        ctx.moveTo(e.x + 5, e.y);
        ctx.lineTo(e.x + 5 + legSwing, e.y + 8);
        ctx.stroke();

        // Eyes
        if (isStorm) {
            // Red glowing eyes
            const glow1 = ctx.createRadialGradient(e.x - 4, e.y - 18, 1, e.x - 4, e.y - 18, 6);
            glow1.addColorStop(0, 'rgba(255, 0, 0, 0.8)');
            glow1.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = glow1;
            ctx.beginPath();
            ctx.arc(e.x - 4, e.y - 18, 6, 0, Math.PI * 2);
            ctx.fill();
            const glow2 = ctx.createRadialGradient(e.x + 4, e.y - 18, 1, e.x + 4, e.y - 18, 6);
            glow2.addColorStop(0, 'rgba(255, 0, 0, 0.8)');
            glow2.addColorStop(1, 'rgba(255, 0, 0, 0)');
            ctx.fillStyle = glow2;
            ctx.beginPath();
            ctx.arc(e.x + 4, e.y - 18, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff0000';
        } else {
            ctx.fillStyle = '#2a2a2a';
        }
        ctx.beginPath();
        ctx.arc(e.x - 4, e.y - 18, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x + 4, e.y - 18, 2, 0, Math.PI * 2);
        ctx.fill();

        // HP bar
        if (e.hp < e.maxHp) {
            const barW = 24, barH = 3;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(e.x - barW / 2, e.y - 38, barW, barH);
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(e.x - barW / 2, e.y - 38, barW * (e.hp / e.maxHp), barH);
        }
    });

    // Sand projectiles
    sandProjectiles.forEach(p => {
        ctx.fillStyle = '#c4a040';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(200, 160, 60, 0.4)';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawStormEffects() {
    if (getTimeOfDay() !== 'storm') return;
    const W = canvas.width, H = canvas.height;

    // Rain
    ctx.strokeStyle = 'rgba(180, 200, 255, 0.3)';
    ctx.lineWidth = 1;
    const rainAngle = wind.direction * 3;
    for (let i = 0; i < 80; i++) {
        const rx = (i * 17 + gameTime * 3 * (1 + (i % 3) * 0.3)) % (W + 100) - 50;
        const ry = (i * 31 + gameTime * 8 * (1 + (i % 2) * 0.5)) % (H + 50) - 25;
        ctx.beginPath();
        ctx.moveTo(rx, ry);
        ctx.lineTo(rx + rainAngle, ry + 12 + (i % 4) * 2);
        ctx.stroke();
    }

    // Lightning flash
    if (Math.random() < 0.003) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.fillRect(0, 0, W, H);
    }

    // Wind indicator
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = 'bold 14px Georgia';
    ctx.textAlign = 'center';
    const windArrow = wind.direction > 0 ? 'Wind >>>' : '<<< Wind';
    ctx.fillText(windArrow, W / 2, 20);
    ctx.textAlign = 'left';
}

function drawPlayer() {
    // Invincibility flash
    const playerFlashing = player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0;

    const x = player.x;
    const y = player.y;
    const f = player.facing;
    const H = player.h; // total height = 56
    // Scale everything relative to player height
    const u = H / 56; // unit scale

    ctx.save();
    ctx.translate(x, y);
    if (f === -1) ctx.scale(-1, 1);
    if (playerFlashing) ctx.globalAlpha = 0.3;

    const legSwing = player.walking ? Math.sin(player.walkFrame * 4) * 7 : 0;

    // Proportions: head ~16u, torso ~22u, legs ~18u = 56u total
    const headTop = 0;
    const headCenter = 8 * u;
    const neckY = 16 * u;
    const torsoTop = neckY;
    const torsoBot = 38 * u;
    const legTop = torsoBot;
    const footY = H;

    const lFootX = (-5 - legSwing) * u;
    const rFootX = (5 + legSwing) * u;
    const nearBall = Math.abs(player.x - ball.x) < HIT_RANGE && ball.onGround;

    if (activeCharacter === 'patrick') {
        drawPatrickBody(u, headTop, headCenter, neckY, torsoTop, torsoBot, legTop, footY, H, legSwing, lFootX, rFootX, nearBall);
    } else {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, H, 14 * u, 4 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Legs (khaki pants) ---
    ctx.lineCap = 'round';

    // Left leg
    ctx.strokeStyle = '#b09870';
    ctx.lineWidth = 5 * u;
    ctx.beginPath();
    ctx.moveTo(-4 * u, legTop);
    ctx.lineTo(lFootX, footY - 3 * u);
    ctx.stroke();

    // Right leg
    ctx.beginPath();
    ctx.moveTo(4 * u, legTop);
    ctx.lineTo(rFootX, footY - 3 * u);
    ctx.stroke();

    // Shoes
    ctx.fillStyle = BOOT_TIERS[equipment.boots].color;
    ctx.beginPath();
    ctx.roundRect(lFootX - 3 * u, footY - 4 * u, 8 * u, 5 * u, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(rFootX - 3 * u, footY - 4 * u, 8 * u, 5 * u, 2);
    ctx.fill();

    if (BOOT_TIERS[equipment.boots].wings) {
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath();
        ctx.moveTo(lFootX - 3 * u, footY - 4 * u);
        ctx.lineTo(lFootX - 8 * u, footY - 8 * u);
        ctx.lineTo(lFootX - 2 * u, footY - 6 * u);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(rFootX - 3 * u, footY - 4 * u);
        ctx.lineTo(rFootX - 8 * u, footY - 8 * u);
        ctx.lineTo(rFootX - 2 * u, footY - 6 * u);
        ctx.closePath();
        ctx.fill();
    }

    // --- Body (shirt based on equipment tier) ---
    const shirtColors = SHIRT_TIERS[equipment.shirt].colors;
    const shirtGrad = ctx.createLinearGradient(-8 * u, torsoTop, 8 * u, torsoBot);
    shirtGrad.addColorStop(0, shirtColors[0]);
    shirtGrad.addColorStop(0.5, shirtColors[1]);
    shirtGrad.addColorStop(1, shirtColors[2]);
    ctx.fillStyle = shirtGrad;
    ctx.beginPath();
    ctx.moveTo(-9 * u, torsoTop);
    ctx.lineTo(9 * u, torsoTop);
    ctx.lineTo(8 * u, torsoBot);
    ctx.lineTo(-8 * u, torsoBot);
    ctx.closePath();
    ctx.fill();

    // Shirt pattern based on tier
    if (equipment.shirt === 0) {
        // Plain white - no pattern
    }
    if (equipment.shirt === 1) {
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        [[-4,19],[2,19],[0,23],[4,23],[-4,27],[2,27],[-2,31],[4,31]].forEach(([dx,dy]) => {
            ctx.beginPath();
            ctx.arc(dx * u, dy * u, 1 * u, 0, Math.PI * 2);
            ctx.fill();
        });
    }
    if (equipment.shirt === 2) {
        // Striped
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5 * u;
        for (let sy = torsoTop + 4 * u; sy < torsoBot - 2 * u; sy += 4 * u) {
            ctx.beginPath();
            ctx.moveTo(-8 * u, sy);
            ctx.lineTo(8 * u, sy);
            ctx.stroke();
        }
    }
    if (equipment.shirt === 3) {
        // Gold trim
        ctx.strokeStyle = '#c9a84c';
        ctx.lineWidth = 1.5 * u;
        ctx.strokeRect(-9 * u, torsoTop, 18 * u, torsoBot - torsoTop);
    }
    if (equipment.shirt === 4) {
        // Diamond argyle
        ctx.strokeStyle = 'rgba(185, 242, 255, 0.4)';
        ctx.lineWidth = 1 * u;
        for (let dy = torsoTop + 5 * u; dy < torsoBot - 5 * u; dy += 8 * u) {
            ctx.beginPath();
            ctx.moveTo(0, dy - 4 * u);
            ctx.lineTo(5 * u, dy);
            ctx.lineTo(0, dy + 4 * u);
            ctx.lineTo(-5 * u, dy);
            ctx.closePath();
            ctx.stroke();
        }
    }

    // Collar
    ctx.strokeStyle = shirtColors[2];
    ctx.lineWidth = 1.5 * u;
    ctx.beginPath();
    ctx.moveTo(-5 * u, torsoTop);
    ctx.lineTo(0, torsoTop + 2 * u);
    ctx.lineTo(5 * u, torsoTop);
    ctx.stroke();

    // Button line
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.8 * u;
    ctx.beginPath();
    ctx.moveTo(0, torsoTop + 2 * u);
    ctx.lineTo(0, torsoBot);
    ctx.stroke();

    // Belt
    ctx.fillStyle = '#5a4a30';
    ctx.fillRect(-8 * u, torsoBot - 2 * u, 16 * u, 3 * u);
    ctx.fillStyle = '#c9a84c';
    ctx.fillRect(-1.5 * u, torsoBot - 2 * u, 3 * u, 3 * u); // buckle

    // --- Arms ---
    ctx.lineCap = 'round';

    // Left sleeve + arm
    ctx.strokeStyle = shirtColors[1];
    ctx.lineWidth = 5 * u;
    ctx.beginPath();
    ctx.moveTo(-9 * u, torsoTop + 2 * u);
    ctx.lineTo(-12 * u, torsoTop + 8 * u);
    ctx.stroke();
    ctx.strokeStyle = '#c4956a';
    ctx.lineWidth = 3.5 * u;
    ctx.beginPath();
    ctx.moveTo(-12 * u, torsoTop + 8 * u);
    ctx.lineTo(-13 * u, torsoBot - 2 * u);
    ctx.stroke();

    // Right sleeve + arm (holding club if near ball)
    ctx.strokeStyle = shirtColors[1];
    ctx.lineWidth = 5 * u;
    ctx.beginPath();
    ctx.moveTo(9 * u, torsoTop + 2 * u);
    ctx.lineTo(12 * u, torsoTop + 8 * u);
    ctx.stroke();

    ctx.strokeStyle = '#c4956a';
    ctx.lineWidth = 3.5 * u;
    if (nearBall) {
        ctx.beginPath();
        ctx.moveTo(12 * u, torsoTop + 8 * u);
        ctx.lineTo(15 * u, torsoTop + 12 * u);
        ctx.stroke();
        // Golf club shaft
        ctx.strokeStyle = SHAFT_TIERS[equipment.shaft].color;
        ctx.lineWidth = 2 * u;
        ctx.beginPath();
        ctx.moveTo(15 * u, torsoTop + 12 * u);
        ctx.lineTo(17 * u, footY - 2 * u);
        ctx.stroke();
        // Club head
        ctx.fillStyle = CLUB_TIERS[equipment.club].color;
        ctx.beginPath();
        ctx.roundRect(14 * u, footY - 4 * u, 8 * u, 3.5 * u, 1.5);
        ctx.fill();
        // Grip
        ctx.fillStyle = '#333';
        ctx.fillRect(14 * u, torsoTop + 11 * u, 3 * u, 4 * u);
    } else {
        ctx.beginPath();
        ctx.moveTo(12 * u, torsoTop + 8 * u);
        ctx.lineTo(14 * u, torsoBot - 2 * u);
        ctx.stroke();
    }

    // --- Head ---
    ctx.fillStyle = '#c4956a';
    ctx.beginPath();
    ctx.ellipse(0, headCenter, 9 * u, 9.5 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = '#b8876a';
    ctx.beginPath();
    ctx.ellipse(-9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(0, headTop + 2 * u, 8.5 * u, 5 * u, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-9 * u, headTop + 2 * u, 2.5 * u, 5 * u);
    ctx.fillRect(6.5 * u, headTop + 2 * u, 2.5 * u, 5 * u);

    // Glasses
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5 * u;
    ctx.strokeRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);
    ctx.strokeRect(1 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);
    ctx.beginPath();
    ctx.moveTo(-1 * u, headCenter - 1 * u);
    ctx.lineTo(1 * u, headCenter - 1 * u);
    ctx.stroke();
    // Temple arms
    ctx.beginPath();
    ctx.moveTo(-7.5 * u, headCenter - 2 * u);
    ctx.lineTo(-9.5 * u, headCenter - 2.5 * u);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(7.5 * u, headCenter - 2 * u);
    ctx.lineTo(9.5 * u, headCenter - 2.5 * u);
    ctx.stroke();
    // Lens tint
    ctx.fillStyle = 'rgba(150, 200, 255, 0.12)';
    ctx.fillRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);
    ctx.fillRect(1 * u, headCenter - 3 * u, 6.5 * u, 4.5 * u);

    // Eyes
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.arc(-4 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4.5 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.strokeStyle = '#a07858';
    ctx.lineWidth = 0.8 * u;
    ctx.beginPath();
    ctx.moveTo(0, headCenter);
    ctx.lineTo(0.5 * u, headCenter + 2.5 * u);
    ctx.stroke();

    // Expression based on time of day (JJ only)
    {
        const tod = gameMode === 'shop' ? 'day' : getTimeOfDay();
        ctx.strokeStyle = '#8a5a3a';
        ctx.lineWidth = 1 * u;
        if (tod === 'day') {
            // Big smile
            ctx.beginPath();
            ctx.arc(0, headCenter + 3 * u, 3.5 * u, 0.1, Math.PI - 0.1);
            ctx.stroke();
        } else if (tod === 'afternoon') {
            // Slight smile / neutral
            ctx.beginPath();
            ctx.moveTo(-3 * u, headCenter + 4.5 * u);
            ctx.lineTo(3 * u, headCenter + 4.5 * u);
            ctx.stroke();
        } else if (tod === 'night') {
            // Worried - slight frown
            ctx.beginPath();
            ctx.arc(0, headCenter + 6 * u, 3 * u, Math.PI + 0.3, -0.3);
            ctx.stroke();
        } else {
            // Storm - scared! Open mouth, eyebrows up
            // Scared open mouth
            ctx.fillStyle = '#5a2a1a';
            ctx.beginPath();
            ctx.ellipse(0, headCenter + 4.5 * u, 2.5 * u, 2 * u, 0, 0, Math.PI * 2);
            ctx.fill();
            // Eyebrow raise (draw raised eyebrows above the glasses)
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1.2 * u;
            ctx.beginPath();
            ctx.moveTo(-7 * u, headCenter - 5 * u);
            ctx.quadraticCurveTo(-4 * u, headCenter - 7 * u, -1 * u, headCenter - 5 * u);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(1 * u, headCenter - 5 * u);
            ctx.quadraticCurveTo(4 * u, headCenter - 7 * u, 7 * u, headCenter - 5 * u);
            ctx.stroke();
        }
    }

    } // end JJ character

    if (playerFlashing) ctx.globalAlpha = 1;
    ctx.restore();
}

function drawPatrickBody(u, headTop, headCenter, neckY, torsoTop, torsoBot, legTop, footY, H, legSwing, lFootX, rFootX, nearBall) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, H, 14 * u, 4 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs (dark jeans)
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 5 * u;
    ctx.beginPath();
    ctx.moveTo(-4 * u, legTop);
    ctx.lineTo(lFootX, footY - 3 * u);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(4 * u, legTop);
    ctx.lineTo(rFootX, footY - 3 * u);
    ctx.stroke();

    // Shoes (sneakers)
    ctx.fillStyle = '#eee';
    ctx.beginPath();
    ctx.roundRect(lFootX - 3 * u, footY - 4 * u, 8 * u, 5 * u, 2);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(rFootX - 3 * u, footY - 4 * u, 8 * u, 5 * u, 2);
    ctx.fill();

    // Body (dark purple polo)
    const shirtGrad = ctx.createLinearGradient(-8 * u, torsoTop, 8 * u, torsoBot);
    shirtGrad.addColorStop(0, '#3a2a5a');
    shirtGrad.addColorStop(0.5, '#2d2050');
    shirtGrad.addColorStop(1, '#1a1040');
    ctx.fillStyle = shirtGrad;
    ctx.beginPath();
    ctx.moveTo(-9 * u, torsoTop);
    ctx.lineTo(9 * u, torsoTop);
    ctx.lineTo(8 * u, torsoBot);
    ctx.lineTo(-8 * u, torsoBot);
    ctx.closePath();
    ctx.fill();

    // Collar
    ctx.strokeStyle = '#1a1040';
    ctx.lineWidth = 1.5 * u;
    ctx.beginPath();
    ctx.moveTo(-5 * u, torsoTop);
    ctx.lineTo(0, torsoTop + 2 * u);
    ctx.lineTo(5 * u, torsoTop);
    ctx.stroke();

    // Belt
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-8 * u, torsoBot - 2 * u, 16 * u, 3 * u);

    // Arms
    ctx.lineCap = 'round';

    // Left sleeve + arm
    ctx.strokeStyle = '#2d2050';
    ctx.lineWidth = 5 * u;
    ctx.beginPath();
    ctx.moveTo(-9 * u, torsoTop + 2 * u);
    ctx.lineTo(-12 * u, torsoTop + 8 * u);
    ctx.stroke();

    if (nearBall || psychicMode) {
        // Both arms raised for psychic power
        ctx.strokeStyle = '#e8c89e';
        ctx.lineWidth = 3.5 * u;
        // Left arm raised
        ctx.beginPath();
        ctx.moveTo(-12 * u, torsoTop + 8 * u);
        ctx.lineTo(-14 * u, torsoTop - 2 * u);
        ctx.stroke();
        // Right sleeve
        ctx.strokeStyle = '#2d2050';
        ctx.lineWidth = 5 * u;
        ctx.beginPath();
        ctx.moveTo(9 * u, torsoTop + 2 * u);
        ctx.lineTo(12 * u, torsoTop + 8 * u);
        ctx.stroke();
        // Right arm raised
        ctx.strokeStyle = '#e8c89e';
        ctx.lineWidth = 3.5 * u;
        ctx.beginPath();
        ctx.moveTo(12 * u, torsoTop + 8 * u);
        ctx.lineTo(14 * u, torsoTop - 2 * u);
        ctx.stroke();

        // Psychic glow around hands
        const glowPulse = 0.3 + 0.2 * Math.sin(gameTime * 0.08);
        ctx.fillStyle = `rgba(138, 43, 226, ${glowPulse})`;
        ctx.beginPath();
        ctx.arc(-14 * u, torsoTop - 4 * u, 5 * u, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(14 * u, torsoTop - 4 * u, 5 * u, 0, Math.PI * 2);
        ctx.fill();
    } else {
        ctx.strokeStyle = '#e8c89e';
        ctx.lineWidth = 3.5 * u;
        ctx.beginPath();
        ctx.moveTo(-12 * u, torsoTop + 8 * u);
        ctx.lineTo(-13 * u, torsoBot - 2 * u);
        ctx.stroke();
        // Right arm
        ctx.strokeStyle = '#2d2050';
        ctx.lineWidth = 5 * u;
        ctx.beginPath();
        ctx.moveTo(9 * u, torsoTop + 2 * u);
        ctx.lineTo(12 * u, torsoTop + 8 * u);
        ctx.stroke();
        ctx.strokeStyle = '#e8c89e';
        ctx.lineWidth = 3.5 * u;
        ctx.beginPath();
        ctx.moveTo(12 * u, torsoTop + 8 * u);
        ctx.lineTo(14 * u, torsoBot - 2 * u);
        ctx.stroke();
    }

    // Head (slightly lighter/warmer East Asian skin tone)
    ctx.fillStyle = '#e8c89e';
    ctx.beginPath();
    ctx.ellipse(0, headCenter, 9 * u, 9.5 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = '#d4b088';
    ctx.beginPath();
    ctx.ellipse(-9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Hair (straight black, neat)
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.ellipse(0, headTop + 1.5 * u, 9 * u, 5.5 * u, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Side hair
    ctx.fillRect(-9.5 * u, headTop + 1.5 * u, 2 * u, 6 * u);
    ctx.fillRect(7.5 * u, headTop + 1.5 * u, 2 * u, 6 * u);

    // Glasses (rectangular, slightly larger)
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.5 * u;
    ctx.strokeRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 5 * u);
    ctx.strokeRect(1 * u, headCenter - 3 * u, 6.5 * u, 5 * u);
    ctx.beginPath();
    ctx.moveTo(-1 * u, headCenter - 0.5 * u);
    ctx.lineTo(1 * u, headCenter - 0.5 * u);
    ctx.stroke();
    // Temple arms
    ctx.beginPath();
    ctx.moveTo(-7.5 * u, headCenter - 1.5 * u);
    ctx.lineTo(-9.5 * u, headCenter - 2 * u);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(7.5 * u, headCenter - 1.5 * u);
    ctx.lineTo(9.5 * u, headCenter - 2 * u);
    ctx.stroke();
    // Lens tint (slight purple tint for psychic theme)
    ctx.fillStyle = 'rgba(138, 43, 226, 0.08)';
    ctx.fillRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 5 * u);
    ctx.fillRect(1 * u, headCenter - 3 * u, 6.5 * u, 5 * u);

    // Concentrating eyes when near ball (psychic focus)
    if (nearBall || psychicMode) {
        // Glowing purple eyes
        ctx.fillStyle = '#8a2be2';
        ctx.beginPath();
        ctx.arc(-4 * u, headCenter, 1.5 * u, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(4.5 * u, headCenter, 1.5 * u, 0, Math.PI * 2);
        ctx.fill();
        // Eye glow
        ctx.fillStyle = 'rgba(138, 43, 226, 0.3)';
        ctx.beginPath();
        ctx.arc(-4 * u, headCenter, 3 * u, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(4.5 * u, headCenter, 3 * u, 0, Math.PI * 2);
        ctx.fill();
    } else {
        // Normal dark eyes
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath();
        ctx.arc(-4 * u, headCenter, 1.2 * u, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(4.5 * u, headCenter, 1.2 * u, 0, Math.PI * 2);
        ctx.fill();
    }

    // Nose
    ctx.strokeStyle = '#c8a878';
    ctx.lineWidth = 0.8 * u;
    ctx.beginPath();
    ctx.moveTo(0, headCenter + 0.5 * u);
    ctx.lineTo(0.5 * u, headCenter + 3 * u);
    ctx.stroke();

    // Smile (always calm/confident)
    ctx.strokeStyle = '#a07858';
    ctx.lineWidth = 1 * u;
    ctx.beginPath();
    ctx.moveTo(-2.5 * u, headCenter + 4.5 * u);
    ctx.quadraticCurveTo(0, headCenter + 5.5 * u, 2.5 * u, headCenter + 4.5 * u);
    ctx.stroke();
}

// ==================== PRO SHOP ====================
function getShopPedestals() {
    const peds = [
        { type: 'club',  label: '+ Power',   x: 200 },
        { type: 'shaft', label: '+ Control', x: 400 },
        { type: 'boots', label: '+ Jump',    x: 600 },
        { type: 'shirt', label: '+ Health',  x: 800 }
    ];
    if (hasCompletedGame) {
        peds.push({ type: 'character', label: 'Patrick Wong', x: 1150 });
    }
    return peds;
}

let shopMessage = '';
let shopMessageTimer = 0;

function initShop() {
    const baseY = canvas.height - 80 * S;
    player.x = 100;
    player.y = baseY - player.h;
    player.vx = 0; player.vy = 0;
    player.onGround = true;
    player.facing = 1;
    player.walking = false;
    player.walkFrame = 0;
    cameraX = 0;
    shopMessage = '';
    shopMessageTimer = 0;
}

function updateShop() {
    gameTime++;
    player.walking = false;
    if (!cheatCodeMode) {
        if (keys['a'] || keys['arrowleft']) {
            player.vx = -PLAYER_SPEED;
            player.facing = -1;
            player.walking = true;
        } else if (keys['d'] || keys['arrowright']) {
            player.vx = PLAYER_SPEED;
            player.facing = 1;
            player.walking = true;
        } else {
            player.vx = 0;
        }
        player.x += player.vx;
        player.x = Math.max(30, Math.min(player.x, hasCompletedGame ? 1200 : 1050));
    } else {
        player.vx = 0;
    }
    if (player.walking) player.walkFrame += 0.15;
    else player.walkFrame = 0;

    if (shopMessageTimer > 0) shopMessageTimer--;

    // Update teleport animation
    if (teleportAnim) {
        teleportAnim.frame++;
        if (teleportAnim.frame >= teleportAnim.maxFrames) teleportAnim = null;
    }

    // Buy / interact with up/W key
    if (keys['w'] || keys['arrowup']) {
        if (!player.buyHeld) {
            player.buyHeld = true;
            // Near exit door? Leave shop
            if (Math.abs(player.x - 1032) < 40) {
                gameMode = 'play';
                currentHole++;
                initHole();
                return;
            }
            // Near shopkeeper? Open cheat code input
            if (Math.abs(player.x - 950) < 60) {
                const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                if (isMobile) {
                    const code = prompt('Enter secret code:');
                    if (code && code.toLowerCase() === 'password') {
                        if (!patrickUnlocked) {
                            hasCompletedGame = true;
                            patrickUnlocked = true;
                            activeCharacter = 'patrick';
                            saveCharacterState();
                            saveProgress();
                            shopMessage = 'Patrick Wong unlocked!';
                            shopMessageTimer = 120;
                            teleportAnim = { x: 1150, y: canvas.height - 80 * S - 56, frame: 0, maxFrames: 60 };
                        } else {
                            shopMessage = 'Already unlocked!';
                            shopMessageTimer = 90;
                        }
                    } else if (code !== null) {
                        shopMessage = 'Wrong code...';
                        shopMessageTimer = 90;
                    }
                } else {
                    cheatCodeMode = true;
                    cheatCodeInput = '';
                }
            } else {
                tryBuy();
            }
        }
    } else {
        player.buyHeld = false;
    }

    // Camera
    const targetCX = Math.max(0, player.x - canvas.width / 2);
    cameraX += (targetCX - cameraX) * 0.1;
}

function tryBuy() {
    const pedList = getShopPedestals();
    for (const ped of pedList) {
        if (Math.abs(player.x - ped.x) > 50) continue;

        if (ped.type === 'character') {
            if (patrickUnlocked) {
                // Toggle character
                activeCharacter = activeCharacter === 'jj' ? 'patrick' : 'jj';
                saveCharacterState();
                shopMessage = 'Switched to ' + (activeCharacter === 'patrick' ? 'Patrick Wong' : 'JJ Atencio') + '!';
                shopMessageTimer = 90;
                return;
            } else {
                if (coins < 50) {
                    shopMessage = 'Not enough coins!';
                    shopMessageTimer = 90;
                    return;
                }
                coins -= 50;
                patrickUnlocked = true;
                activeCharacter = 'patrick';
                saveCharacterState();
                saveProgress();
                shopMessage = 'Patrick Wong unlocked!';
                shopMessageTimer = 90;
                return;
            }
        }

        const tier = equipment[ped.type];
        const prices = SHOP_PRICES[ped.type];
        const nextTier = tier + 1;

        if (nextTier >= prices.length) {
            shopMessage = 'MAXED!';
            shopMessageTimer = 90;
            return;
        }

        const cost = prices[nextTier];
        if (coins < cost) {
            shopMessage = 'Not enough coins!';
            shopMessageTimer = 90;
            return;
        }

        coins -= cost;
        equipment[ped.type] = nextTier;
        saveProgress();
        shopMessage = 'Purchased!';
        shopMessageTimer = 90;
        return;
    }
}

function drawShopkeeper(x, baseY) {
    const u = 50 / 56; // scale factor
    const y = baseY - 50;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(-1, 1); // face left (toward player)

    const headCenter = 8 * u;
    const neckY = 16 * u;
    const torsoTop = neckY;
    const torsoBot = 38 * u;
    const footY = 50;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(0, footY, 14 * u, 4 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs (dark slacks)
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 5 * u;
    ctx.beginPath(); ctx.moveTo(-4 * u, torsoBot); ctx.lineTo(-5 * u, footY - 3 * u); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4 * u, torsoBot); ctx.lineTo(5 * u, footY - 3 * u); ctx.stroke();

    // Shoes
    ctx.fillStyle = '#3a2a1a';
    ctx.beginPath(); ctx.roundRect(-8 * u, footY - 4 * u, 8 * u, 5 * u, 2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(2 * u, footY - 4 * u, 8 * u, 5 * u, 2); ctx.fill();

    // Body (green vest over white shirt)
    ctx.fillStyle = '#f0ead8';
    ctx.beginPath();
    ctx.moveTo(-9 * u, torsoTop); ctx.lineTo(9 * u, torsoTop);
    ctx.lineTo(8 * u, torsoBot); ctx.lineTo(-8 * u, torsoBot);
    ctx.closePath(); ctx.fill();
    // Vest
    ctx.fillStyle = '#2d6a4f';
    ctx.beginPath();
    ctx.moveTo(-9 * u, torsoTop + 1); ctx.lineTo(-3 * u, torsoTop + 1);
    ctx.lineTo(-3 * u, torsoBot); ctx.lineTo(-9 * u, torsoBot);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(9 * u, torsoTop + 1); ctx.lineTo(3 * u, torsoTop + 1);
    ctx.lineTo(3 * u, torsoBot); ctx.lineTo(9 * u, torsoBot);
    ctx.closePath(); ctx.fill();

    // Belt
    ctx.fillStyle = '#5a4a30';
    ctx.fillRect(-8 * u, torsoBot - 2 * u, 16 * u, 3 * u);
    ctx.fillStyle = '#c9a84c';
    ctx.fillRect(-1.5 * u, torsoBot - 2 * u, 3 * u, 3 * u);

    // Arms
    ctx.strokeStyle = '#2d6a4f';
    ctx.lineWidth = 5 * u;
    ctx.beginPath(); ctx.moveTo(-9 * u, torsoTop + 2 * u); ctx.lineTo(-12 * u, torsoTop + 8 * u); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(9 * u, torsoTop + 2 * u); ctx.lineTo(12 * u, torsoTop + 8 * u); ctx.stroke();
    ctx.strokeStyle = '#c4956a';
    ctx.lineWidth = 3.5 * u;
    ctx.beginPath(); ctx.moveTo(-12 * u, torsoTop + 8 * u); ctx.lineTo(-13 * u, torsoBot - 2 * u); ctx.stroke();
    // Right hand waving
    const waveAngle = Math.sin(gameTime * 0.05) * 0.3;
    ctx.beginPath();
    ctx.moveTo(12 * u, torsoTop + 8 * u);
    ctx.lineTo(12 * u + Math.cos(-1 + waveAngle) * 12 * u, torsoTop + 8 * u + Math.sin(-1 + waveAngle) * 12 * u);
    ctx.stroke();

    // Head
    ctx.fillStyle = '#c4956a';
    ctx.beginPath();
    ctx.ellipse(0, headCenter, 9 * u, 9.5 * u, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = '#b8876a';
    ctx.beginPath(); ctx.ellipse(-9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2); ctx.fill();

    // Visor/cap
    ctx.fillStyle = '#1a472a';
    ctx.beginPath();
    ctx.ellipse(0, headCenter - 6 * u, 10 * u, 4 * u, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Cap brim
    ctx.fillStyle = '#1a472a';
    ctx.beginPath();
    ctx.moveTo(-10 * u, headCenter - 6 * u);
    ctx.lineTo(14 * u, headCenter - 5 * u);
    ctx.lineTo(14 * u, headCenter - 3 * u);
    ctx.lineTo(-10 * u, headCenter - 4 * u);
    ctx.closePath();
    ctx.fill();
    // JHI logo on cap
    ctx.fillStyle = '#c9a84c';
    ctx.font = `bold ${5 * u}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('JHI', 0, headCenter - 6 * u);

    // Mustache
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 1.5 * u;
    ctx.beginPath();
    ctx.moveTo(-5 * u, headCenter + 2.5 * u);
    ctx.quadraticCurveTo(-3 * u, headCenter + 4.5 * u, 0, headCenter + 3 * u);
    ctx.quadraticCurveTo(3 * u, headCenter + 4.5 * u, 5 * u, headCenter + 2.5 * u);
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath(); ctx.arc(-4 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.5 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2); ctx.fill();

    // Smile
    ctx.strokeStyle = '#8a5a3a';
    ctx.lineWidth = 1 * u;
    ctx.beginPath();
    ctx.arc(0, headCenter + 4 * u, 3 * u, 0.1, Math.PI - 0.1);
    ctx.stroke();

    ctx.textAlign = 'left';
    ctx.restore();
}

function drawShop() {
    const W = canvas.width, H = canvas.height;
    const baseY = H - 80 * S;

    // Background - indoor shop
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(0, 0, W, H);

    // Back wall with wainscoting
    const wallGrad = ctx.createLinearGradient(0, 0, 0, baseY);
    wallGrad.addColorStop(0, '#4a3422');
    wallGrad.addColorStop(0.6, '#3a2818');
    wallGrad.addColorStop(1, '#2a1a0a');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, W + 200, baseY);

    // Wainscoting (lower wall paneling)
    const wainscotTop = baseY - 70;
    ctx.fillStyle = '#3a2515';
    ctx.fillRect(0, wainscotTop, W + 200, 70);
    // Panel trim
    ctx.strokeStyle = '#5a4025';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(0, wainscotTop, W + 200, 70);
    // Vertical panel lines
    for (let px = 40; px < W + 200; px += 80) {
        ctx.beginPath();
        ctx.moveTo(px - cameraX % 80, wainscotTop + 5);
        ctx.lineTo(px - cameraX % 80, baseY - 5);
        ctx.stroke();
    }
    // Crown molding
    ctx.fillStyle = '#6a5030';
    ctx.fillRect(0, wainscotTop - 3, W + 200, 5);

    // Wallpaper pattern (subtle diamond)
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    for (let wy = 15; wy < wainscotTop; wy += 30) {
        for (let wx = -cameraX % 30; wx < W + 30; wx += 30) {
            ctx.beginPath();
            ctx.moveTo(wx, wy - 10); ctx.lineTo(wx + 10, wy);
            ctx.lineTo(wx, wy + 10); ctx.lineTo(wx - 10, wy);
            ctx.closePath(); ctx.stroke();
        }
    }

    // Wall shelves with items
    ctx.fillStyle = '#5a3e25';
    const shelfPositions = [65, 140];
    shelfPositions.forEach(sy => {
        // Shelf board
        ctx.fillStyle = '#5a3e25';
        ctx.fillRect(0, sy, W + 200, 6);
        // Shelf bracket shadows
        ctx.fillStyle = '#4a3020';
        for (let bx = 60 - cameraX % 200; bx < W + 100; bx += 200) {
            ctx.fillRect(bx, sy + 6, 4, 10);
            ctx.fillRect(bx + 14, sy + 6, 4, 10);
        }
    });

    // Shelf decorations (trophies, golf balls, books)
    // Top shelf items
    for (let dx = 30 - cameraX % 180; dx < W + 100; dx += 180) {
        // Trophy
        ctx.fillStyle = '#c9a84c';
        ctx.fillRect(dx, shelfPositions[0] - 18, 6, 12);
        ctx.fillRect(dx - 4, shelfPositions[0] - 6, 14, 5);
        ctx.beginPath();
        ctx.arc(dx + 3, shelfPositions[0] - 22, 6, 0, Math.PI * 2);
        ctx.fill();
        // Stack of golf balls
        ctx.fillStyle = '#ddd';
        ctx.beginPath(); ctx.arc(dx + 50, shelfPositions[0] - 5, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(dx + 59, shelfPositions[0] - 5, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(dx + 54.5, shelfPositions[0] - 12, 4, 0, Math.PI * 2); ctx.fill();
        // Book
        ctx.fillStyle = '#8b3a3a';
        ctx.fillRect(dx + 90, shelfPositions[0] - 16, 8, 16);
        ctx.fillStyle = '#3a5a8b';
        ctx.fillRect(dx + 100, shelfPositions[0] - 20, 8, 20);
        ctx.fillStyle = '#4a7a3a';
        ctx.fillRect(dx + 110, shelfPositions[0] - 14, 6, 14);
    }

    // Bottom shelf items
    for (let dx = 80 - cameraX % 200; dx < W + 100; dx += 200) {
        // Golf bag
        ctx.fillStyle = '#4a6a8a';
        ctx.fillRect(dx, shelfPositions[1] - 28, 12, 28);
        ctx.fillStyle = '#888';
        ctx.fillRect(dx + 1, shelfPositions[1] - 34, 2, 10);
        ctx.fillRect(dx + 5, shelfPositions[1] - 32, 2, 8);
        ctx.fillRect(dx + 9, shelfPositions[1] - 36, 2, 12);
        // Framed photo
        ctx.strokeStyle = '#8a7040';
        ctx.lineWidth = 2;
        ctx.strokeRect(dx + 55, shelfPositions[1] - 22, 18, 20);
        ctx.fillStyle = '#2a4a2a';
        ctx.fillRect(dx + 57, shelfPositions[1] - 20, 14, 16);
        // Small flag in frame
        ctx.fillStyle = '#c9a84c';
        ctx.beginPath();
        ctx.moveTo(dx + 64, shelfPositions[1] - 18);
        ctx.lineTo(dx + 64, shelfPositions[1] - 10);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(dx + 64, shelfPositions[1] - 18);
        ctx.lineTo(dx + 69, shelfPositions[1] - 16);
        ctx.lineTo(dx + 64, shelfPositions[1] - 14);
        ctx.fill();
    }

    ctx.save();
    ctx.translate(-cameraX, 0);

    // --- Windows ---
    const windowPositions = [120, 520, 920];
    windowPositions.forEach(wx => {
        const winX = wx;
        const winY = 45;
        const winW = 70;
        const winH = 80;

        // Window frame (outer)
        ctx.fillStyle = '#6a5030';
        ctx.fillRect(winX - 5, winY - 5, winW + 10, winH + 10);

        // Window glass - outdoor scene
        const glassGrad = ctx.createLinearGradient(winX, winY, winX, winY + winH);
        glassGrad.addColorStop(0, '#5a8ab8');
        glassGrad.addColorStop(0.5, '#7ab0d8');
        glassGrad.addColorStop(0.7, '#4a8a50');
        glassGrad.addColorStop(1, '#3a7a40');
        ctx.fillStyle = glassGrad;
        ctx.fillRect(winX, winY, winW, winH);

        // Clouds in window
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        const cloudX = winX + 15 + Math.sin(gameTime * 0.008 + wx) * 8;
        ctx.beginPath();
        ctx.ellipse(cloudX, winY + 18, 14, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cloudX + 10, winY + 20, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Hills in window
        ctx.fillStyle = 'rgba(45, 110, 55, 0.5)';
        ctx.beginPath();
        ctx.moveTo(winX, winY + winH * 0.65);
        for (let i = 0; i <= winW; i += 3) {
            ctx.lineTo(winX + i, winY + winH * 0.6 + Math.sin(i * 0.12 + wx * 0.05) * 6);
        }
        ctx.lineTo(winX + winW, winY + winH);
        ctx.lineTo(winX, winY + winH);
        ctx.closePath();
        ctx.fill();

        // Window cross-bar
        ctx.strokeStyle = '#6a5030';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(winX + winW / 2, winY);
        ctx.lineTo(winX + winW / 2, winY + winH);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(winX, winY + winH / 2);
        ctx.lineTo(winX + winW, winY + winH / 2);
        ctx.stroke();

        // Glass sheen
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.moveTo(winX, winY);
        ctx.lineTo(winX + winW * 0.4, winY);
        ctx.lineTo(winX, winY + winH * 0.5);
        ctx.closePath();
        ctx.fill();

        // Curtains
        ctx.fillStyle = '#8a3030';
        // Left curtain
        ctx.beginPath();
        ctx.moveTo(winX - 3, winY - 3);
        ctx.quadraticCurveTo(winX + 8, winY + winH * 0.3, winX + 2, winY + winH + 3);
        ctx.lineTo(winX - 5, winY + winH + 3);
        ctx.lineTo(winX - 5, winY - 3);
        ctx.closePath();
        ctx.fill();
        // Right curtain
        ctx.beginPath();
        ctx.moveTo(winX + winW + 3, winY - 3);
        ctx.quadraticCurveTo(winX + winW - 8, winY + winH * 0.3, winX + winW - 2, winY + winH + 3);
        ctx.lineTo(winX + winW + 5, winY + winH + 3);
        ctx.lineTo(winX + winW + 5, winY - 3);
        ctx.closePath();
        ctx.fill();
        // Curtain rod
        ctx.strokeStyle = '#a08050';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(winX - 10, winY - 5);
        ctx.lineTo(winX + winW + 10, winY - 5);
        ctx.stroke();
        // Rod finials
        ctx.fillStyle = '#a08050';
        ctx.beginPath(); ctx.arc(winX - 10, winY - 5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(winX + winW + 10, winY - 5, 3, 0, Math.PI * 2); ctx.fill();
    });

    // Ceiling light fixtures
    for (let lx = 100; lx < W + 200; lx += 250) {
        const lightX = lx;
        // Light cone
        const lightGrad = ctx.createRadialGradient(lightX, 10, 5, lightX, 50, 100);
        lightGrad.addColorStop(0, 'rgba(255, 230, 160, 0.12)');
        lightGrad.addColorStop(1, 'rgba(255, 230, 160, 0)');
        ctx.fillStyle = lightGrad;
        ctx.beginPath();
        ctx.moveTo(lightX - 80, baseY);
        ctx.lineTo(lightX - 10, 10);
        ctx.lineTo(lightX + 10, 10);
        ctx.lineTo(lightX + 80, baseY);
        ctx.closePath();
        ctx.fill();
        // Fixture
        ctx.fillStyle = '#8a7040';
        ctx.fillRect(lightX - 8, 0, 16, 8);
        ctx.fillStyle = '#f0e0a0';
        ctx.beginPath();
        ctx.arc(lightX, 12, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wooden floor with planks
    const floorGrad = ctx.createLinearGradient(0, baseY, 0, H);
    floorGrad.addColorStop(0, '#6a4420');
    floorGrad.addColorStop(0.1, '#5a3a1a');
    floorGrad.addColorStop(1, '#4a3015');
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, baseY, W + 200, H - baseY);
    // Floor plank lines
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1;
    for (let fx = -cameraX % 55; fx < W + 60; fx += 55) {
        ctx.beginPath();
        ctx.moveTo(fx, baseY);
        ctx.lineTo(fx, H);
        ctx.stroke();
    }
    // Floor highlight at top
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fillRect(0, baseY, W + 200, 3);
    // Floor wood grain
    ctx.strokeStyle = 'rgba(80, 50, 20, 0.15)';
    ctx.lineWidth = 0.5;
    for (let fy = baseY + 8; fy < H; fy += 12) {
        ctx.beginPath();
        for (let fx = 0; fx < W + 60; fx += 3) {
            const gy = fy + Math.sin(fx * 0.15 + fy) * 1.5;

        }

    }

    // Welcome mat near entrance

    ctx.lineWidth = 1;
    ctx.strokeRect(53, baseY + 4, 74, H - baseY - 8);

    ctx.font = '8px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('WELCOME', 90, baseY + (H - baseY) / 2 + 3);
    ctx.textAlign = 'left';

    // --- Shopkeeper ---
    drawShopkeeper(950, baseY);

    // Shopkeeper counter
    ctx.fillStyle = '#5a3e25';
    ctx.fillRect(900, baseY - 30, 80, 30);
    ctx.fillStyle = '#6a4e30';
    ctx.fillRect(898, baseY - 33, 84, 5);
    // Cash register on counter
    ctx.fillStyle = '#666';
    ctx.fillRect(920, baseY - 48, 20, 15);
    ctx.fillStyle = '#888';
    ctx.fillRect(918, baseY - 50, 24, 4);
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(923, baseY - 46, 14, 7);
    // Small display number
    ctx.fillStyle = '#1a3a1a';
    ctx.fillRect(924, baseY - 45, 12, 5);

    // Speech bubble from shopkeeper
    const nearShopkeeper = Math.abs(player.x - 950) < 60;
    if (nearShopkeeper && !cheatCodeMode) {
        const bubbleX = 940, bubbleY = baseY - 95;
        ctx.fillStyle = 'rgba(255,255,255,0.92)';
        ctx.beginPath();
        ctx.roundRect(bubbleX - 75, bubbleY - 16, 150, 30, 8);
        ctx.fill();
        // Bubble tail
        ctx.beginPath();
        ctx.moveTo(bubbleX + 10, bubbleY + 14);
        ctx.lineTo(bubbleX + 15, bubbleY + 24);
        ctx.lineTo(bubbleX + 22, bubbleY + 14);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#2a1a0a';
        ctx.font = '12px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Welcome! Browse around!', bubbleX, bubbleY + 4);
        ctx.textAlign = 'left';
    }

    // Cheat code input overlay
    if (cheatCodeMode) {
        // Darken background
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, W, H);
        // Input box
        const bx = W / 2, by = H / 2;
        ctx.fillStyle = 'rgba(42,26,10,0.95)';
        ctx.beginPath();
        ctx.roundRect(bx - 130, by - 50, 260, 100, 12);
        ctx.fill();
        ctx.strokeStyle = '#c8a86e';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Title
        ctx.fillStyle = '#c8a86e';
        ctx.font = 'bold 14px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Enter Secret Code', bx, by - 22);
        // Input field
        ctx.fillStyle = '#1a0f05';
        ctx.beginPath();
        ctx.roundRect(bx - 90, by - 8, 180, 30, 6);
        ctx.fill();
        ctx.strokeStyle = '#8a6a3e';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Input text (masked)
        ctx.fillStyle = '#e8d8b8';
        ctx.font = '16px monospace';

    }

    // Teleport animation
    if (teleportAnim) {
        const t = teleportAnim.frame / teleportAnim.maxFrames;
        const tx = teleportAnim.x - cameraX;
        const ty = teleportAnim.y;
        // Purple energy column
        const colAlpha = t < 0.5 ? t * 2 : 2 - t * 2;
        const colGrad = ctx.createLinearGradient(tx, ty - 80, tx, ty + 60);
        colGrad.addColorStop(0, `rgba(147, 51, 234, 0)`);
        colGrad.addColorStop(0.3, `rgba(147, 51, 234, ${colAlpha * 0.6})`);
        colGrad.addColorStop(0.7, `rgba(168, 85, 247, ${colAlpha * 0.8})`);
        colGrad.addColorStop(1, `rgba(147, 51, 234, 0)`);
        ctx.fillStyle = colGrad;
        ctx.fillRect(tx - 20, ty - 80, 40, 140);
        // Sparkle particles
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2 + teleportAnim.frame * 0.1;
            const radius = 25 + Math.sin(teleportAnim.frame * 0.2 + i) * 15;
            const px = tx + Math.cos(angle) * radius * t;
            const py = ty - 10 + Math.sin(angle) * radius * 0.6;
            const sparkAlpha = colAlpha * (0.5 + Math.random() * 0.5);
            ctx.fillStyle = `rgba(200, 160, 255, ${sparkAlpha})`;
            ctx.beginPath();
            ctx.arc(px, py, 2, 0, Math.PI * 2);
            ctx.fill();
        }
        // Flash at peak
        if (t > 0.4 && t < 0.6) {
            const flashAlpha = (1 - Math.abs(t - 0.5) / 0.1) * 0.3;
            ctx.fillStyle = `rgba(200, 160, 255, ${flashAlpha})`;
            ctx.fillRect(0, 0, W, H);

    // Pedestals with items
    getShopPedestals().forEach(ped => {

                ctx.fillRect(6 * u, -34 * u, 5 * u, 16 * u);
                // Head

                ctx.beginPath();
                ctx.ellipse(0, -42 * u, 8 * u, 9 * u, 0, 0, Math.PI * 2);
                ctx.fill();
                // Hair
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.ellipse(0, -48 * u, 8 * u, 5 * u, 0, Math.PI, Math.PI * 2);
                ctx.fill();
                ctx.fillRect(-8 * u, -48 * u, 16 * u, 3 * u);
                // Glasses
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1.2;
                ctx.strokeRect(-6 * u, -44 * u, 5 * u, 4 * u);
                ctx.strokeRect(1 * u, -44 * u, 5 * u, 4 * u);
                ctx.beginPath();
                ctx.moveTo(-1 * u, -42 * u);
                ctx.lineTo(1 * u, -42 * u);
                ctx.stroke();
                // Eyes behind glasses

                ctx.beginPath();

                ctx.restore();
            } else {
                // Draw JJ Atencio standing

                ctx.translate(charX, charY);
                const H = 56;
                const u = H / 56;
                // Legs

                ctx.fillRect(-5 * u, -16 * u, 4 * u, 16 * u);
                ctx.fillRect(1 * u, -16 * u, 4 * u, 16 * u);
                // Shoes

                ctx.fillRect(-6 * u, -2 * u, 6 * u, 2 * u);

                // Body (navy polo from current shirt tier)

                ctx.fillRect(-11 * u, -34 * u, 5 * u, 16 * u);

                ctx.beginPath();
                ctx.ellipse(0, -42 * u, 8 * u, 9 * u, 0, 0, Math.PI * 2);
                ctx.fill();
                // Hair (curly/dark)

                ctx.beginPath();
                ctx.ellipse(0, -48 * u, 9 * u, 5 * u, 0, Math.PI, Math.PI * 2);

                // Eyes
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-3.5 * u, -42 * u, 1.5 * u, 0, Math.PI * 2);
                ctx.arc(3.5 * u, -42 * u, 1.5 * u, 0, Math.PI * 2);

                // Smile
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.2;

                ctx.arc(0, -38 * u, 3 * u, 0.1 * Math.PI, 0.9 * Math.PI);

                ctx.restore();
            }

            // Label above character
            ctx.fillStyle = '#c9a84c';

                ctx.fillText('Press UP to swap', ped.x, baseY + 34);

        }

        // Glass display case

        ctx.fillRect(ped.x - 24, baseY - 4, 48, 4);

        ctx.fillRect(ped.x - 20, baseY - 40, 40, 40);

        ctx.fillRect(ped.x - 24, baseY - 44, 48, 6);
        // Pedestal side highlight
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(ped.x - 20, baseY - 40, 4, 40);

        // Spotlight glow on item
        const spotGrad = ctx.createRadialGradient(ped.x, baseY - 80, 5, ped.x, baseY - 60, 40);
        spotGrad.addColorStop(0, 'rgba(255, 230, 160, 0.15)');
        spotGrad.addColorStop(1, 'rgba(255, 230, 160, 0)');
        ctx.fillStyle = spotGrad;
        ctx.beginPath();
        ctx.arc(ped.x, baseY - 60, 40, 0, Math.PI * 2);
        ctx.fill();

        // Floating item with bob
        const bobY = baseY - 70 + Math.sin(gameTime * 0.04 + ped.x * 0.01) * 4;

        // Item glow
        ctx.fillStyle = 'rgba(201, 168, 76, 0.1)';
        ctx.beginPath();
        ctx.arc(ped.x, bobY, 18, 0, Math.PI * 2);
        ctx.fill();

        if (ped.type === 'club') {
            const showTier = Math.min(nextTier, CLUB_TIERS.length - 1);
            ctx.fillStyle = CLUB_TIERS[showTier].color;

        } else if (ped.type === 'boots') {

            ctx.fill();
            if (BOOT_TIERS[showTier].wings) {
                ctx.fillStyle = '#fff';
                ctx.beginPath();

                ctx.lineTo(ped.x - 16, bobY - 8);

        } else if (ped.type === 'shirt') {
            const showTier = Math.min(nextTier, SHIRT_TIERS.length - 1);
            ctx.fillStyle = SHIRT_TIERS[showTier].colors[0];

                club: CLUB_TIERS, shaft: SHAFT_TIERS,

            };
            ctx.fillText('Equipped: ' + tierNames[ped.type][tier].name, ped.x, baseY + 34);
        }
        ctx.textAlign = 'left';
    });

    // Continue door at right
    // Door frame
    ctx.fillStyle = '#5a4025';
    ctx.fillRect(1010, baseY - 65, 44, 65);
    ctx.fillStyle = '#3a2815';
    ctx.fillRect(1014, baseY - 61, 36, 61);

    ctx.fillStyle = '#c9a84c';
    ctx.beginPath();
    ctx.arc(1042, baseY - 30, 3, 0, Math.PI * 2);

    ctx.fillStyle = '#c9a84c';
