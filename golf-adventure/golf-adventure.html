    // Draw player in shop
    drawPlayer();

    ctx.restore();

    // Vignette for atmosphere
    const vigGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.7);
    vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vigGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, W, H);

    // Coin display (top right, fixed)
    ctx.fillStyle = '#c9a84c';
    ctx.font = 'bold 16px Georgia';
    ctx.textAlign = 'right';
    ctx.fillText(coins + ' coins', W - 20, 30);
    ctx.textAlign = 'left';

    // Shop title with decorative border
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(W / 2 - 75, 10, 150, 28);
    ctx.strokeStyle = '#c9a84c';
    ctx.lineWidth = 1;
    ctx.strokeRect(W / 2 - 75, 10, 150, 28);
    ctx.fillStyle = '#c9a84c';
    ctx.font = 'bold 18px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('PRO SHOP', W / 2, 31);
    ctx.textAlign = 'left';

    // Instruction
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '13px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Press UP to buy items, talk to shopkeeper, or exit', W / 2, H - 15);
    ctx.textAlign = 'left';

    // Feedback message
    if (shopMessageTimer > 0) {
        ctx.fillStyle = (shopMessage === 'Purchased!' || shopMessage.includes('unlocked') || shopMessage.includes('Switched')) ? '#4ade80' : '#e57373';
        ctx.font = 'bold 18px Georgia';
        ctx.textAlign = 'center';
        ctx.globalAlpha = Math.min(1, shopMessageTimer / 30);
        ctx.fillText(shopMessage, W / 2, H / 2 - 60);
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
    }
}

// ==================== HOLE COMPLETE ====================
function onHoleSunk() {
    const par = levels[currentHole].par;
    const diff = strokes - par;
    scores.push(strokes);

    let earned = 0;
    if (strokes === 1) earned = 5;
    else if (diff <= -2) earned = 4;
    else if (diff === -1) earned = 3;
    else if (diff === 0) earned = 2;
    else if (diff === 1) earned = 1;
    coins += earned;
    saveProgress();

    let msg;
    if (strokes === 1) msg = 'HOLE IN ONE!';
    else if (diff <= -2) msg = 'Eagle!';
    else if (diff === -1) msg = 'Birdie!';
    else if (diff === 0) msg = 'Par!';
    else if (diff === 1) msg = 'Bogey';
    else if (diff === 2) msg = 'Double Bogey';
    else msg = '+' + diff;

    document.getElementById('holeMsg').textContent = msg;
    document.getElementById('holeSummary').textContent =
        `Hole ${currentHole + 1}: ${strokes} stroke${strokes !== 1 ? 's' : ''} (Par ${par})` +
        (earned > 0 ? ` — +${earned} coins!` : '');

    const btn = document.getElementById('nextBtn');
    btn.textContent = currentHole >= levels.length - 1 ? 'See Results' : 'Next Hole';

    setTimeout(() => {
        document.getElementById('holeOverlay').classList.remove('hidden');
    }, 600);
}

document.getElementById('nextBtn').addEventListener('click', () => {
    document.getElementById('holeOverlay').classList.add('hidden');
    if (currentHole >= levels.length - 1) {
        showEnd();
    } else {
        // Enter shop before next hole
        gameMode = 'shop';
        initShop();
    }
});

function showEnd() {
    hasCompletedGame = true;
    localStorage.setItem('jhi-golf-completed', 'true');

    const total = scores.reduce((a, b) => a + b, 0);
    const totalPar = levels.reduce((a, l) => a + l.par, 0);
    const diff = total - totalPar;
    const diffStr = diff === 0 ? 'Even' : diff > 0 ? '+' + diff : '' + diff;
    document.getElementById('endSummary').textContent =
        `Total: ${total} strokes (${diffStr} | Par ${totalPar})`;
    document.getElementById('endOverlay').classList.remove('hidden');
}

function generateScoreImage() {
    const c = document.createElement('canvas');
    c.width = 600; c.height = 400;
    const cx = c.getContext('2d');

    // Background
    cx.fillStyle = '#0a1628';
    cx.fillRect(0, 0, 600, 400);

    // Gold border
    cx.strokeStyle = '#c9a84c';
    cx.lineWidth = 4;
    cx.strokeRect(12, 12, 576, 376);

    // Title
    cx.fillStyle = '#c9a84c';
    cx.font = 'bold 28px Georgia, serif';
    cx.textAlign = 'center';
    cx.fillText('JHI GOLF ADVENTURE', 300, 55);

    // Subtitle
    cx.fillStyle = 'rgba(255,255,255,0.6)';
    cx.font = '16px Georgia, serif';
    cx.fillText('Scorecard', 300, 80);

    // Hole headers
    const colW = 55, startX = 55, rowY = 120;
    cx.font = 'bold 14px Georgia, serif';
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.textAlign = 'center';
    for (let i = 0; i < levels.length; i++) {
        cx.fillText('H' + (i + 1), startX + i * colW, rowY);
    }
    cx.fillText('TOT', startX + levels.length * colW, rowY);

    // Par row
    cx.fillStyle = 'rgba(255,255,255,0.4)';
    cx.font = '13px Georgia, serif';
    for (let i = 0; i < levels.length; i++) {
        cx.fillText(levels[i].par, startX + i * colW, rowY + 22);
    }
    const totalPar = levels.reduce((a, l) => a + l.par, 0);
    cx.fillText(totalPar, startX + levels.length * colW, rowY + 22);

    // Score row
    cx.font = 'bold 18px Georgia, serif';
    const total = scores.reduce((a, b) => a + b, 0);
    for (let i = 0; i < scores.length; i++) {
        const diff = scores[i] - levels[i].par;
        cx.fillStyle = diff < 0 ? '#4CAF50' : diff === 0 ? '#c9a84c' : '#e57373';
        cx.fillText(scores[i], startX + i * colW, rowY + 50);
    }
    cx.fillStyle = '#c9a84c';
    cx.fillText(total, startX + levels.length * colW, rowY + 50);

    // Divider
    cx.strokeStyle = 'rgba(255,255,255,0.15)';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(40, 200);
    cx.lineTo(560, 200);
    cx.stroke();

    // Total score large
    const diff = total - totalPar;
    const diffStr = diff === 0 ? 'Even' : diff > 0 ? '+' + diff : '' + diff;
    cx.fillStyle = '#fff';
    cx.font = 'bold 36px Georgia, serif';
    cx.fillText(total + ' Strokes', 300, 255);

    cx.fillStyle = diff <= 0 ? '#4CAF50' : '#e57373';
    cx.font = 'bold 24px Georgia, serif';
    cx.fillText(diffStr + ' (Par ' + totalPar + ')', 300, 290);

    // Footer
    cx.fillStyle = 'rgba(255,255,255,0.3)';
    cx.font = '14px Georgia, serif';
    cx.fillText('januarius.ph', 300, 370);

    return c;
}

async function shareScore() {
    const c = generateScoreImage();
    const blob = await new Promise(r => c.toBlob(r, 'image/png'));
    const file = new File([blob], 'jhi-golf-adventure-score.png', { type: 'image/png' });

    // Only use Web Share API on mobile (touch devices) — desktop Safari shares text only
    const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
            await navigator.share({ files: [file], title: 'JHI Golf Adventure Score' });
            return;
        } catch (e) { /* user cancelled or error, fall through to download */ }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'jhi-golf-adventure-score.png';
    a.click();
    URL.revokeObjectURL(url);
}

document.getElementById('shareBtn').addEventListener('click', shareScore);

document.getElementById('replayBtn').addEventListener('click', () => {
    document.getElementById('endOverlay').classList.add('hidden');
    currentHole = 0;
    scores = [];
    initHole();
});

// ==================== GAME LOOP ====================
function loop() {
    if (gameMode === 'shop') {
        updateShop();
        drawShop();
    } else {
        update();
        draw();
    }
    requestAnimationFrame(loop);
}

initHole();
loop();
</script>
