            // Side hair
            ctx.fillRect(-9.5 * u, headTop + 1.5 * u, 2 * u, 6 * u);
            ctx.fillRect(7.5 * u, headTop + 1.5 * u, 2 * u, 6 * u);

            // Glasses (rectangular, slightly larger)
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 1.5 * u;
            ctx.strokeRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 5 * u);
            ctx.strokeRect(1 * u, headCenter - 3 * u, 6.5 * u, 5 * u);
            ctx.beginPath();
            ctx.moveTo(-1 * u, headCenter - 0.5 * u);
            ctx.lineTo(1 * u, headCenter - 0.5 * u);
            ctx.stroke();
            // Temple arms
            ctx.beginPath();
            ctx.moveTo(-7.5 * u, headCenter - 1.5 * u);
            ctx.lineTo(-9.5 * u, headCenter - 2 * u);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(7.5 * u, headCenter - 1.5 * u);
            ctx.lineTo(9.5 * u, headCenter - 2 * u);
            ctx.stroke();
            // Lens tint (slight purple tint for psychic theme)
            ctx.fillStyle = 'rgba(138, 43, 226, 0.08)';
            ctx.fillRect(-7.5 * u, headCenter - 3 * u, 6.5 * u, 5 * u);
            ctx.fillRect(1 * u, headCenter - 3 * u, 6.5 * u, 5 * u);

            // Concentrating eyes when near ball (psychic focus)
            if (nearBall || psychicMode) {
                // Glowing purple eyes
                ctx.fillStyle = '#8a2be2';
                ctx.beginPath();
                ctx.arc(-4 * u, headCenter, 1.5 * u, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(4.5 * u, headCenter, 1.5 * u, 0, Math.PI * 2);
                ctx.fill();
                // Eye glow
                ctx.fillStyle = 'rgba(138, 43, 226, 0.3)';
                ctx.beginPath();
                ctx.arc(-4 * u, headCenter, 3 * u, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(4.5 * u, headCenter, 3 * u, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Normal dark eyes
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.arc(-4 * u, headCenter, 1.2 * u, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(4.5 * u, headCenter, 1.2 * u, 0, Math.PI * 2);
                ctx.fill();
            }

            // Nose
            ctx.strokeStyle = '#c8a878';
            ctx.lineWidth = 0.8 * u;
            ctx.beginPath();
            ctx.moveTo(0, headCenter + 0.5 * u);
            ctx.lineTo(0.5 * u, headCenter + 3 * u);
            ctx.stroke();

            // Smile (always calm/confident)
            ctx.strokeStyle = '#a07858';
            ctx.lineWidth = 1 * u;
            ctx.beginPath();
            ctx.moveTo(-2.5 * u, headCenter + 4.5 * u);
            ctx.quadraticCurveTo(0, headCenter + 5.5 * u, 2.5 * u, headCenter + 4.5 * u);
            ctx.stroke();
        }

        // ==================== PRO SHOP ====================
        function getShopPedestals() {
            const peds = [
                { type: 'club', label: '+ Power', x: 200 },
                { type: 'shaft', label: '+ Control', x: 400 },
                { type: 'boots', label: '+ Jump', x: 600 },
                { type: 'shirt', label: '+ Health', x: 800 }
            ];
            if (hasCompletedGame) {
                peds.push({ type: 'character', label: 'Patrick Wong', x: 1150 });
            }
            return peds;
        }

        let shopMessage = '';
        let shopMessageTimer = 0;

        function initShop() {
            const baseY = canvas.height - 80 * S;
            player.x = 100;
            player.y = baseY - player.h;
            player.vx = 0; player.vy = 0;
            player.onGround = true;
            player.facing = 1;
            player.walking = false;
            player.walkFrame = 0;
            cameraX = 0;
            shopMessage = '';
            shopMessageTimer = 0;
        }

        function updateShop() {
            gameTime++;
            player.walking = false;
            if (!cheatCodeMode && !shopDialogueMode && !changelogMode) {
                if (keys['a'] || keys['arrowleft']) {
                    player.vx = -PLAYER_SPEED;
                    player.facing = -1;
                    player.walking = true;
                } else if (keys['d'] || keys['arrowright']) {
                    player.vx = PLAYER_SPEED;
                    player.facing = 1;
                    player.walking = true;
                } else {
                    player.vx = 0;
                }
                player.x += player.vx;
                player.x = Math.max(30, Math.min(player.x, hasCompletedGame ? 1200 : 1050));
            } else {
                player.vx = 0;
            }
            if (player.walking) player.walkFrame += 0.15;
            else player.walkFrame = 0;

            if (shopMessageTimer > 0) shopMessageTimer--;

            // Update teleport animation
            if (teleportAnim) {
                teleportAnim.frame++;
                if (teleportAnim.frame >= teleportAnim.maxFrames) teleportAnim = null;
            }

            // Buy / interact with up/W key
            if (keys['w'] || keys['arrowup']) {
                if (!player.buyHeld) {
                    player.buyHeld = true;

                    // Handle changelog mode — A/up dismisses
                    if (changelogMode) {
                        changelogMode = false;
                        return;
                    }
                    // Handle dialogue menu — A/up confirms selection
                    if (shopDialogueMode) {
                        shopDialogueMode = false;
                        if (shopDialogueSelection === 0) {
                            changelogMode = true;
                            changelogScroll = 0;
                        } else {
                            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                            if (isMobile) {
                                const code = prompt('Enter secret code:');
                                if (code && code.toLowerCase() === 'password') {
                                    if (!patrickUnlocked) {
                                        if (!usedPatrick && !confirm('If you choose to use the powers of Patrick Wong, you will be ineligible to submit to the leaderboard. Continue?')) {
                                            // Player declined
                                        } else {
                                            hasCompletedGame = true;
                                            patrickUnlocked = true;
                                            activeCharacter = 'patrick';
                                            usedPatrick = true;
                                            saveCharacterState();
                                            saveProgress();
                                            shopMessage = 'Patrick Wong unlocked!';
                                            shopMessageTimer = 120;
                                            teleportAnim = { x: 1150, y: canvas.height - 80 * S - 56, frame: 0, maxFrames: 60 };
                                        }
                                    } else {
                                        shopMessage = 'Already unlocked!';
                                        shopMessageTimer = 90;
                                    }
                                } else if (code !== null) {
                                    shopMessage = 'Wrong code...';
                                    shopMessageTimer = 90;
                                }
                            } else {
                                cheatCodeMode = true;
                                cheatCodeInput = '';
                            }
                        }
                        return;
                    }

                    // Near exit door? Leave shop
                    if (Math.abs(player.x - 1032) < 40) {
                        currentHole++;
                        if (currentHole === 8) {
                            cinematicMode = 'space-transition';
                            cinematicFrame = 0;
                            cinematicSkipped = false;
                            gameMode = 'cinematic';
                        } else {
                            gameMode = 'play';
                            initHole();
                        }
                        return;
                    }
                    // Near shopkeeper? Open dialogue menu
                    if (Math.abs(player.x - 950) < 60) {
                        shopDialogueMode = true;
                        shopDialogueSelection = 0;
                    } else {
                        tryBuy();
                    }
                }
            } else {
                player.buyHeld = false;
            }

            // Dialogue selection with down/S/B — toggle between options
            if (shopDialogueMode && (keys['s'] || keys['arrowdown'] || keys['crouchKey'])) {
                if (!player.dialogueDownHeld) {
                    player.dialogueDownHeld = true;
                    shopDialogueSelection = shopDialogueSelection === 0 ? 1 : 0;
                }
            } else if (shopDialogueMode && (keys['a'] || keys['arrowleft'])) {
                if (!player.dialogueDownHeld) {
                    player.dialogueDownHeld = true;
                    shopDialogueSelection = 0;
                }
            } else if (shopDialogueMode && (keys['d'] || keys['arrowright'])) {
                if (!player.dialogueDownHeld) {
                    player.dialogueDownHeld = true;
                    shopDialogueSelection = 1;
                }
            } else {
                player.dialogueDownHeld = false;
            }

            // Camera
            const targetCX = Math.max(0, player.x - canvas.width / 2);
            cameraX += (targetCX - cameraX) * 0.1;
        }

        function tryBuy() {
            const pedList = getShopPedestals();
            for (const ped of pedList) {
                if (Math.abs(player.x - ped.x) > 50) continue;

                if (ped.type === 'character') {
                    if (patrickUnlocked) {
                        // Toggle character
                        const switchingToPatrick = activeCharacter === 'jj';
                        if (switchingToPatrick && !usedPatrick && !confirm('If you choose to use the powers of Patrick Wong, you will be ineligible to submit to the leaderboard. Continue?')) {
                            return;
                        }
                        activeCharacter = switchingToPatrick ? 'patrick' : 'jj';
                        if (switchingToPatrick) usedPatrick = true;
                        saveCharacterState();
                        shopMessage = 'Switched to ' + (activeCharacter === 'patrick' ? 'Patrick Wong' : 'JJ Atencio') + '!';
                        shopMessageTimer = 90;
                        return;
                    } else {
                        if (coins < 50) {
                            shopMessage = 'Not enough coins!';
                            shopMessageTimer = 90;
                            return;
                        }
                        if (!usedPatrick && !confirm('If you choose to use the powers of Patrick Wong, you will be ineligible to submit to the leaderboard. Continue?')) {
                            return;
                        }
                        coins -= 50;
                        patrickUnlocked = true;
                        activeCharacter = 'patrick';
                        usedPatrick = true;
                        saveCharacterState();
                        saveProgress();
                        shopMessage = 'Patrick Wong unlocked!';
                        shopMessageTimer = 90;
                        return;
                    }
                }

                const tier = equipment[ped.type];
                const prices = SHOP_PRICES[ped.type];
                const nextTier = tier + 1;

                if (nextTier >= prices.length) {
                    shopMessage = 'MAXED!';
                    shopMessageTimer = 90;
                    return;
                }

                const cost = prices[nextTier];
                if (coins < cost) {
                    shopMessage = 'Not enough coins!';
                    shopMessageTimer = 90;
                    return;
                }

                coins -= cost;
                equipment[ped.type] = nextTier;
                saveProgress();
                shopMessage = 'Purchased!';
                shopMessageTimer = 90;
                return;
            }
        }

        function drawShopkeeper(x, baseY) {
            const u = 50 / 56; // scale factor
            const y = baseY - 50;

            ctx.save();
            ctx.translate(x, y);
            ctx.scale(-1, 1); // face left (toward player)

            const headCenter = 8 * u;
            const neckY = 16 * u;
            const torsoTop = neckY;
            const torsoBot = 38 * u;
            const footY = 50;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, footY, 14 * u, 4 * u, 0, 0, Math.PI * 2);
            ctx.fill();

            // Legs (dark slacks)
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#2a2a3a';
            ctx.lineWidth = 5 * u;
            ctx.beginPath(); ctx.moveTo(-4 * u, torsoBot); ctx.lineTo(-5 * u, footY - 3 * u); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(4 * u, torsoBot); ctx.lineTo(5 * u, footY - 3 * u); ctx.stroke();

            // Shoes
            ctx.fillStyle = '#3a2a1a';
            ctx.beginPath(); ctx.roundRect(-8 * u, footY - 4 * u, 8 * u, 5 * u, 2); ctx.fill();
            ctx.beginPath(); ctx.roundRect(2 * u, footY - 4 * u, 8 * u, 5 * u, 2); ctx.fill();

            // Body (green vest over white shirt)
            ctx.fillStyle = '#f0ead8';
            ctx.beginPath();
            ctx.moveTo(-9 * u, torsoTop); ctx.lineTo(9 * u, torsoTop);
            ctx.lineTo(8 * u, torsoBot); ctx.lineTo(-8 * u, torsoBot);
            ctx.closePath(); ctx.fill();
            // Vest
            ctx.fillStyle = '#2d6a4f';
            ctx.beginPath();
            ctx.moveTo(-9 * u, torsoTop + 1); ctx.lineTo(-3 * u, torsoTop + 1);
            ctx.lineTo(-3 * u, torsoBot); ctx.lineTo(-9 * u, torsoBot);
            ctx.closePath(); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(9 * u, torsoTop + 1); ctx.lineTo(3 * u, torsoTop + 1);
            ctx.lineTo(3 * u, torsoBot); ctx.lineTo(9 * u, torsoBot);
            ctx.closePath(); ctx.fill();

            // Belt
            ctx.fillStyle = '#5a4a30';
            ctx.fillRect(-8 * u, torsoBot - 2 * u, 16 * u, 3 * u);
            ctx.fillStyle = '#c9a84c';
            ctx.fillRect(-1.5 * u, torsoBot - 2 * u, 3 * u, 3 * u);

            // Arms
            ctx.strokeStyle = '#2d6a4f';
            ctx.lineWidth = 5 * u;
            ctx.beginPath(); ctx.moveTo(-9 * u, torsoTop + 2 * u); ctx.lineTo(-12 * u, torsoTop + 8 * u); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(9 * u, torsoTop + 2 * u); ctx.lineTo(12 * u, torsoTop + 8 * u); ctx.stroke();
            ctx.strokeStyle = '#c4956a';
            ctx.lineWidth = 3.5 * u;
            ctx.beginPath(); ctx.moveTo(-12 * u, torsoTop + 8 * u); ctx.lineTo(-13 * u, torsoBot - 2 * u); ctx.stroke();
            // Right hand waving
            const waveAngle = Math.sin(gameTime * 0.05) * 0.3;
            ctx.beginPath();
            ctx.moveTo(12 * u, torsoTop + 8 * u);
            ctx.lineTo(12 * u + Math.cos(-1 + waveAngle) * 12 * u, torsoTop + 8 * u + Math.sin(-1 + waveAngle) * 12 * u);
            ctx.stroke();

            // Head
            ctx.fillStyle = '#c4956a';
            ctx.beginPath();
            ctx.ellipse(0, headCenter, 9 * u, 9.5 * u, 0, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.fillStyle = '#b8876a';
            ctx.beginPath(); ctx.ellipse(-9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(9 * u, headCenter, 2 * u, 3 * u, 0, 0, Math.PI * 2); ctx.fill();

            // Visor/cap
            ctx.fillStyle = '#1a472a';
            ctx.beginPath();
            ctx.ellipse(0, headCenter - 6 * u, 10 * u, 4 * u, 0, Math.PI, Math.PI * 2);
            ctx.fill();
            // Cap brim
            ctx.fillStyle = '#1a472a';
            ctx.beginPath();
            ctx.moveTo(-10 * u, headCenter - 6 * u);
            ctx.lineTo(14 * u, headCenter - 5 * u);
            ctx.lineTo(14 * u, headCenter - 3 * u);
            ctx.lineTo(-10 * u, headCenter - 4 * u);
            ctx.closePath();
            ctx.fill();
            // JHI logo on cap
            ctx.fillStyle = '#c9a84c';
            ctx.font = `bold ${5 * u}px Georgia`;
            ctx.textAlign = 'center';
            ctx.fillText('JHI', 0, headCenter - 6 * u);

            // Mustache
            ctx.strokeStyle = '#5a3a1a';
            ctx.lineWidth = 1.5 * u;
            ctx.beginPath();
            ctx.moveTo(-5 * u, headCenter + 2.5 * u);
            ctx.quadraticCurveTo(-3 * u, headCenter + 4.5 * u, 0, headCenter + 3 * u);
            ctx.quadraticCurveTo(3 * u, headCenter + 4.5 * u, 5 * u, headCenter + 2.5 * u);
            ctx.stroke();

            // Eyes
            ctx.fillStyle = '#2a2a2a';
            ctx.beginPath(); ctx.arc(-4 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(4.5 * u, headCenter - 0.5 * u, 1.2 * u, 0, Math.PI * 2); ctx.fill();

            // Smile
            ctx.strokeStyle = '#8a5a3a';
            ctx.lineWidth = 1 * u;
            ctx.beginPath();
            ctx.arc(0, headCenter + 4 * u, 3 * u, 0.1, Math.PI - 0.1);
            ctx.stroke();

            ctx.textAlign = 'left';
            ctx.restore();
        }

        function drawShop() {
            const W = canvas.width, H = canvas.height;
            const baseY = H - 80 * S;

            // Background - indoor shop
            ctx.fillStyle = '#2a1a0a';
            ctx.fillRect(0, 0, W, H);

            // Back wall with wainscoting
            const wallGrad = ctx.createLinearGradient(0, 0, 0, baseY);
            wallGrad.addColorStop(0, '#4a3422');
            wallGrad.addColorStop(0.6, '#3a2818');
            wallGrad.addColorStop(1, '#2a1a0a');
            ctx.fillStyle = wallGrad;
            ctx.fillRect(0, 0, W + 200, baseY);

            // Wainscoting (lower wall paneling)
            const wainscotTop = baseY - 70;
            ctx.fillStyle = '#3a2515';
            ctx.fillRect(0, wainscotTop, W + 200, 70);
            // Panel trim
            ctx.strokeStyle = '#5a4025';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(0, wainscotTop, W + 200, 70);
            // Vertical panel lines
            for (let px = 40; px < W + 200; px += 80) {
                ctx.beginPath();
                ctx.moveTo(px - cameraX % 80, wainscotTop + 5);
                ctx.lineTo(px - cameraX % 80, baseY - 5);
                ctx.stroke();
            }
            // Crown molding
            ctx.fillStyle = '#6a5030';
            ctx.fillRect(0, wainscotTop - 3, W + 200, 5);

            // Wallpaper pattern (subtle diamond)
            ctx.strokeStyle = 'rgba(255,255,255,0.025)';
            ctx.lineWidth = 0.5;
            for (let wy = 15; wy < wainscotTop; wy += 30) {
                for (let wx = -cameraX % 30; wx < W + 30; wx += 30) {
                    ctx.beginPath();
                    ctx.moveTo(wx, wy - 10); ctx.lineTo(wx + 10, wy);
                    ctx.lineTo(wx, wy + 10); ctx.lineTo(wx - 10, wy);
                    ctx.closePath(); ctx.stroke();
                }
            }

            // Wall shelves with items
            ctx.fillStyle = '#5a3e25';
            const shelfPositions = [65, 140];
            shelfPositions.forEach(sy => {
                // Shelf board
                ctx.fillStyle = '#5a3e25';
                ctx.fillRect(0, sy, W + 200, 6);
                // Shelf bracket shadows
                ctx.fillStyle = '#4a3020';
                for (let bx = 60 - cameraX % 200; bx < W + 100; bx += 200) {
                    ctx.fillRect(bx, sy + 6, 4, 10);
                    ctx.fillRect(bx + 14, sy + 6, 4, 10);
                }
            });

            // Shelf decorations (trophies, golf balls, books)
            // Top shelf items
            for (let dx = 30 - cameraX % 180; dx < W + 100; dx += 180) {
                // Trophy
                ctx.fillStyle = '#c9a84c';
                ctx.fillRect(dx, shelfPositions[0] - 18, 6, 12);
                ctx.fillRect(dx - 4, shelfPositions[0] - 6, 14, 5);
                ctx.beginPath();
                ctx.arc(dx + 3, shelfPositions[0] - 22, 6, 0, Math.PI * 2);
                ctx.fill();
                // Stack of golf balls
                ctx.fillStyle = '#ddd';
                ctx.beginPath(); ctx.arc(dx + 50, shelfPositions[0] - 5, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(dx + 59, shelfPositions[0] - 5, 4, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(dx + 54.5, shelfPositions[0] - 12, 4, 0, Math.PI * 2); ctx.fill();
                // Book
                ctx.fillStyle = '#8b3a3a';
                ctx.fillRect(dx + 90, shelfPositions[0] - 16, 8, 16);
                ctx.fillStyle = '#3a5a8b';
                ctx.fillRect(dx + 100, shelfPositions[0] - 20, 8, 20);
                ctx.fillStyle = '#4a7a3a';
                ctx.fillRect(dx + 110, shelfPositions[0] - 14, 6, 14);
            }

            // Bottom shelf items
            for (let dx = 80 - cameraX % 200; dx < W + 100; dx += 200) {
                // Golf bag
                ctx.fillStyle = '#4a6a8a';
                ctx.fillRect(dx, shelfPositions[1] - 28, 12, 28);
                ctx.fillStyle = '#888';
                ctx.fillRect(dx + 1, shelfPositions[1] - 34, 2, 10);
                ctx.fillRect(dx + 5, shelfPositions[1] - 32, 2, 8);
                ctx.fillRect(dx + 9, shelfPositions[1] - 36, 2, 12);
                // Framed photo
                ctx.strokeStyle = '#8a7040';
                ctx.lineWidth = 2;
                ctx.strokeRect(dx + 55, shelfPositions[1] - 22, 18, 20);
                ctx.fillStyle = '#2a4a2a';
                ctx.fillRect(dx + 57, shelfPositions[1] - 20, 14, 16);
                // Small flag in frame
                ctx.fillStyle = '#c9a84c';
                ctx.beginPath();
                ctx.moveTo(dx + 64, shelfPositions[1] - 18);
                ctx.lineTo(dx + 64, shelfPositions[1] - 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(dx + 64, shelfPositions[1] - 18);
                ctx.lineTo(dx + 69, shelfPositions[1] - 16);
                ctx.lineTo(dx + 64, shelfPositions[1] - 14);
                ctx.fill();
            }

            ctx.save();
            ctx.translate(-cameraX, 0);

            // --- Windows ---
            const windowPositions = [120, 520, 920];
            windowPositions.forEach(wx => {
                const winX = wx;
                const winY = 45;
                const winW = 70;
                const winH = 80;

                // Window frame (outer)
                ctx.fillStyle = '#6a5030';
                ctx.fillRect(winX - 5, winY - 5, winW + 10, winH + 10);

                // Window glass - outdoor scene
                const glassGrad = ctx.createLinearGradient(winX, winY, winX, winY + winH);
                glassGrad.addColorStop(0, '#5a8ab8');
                glassGrad.addColorStop(0.5, '#7ab0d8');
                glassGrad.addColorStop(0.7, '#4a8a50');
                glassGrad.addColorStop(1, '#3a7a40');
                ctx.fillStyle = glassGrad;
                ctx.fillRect(winX, winY, winW, winH);

                // Clouds in window
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                const cloudX = winX + 15 + Math.sin(gameTime * 0.008 + wx) * 8;
                ctx.beginPath();
                ctx.ellipse(cloudX, winY + 18, 14, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloudX + 10, winY + 20, 8, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Hills in window
                ctx.fillStyle = 'rgba(45, 110, 55, 0.5)';
                ctx.beginPath();
                ctx.moveTo(winX, winY + winH * 0.65);
                for (let i = 0; i <= winW; i += 3) {
                    ctx.lineTo(winX + i, winY + winH * 0.6 + Math.sin(i * 0.12 + wx * 0.05) * 6);
                }
                ctx.lineTo(winX + winW, winY + winH);
                ctx.lineTo(winX, winY + winH);
                ctx.closePath();
                ctx.fill();

                // Window cross-bar
                ctx.strokeStyle = '#6a5030';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(winX + winW / 2, winY);
                ctx.lineTo(winX + winW / 2, winY + winH);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(winX, winY + winH / 2);
                ctx.lineTo(winX + winW, winY + winH / 2);
                ctx.stroke();

                // Glass sheen
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.beginPath();
                ctx.moveTo(winX, winY);
                ctx.lineTo(winX + winW * 0.4, winY);
                ctx.lineTo(winX, winY + winH * 0.5);
                ctx.closePath();
                ctx.fill();

                // Curtains
                ctx.fillStyle = '#8a3030';
                // Left curtain
                ctx.beginPath();
                ctx.moveTo(winX - 3, winY - 3);
                ctx.quadraticCurveTo(winX + 8, winY + winH * 0.3, winX + 2, winY + winH + 3);
                ctx.lineTo(winX - 5, winY + winH + 3);
                ctx.lineTo(winX - 5, winY - 3);
                ctx.closePath();
                ctx.fill();
                // Right curtain
                ctx.beginPath();
                ctx.moveTo(winX + winW + 3, winY - 3);
                ctx.quadraticCurveTo(winX + winW - 8, winY + winH * 0.3, winX + winW - 2, winY + winH + 3);
                ctx.lineTo(winX + winW + 5, winY + winH + 3);
                ctx.lineTo(winX + winW + 5, winY - 3);
                ctx.closePath();
                ctx.fill();
                // Curtain rod
                ctx.strokeStyle = '#a08050';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(winX - 10, winY - 5);
                ctx.lineTo(winX + winW + 10, winY - 5);
                ctx.stroke();

                ctx.fillStyle = '#8a7a5a';
                ctx.font = '10px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('Press Esc or Enter to close', bx, by + boxH / 2 - 10);
                ctx.textAlign = 'left';
            }
        }

        // ==================== HOLE COMPLETE ====================
        function onHoleSunk() {
            playSound('applause', 0.4);
            const par = levels[currentHole].par;
            const diff = strokes - par;
            scores.push(strokes);

            let earned = 0;
            if (strokes === 1) earned = 5;
            else if (diff <= -2) earned = 4;
            else if (diff === -1) earned = 3;
            else if (diff === 0) earned = 2;
            else if (diff === 1) earned = 1;
            coins += earned;
            saveProgress();

            let msg;
            if (strokes === 1) msg = 'HOLE IN ONE!';
            else if (diff <= -2) msg = 'Eagle!';
            else if (diff === -1) msg = 'Birdie!';
            else if (diff === 0) msg = 'Par!';
            else if (diff === 1) msg = 'Bogey';
            else if (diff === 2) msg = 'Double Bogey';
            else msg = '+' + diff;

            document.getElementById('holeMsg').textContent = msg;
            document.getElementById('holeSummary').textContent =
                `Hole ${currentHole + 1}: ${strokes} stroke${strokes !== 1 ? 's' : ''} (Par ${par})` +
                (earned > 0 ? ` — +${earned} coins!` : '');

            const btn = document.getElementById('nextBtn');
            btn.textContent = currentHole >= levels.length - 1 ? 'See Results' : 'Next Hole';

            setTimeout(() => {
                document.getElementById('holeOverlay').classList.remove('hidden');
            }, 600);
        }

        function generateScoreImage() {
            const c = document.createElement('canvas');
            c.width = 600; c.height = 480;
            const cx = c.getContext('2d');

            // Green gradient background
            const bg = cx.createLinearGradient(0, 0, 0, 480);
            bg.addColorStop(0, '#1a472a');
            bg.addColorStop(1, '#0d2818');
            cx.fillStyle = bg;
            cx.fillRect(0, 0, 600, 480);

            // Gold double-line border
            const gold = '#c9a84c';
            cx.strokeStyle = gold;
            cx.lineWidth = 3;
            cx.strokeRect(4, 4, 592, 472);
            cx.lineWidth = 1;
            cx.strokeRect(12, 12, 576, 456);

            // Corner dots
            cx.fillStyle = gold;
            const dotR = 4;
            const corners = [[12, 12], [588, 12], [12, 468], [588, 468]];
            corners.forEach(([x, y]) => {
                cx.beginPath();
                cx.arc(x, y, dotR, 0, Math.PI * 2);
                cx.fill();
            });

            // Title
            cx.fillStyle = gold;
            cx.font = 'bold 28px Georgia, serif';
            cx.textAlign = 'center';
            cx.fillText('JHI GOLF ADVENTURE', 300, 52);

            // Gold divider below title
            cx.strokeStyle = gold;
            cx.lineWidth = 1;
            cx.beginPath();
            cx.moveTo(40, 65);
            cx.lineTo(560, 65);
            cx.stroke();

            // Scorecard layout
            const colW = 50, startX = 65, labelX = 40;
            const headerY = 95;
            const rowH = 30;

            // Header row background tint
            cx.fillStyle = 'rgba(201,168,76,0.15)';
            cx.fillRect(25, headerY - 18, 550, 24);

            // Header row: HOLE | 1-9 | TOT
            cx.font = 'bold 13px Georgia, serif';
            cx.fillStyle = gold;
            cx.textAlign = 'center';
            cx.fillText('HOLE', labelX, headerY);
            for (let i = 0; i < 9; i++) {
                cx.fillText(i + 1, startX + i * colW, headerY);
            }
            cx.fillText('TOT', startX + 9 * colW, headerY);

            // Par row
            const parY = headerY + rowH;
            cx.font = '14px Georgia, serif';
            cx.fillStyle = 'rgba(255,255,255,0.5)';
            cx.textAlign = 'center';
            cx.fillText('Par', labelX, parY);
            const totalPar = levels.reduce((a, l) => a + l.par, 0);
            for (let i = 0; i < levels.length; i++) {
                cx.fillText(levels[i].par, startX + i * colW, parY);
            }
            cx.fillText(totalPar, startX + 9 * colW, parY);

            // Score row
            const scoreY = parY + rowH;
            const total = scores.reduce((a, b) => a + b, 0);
            cx.font = 'bold 17px Georgia, serif';
            cx.textAlign = 'center';
            cx.fillStyle = 'rgba(255,255,255,0.5)';
            cx.font = '14px Georgia, serif';
            cx.fillText('Score', labelX, scoreY);
            cx.font = 'bold 17px Georgia, serif';
            for (let i = 0; i < scores.length; i++) {
                const diff = scores[i] - levels[i].par;
                cx.fillStyle = diff < 0 ? '#4CAF50' : diff === 0 ? gold : '#e57373';
                cx.fillText(scores[i], startX + i * colW, scoreY);
            }
            cx.fillStyle = gold;
            cx.fillText(total, startX + 9 * colW, scoreY);

            // +/- row
            const diffY = scoreY + rowH;
            cx.font = '14px Georgia, serif';
            cx.fillStyle = 'rgba(255,255,255,0.5)';
            cx.textAlign = 'center';
            cx.fillText('+/-', labelX, diffY);
            for (let i = 0; i < scores.length; i++) {
                const d = scores[i] - levels[i].par;
                let label, color;
                if (d === 0) { label = 'E'; color = gold; }
                else if (d > 0) { label = '+' + d; color = '#e57373'; }
                else { label = '' + d; color = '#4CAF50'; }
                cx.fillStyle = color;
                cx.fillText(label, startX + i * colW, diffY);
            }
            const totalDiff = total - totalPar;
            if (totalDiff === 0) { cx.fillStyle = gold; cx.fillText('E', startX + 9 * colW, diffY); }
            else if (totalDiff > 0) { cx.fillStyle = '#e57373'; cx.fillText('+' + totalDiff, startX + 9 * colW, diffY); }
            else { cx.fillStyle = '#4CAF50'; cx.fillText('' + totalDiff, startX + 9 * colW, diffY); }

            // Gold divider above bottom section
            cx.strokeStyle = gold;
            cx.lineWidth = 1;
            cx.beginPath();
            cx.moveTo(40, diffY + 18);
            cx.lineTo(560, diffY + 18);
            cx.stroke();

            // Total strokes large
            cx.fillStyle = '#fff';
            cx.font = 'bold 40px Georgia, serif';
            cx.textAlign = 'center';
            cx.fillText(total + ' Strokes', 300, diffY + 68);

            // Over/Under text
            const overUnderStr = totalDiff === 0 ? 'Even Par' : totalDiff > 0 ? '+' + totalDiff + ' Over Par' : Math.abs(totalDiff) + ' Under Par';
            cx.fillStyle = totalDiff <= 0 ? '#4CAF50' : '#e57373';
            cx.font = 'bold 22px Georgia, serif';
            cx.fillText(overUnderStr, 300, diffY + 100);

            // Achievement badges
            const badges = [];
            const hasHoleInOne = scores.some((s) => s === 1);
            if (hasHoleInOne) badges.push('Hole-in-One!');
            if (totalDiff <= -5) badges.push('Golf Legend');
            else if (totalDiff < 0) badges.push('Under Par');

            if (badges.length > 0) {
                cx.font = 'bold 16px Georgia, serif';
                const badgeY = diffY + 130;
                const totalWidth = badges.length * 140 + (badges.length - 1) * 10;
                let bx = 300 - totalWidth / 2 + 70;
                badges.forEach((badge) => {
                    cx.fillStyle = 'rgba(201,168,76,0.2)';
                    cx.beginPath();
                    const bw = 130, bh = 28, br = 14;
                    cx.moveTo(bx - bw / 2 + br, badgeY - 18);
                    cx.lineTo(bx + bw / 2 - br, badgeY - 18);
                    cx.quadraticCurveTo(bx + bw / 2, badgeY - 18, bx + bw / 2, badgeY - 18 + br);
                    cx.lineTo(bx + bw / 2, badgeY - 18 + bh - br);
                    cx.quadraticCurveTo(bx + bw / 2, badgeY - 18 + bh, bx + bw / 2 - br, badgeY - 18 + bh);
                    cx.lineTo(bx - bw / 2 + br, badgeY - 18 + bh);
                    cx.quadraticCurveTo(bx - bw / 2, badgeY - 18 + bh, bx - bw / 2, badgeY - 18 + bh - br);
                    cx.lineTo(bx - bw / 2, badgeY - 18 + br);
                    cx.quadraticCurveTo(bx - bw / 2, badgeY - 18, bx - bw / 2 + br, badgeY - 18);
                    cx.closePath();
                    cx.fill();
                    cx.strokeStyle = gold;
                    cx.lineWidth = 1;
                    cx.stroke();
                    cx.fillStyle = gold;
                    cx.textAlign = 'center';
                    cx.fillText(badge, bx, badgeY);
                    bx += 150;
                });
            }

            // Footer divider
            cx.strokeStyle = gold;
            cx.lineWidth = 1;
            cx.beginPath();
            cx.moveTo(200, 448);
            cx.lineTo(400, 448);
            cx.stroke();

            // Footer text
            cx.fillStyle = gold;
            cx.font = '14px Georgia, serif';
            cx.textAlign = 'center';
            cx.fillText('januarius.ph', 300, 466);

            return c;
        }

        // ==================== CINEMATICS ====================
        function updateCinematic() {
            cinematicFrame++;
            if (cinematicSkipped) {
                endCinematic();
                return;
            }
            if (cinematicMode === 'space-transition' && cinematicFrame > 480) {
                endCinematic();
            }
            if (cinematicMode === 'ending' && cinematicFrame > 600) {
                endCinematic();
            }
        }

        function endCinematic() {
            if (cinematicMode === 'space-transition') {
                cinematicMode = null;
                gameMode = 'play';
                initHole();
            } else if (cinematicMode === 'ending') {
                cinematicMode = null;
                showEnd();
            }
        }

        function drawCinematic() {
            const W = canvas.width, H = canvas.height;
            const f = cinematicFrame;

            if (cinematicMode === 'space-transition') {
                drawSpaceTransition(W, H, f);
            } else if (cinematicMode === 'ending') {
                drawEndingCinematic(W, H, f);
            }

            // Skip hint
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.font = '14px Georgia';
            ctx.textAlign = 'right';
            ctx.fillText('Press ESC to skip', W - 20, H - 20);
            ctx.textAlign = 'left';
        }

        function drawCinematicStars(W, H) {
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const sx = (Math.sin(i * 127.1 + i) * 0.5 + 0.5) * W;
                const sy = (Math.cos(i * 311.7 + i) * 0.5 + 0.5) * H;
                const sr = 0.5 + (i % 3) * 0.8;
                ctx.globalAlpha = 0.5 + Math.sin(i * 0.7 + gameTime * 0.03) * 0.3;
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawCinematicEarth(W, H, radius) {
            const ex = W * 0.75, ey = H * 0.35;
            const r = radius || H * 0.4;

            // Ocean gradient
            const grad = ctx.createRadialGradient(ex - r * 0.2, ey - r * 0.2, r * 0.1, ex, ey, r);
            grad.addColorStop(0, '#4a90d9');
            grad.addColorStop(0.5, '#2563a0');
            grad.addColorStop(1, '#1a3a6a');
            ctx.beginPath();
            ctx.arc(ex, ey, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Green continents
            ctx.fillStyle = '#2d8a4e';
            // Continent 1
            ctx.beginPath();
            ctx.ellipse(ex - r * 0.2, ey - r * 0.15, r * 0.3, r * 0.2, -0.3, 0, Math.PI * 2);
            ctx.fill();
            // Continent 2
            ctx.beginPath();
            ctx.ellipse(ex + r * 0.25, ey + r * 0.2, r * 0.2, r * 0.15, 0.5, 0, Math.PI * 2);
            ctx.fill();
            // Continent 3
            ctx.beginPath();
            ctx.ellipse(ex - r * 0.3, ey + r * 0.3, r * 0.15, r * 0.1, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Atmosphere glow
            ctx.strokeStyle = 'rgba(100,180,255,0.4)';
            ctx.lineWidth = r * 0.08;
            ctx.beginPath();
            ctx.arc(ex, ey, r + r * 0.04, 0, Math.PI * 2);
            ctx.stroke();
            ctx.lineWidth = 1;
        }

        function drawRocket(x, y, flipped) {
            ctx.save();
            ctx.translate(x, y);
            if (flipped) ctx.scale(1, -1);

            // Body
            ctx.fillStyle = '#eee';
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(-12, 10);
            ctx.lineTo(-12, 25);
            ctx.lineTo(12, 25);
            ctx.lineTo(12, 10);
            ctx.closePath();
            ctx.fill();

            // Nose cone
            ctx.fillStyle = '#cc3333';
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(-8, -10);
            ctx.lineTo(8, -10);
            ctx.closePath();
            ctx.fill();

            // Window
            ctx.fillStyle = '#4a90d9';
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Left fin
            ctx.fillStyle = '#cc3333';
            ctx.beginPath();
            ctx.moveTo(-12, 15);
            ctx.lineTo(-20, 28);
            ctx.lineTo(-12, 25);
            ctx.closePath();
            ctx.fill();

            // Right fin
            ctx.beginPath();
            ctx.moveTo(12, 15);
            ctx.lineTo(20, 28);
            ctx.lineTo(12, 25);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawSmallCharacter(x, y, armAngle) {
            // Small golfer figure for cinematics
            // Head
            ctx.fillStyle = '#f5d0a0';
            ctx.beginPath();
            ctx.arc(x, y - 28, 7, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = '#4080b8';
            ctx.fillRect(x - 5, y - 21, 10, 14);

            // Legs
            ctx.fillStyle = '#2a2a2a';
            ctx.fillRect(x - 4, y - 7, 3, 8);
            ctx.fillRect(x + 1, y - 7, 3, 8);

            // Arm
            if (armAngle !== undefined) {
                ctx.save();
                ctx.translate(x + 4, y - 18);
                ctx.rotate(armAngle);
                ctx.fillStyle = '#f5d0a0';
                ctx.fillRect(0, -2, 10, 3);
                ctx.restore();
            }
        }

        // ---- Space Transition Cinematic (~8 seconds = 480 frames) ----
        function drawSpaceTransition(W, H, f) {
            ctx.save();

            // Phase 1: Rumble (0-120)
            if (f <= 120) {
                const intensity = f / 120;

                // Screen shake
                const shakeX = (Math.random() - 0.5) * 6 * intensity;
                const shakeY = (Math.random() - 0.5) * 6 * intensity;
                ctx.translate(shakeX, shakeY);

                // Storm sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
                skyGrad.addColorStop(0, '#1a1a2e');
                skyGrad.addColorStop(0.4, '#3a2a4a');
                skyGrad.addColorStop(1, '#4a3a2a');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, H * 0.7);

                // Green ground
                ctx.fillStyle = '#2d5a1e';
                ctx.fillRect(0, H * 0.7, W, H * 0.3);
                ctx.fillStyle = '#3a7a28';
                ctx.fillRect(0, H * 0.7, W, 4);

                // Orange cracks in ground
                ctx.strokeStyle = `rgba(255,140,0,${intensity})`;
                ctx.lineWidth = 2;
                for (let c = 0; c < 5; c++) {
                    ctx.beginPath();
                    let cx2 = W * 0.15 + c * W * 0.17;
                    let cy2 = H * 0.72;
                    ctx.moveTo(cx2, cy2);
                    for (let s = 0; s < 5; s++) {
                        cx2 += (Math.random() - 0.5) * 20;
                        cy2 += 10 + Math.random() * 15;
                        ctx.lineTo(cx2, cy2);
                    }
                    ctx.stroke();
                }

                // Character standing on ground
                drawSmallCharacter(W * 0.5, H * 0.7);

                // Darkening overlay
                ctx.fillStyle = `rgba(0,0,0,${intensity * 0.5})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Phase 2: Launch (120-300)
            else if (f <= 300) {
                const progress = (f - 120) / 180;

                // Sky transition from storm to black
                const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
                skyGrad.addColorStop(0, `rgba(${Math.floor(26 * (1 - progress))},${Math.floor(26 * (1 - progress))},${Math.floor(46 * (1 - progress))},1)`);
                skyGrad.addColorStop(1, `rgba(${Math.floor(74 * (1 - progress))},${Math.floor(58 * (1 - progress))},${Math.floor(42 * (1 - progress))},1)`);
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, H);

                // Clouds rushing downward
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for (let i = 0; i < 8; i++) {
                    const cloudY = ((i * 120 + f * 4) % (H + 100)) - 50;
                    const cloudX = W * 0.1 + (i % 4) * W * 0.22;
                    ctx.beginPath();
                    ctx.ellipse(cloudX, cloudY, 60 + (i % 3) * 20, 15, 0, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Stars fading in
                if (progress > 0.5) {
                    ctx.globalAlpha = (progress - 0.5) * 2;
                    drawCinematicStars(W, H);
                    ctx.globalAlpha = 1;
                }

                // Ground chunk rising
                const chunkY = H * 0.7 - progress * H * 1.2;
                ctx.fillStyle = '#5a3a1a';
                ctx.beginPath();
                ctx.ellipse(W * 0.5, chunkY + 20, 60, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                // Grass on top
                ctx.fillStyle = '#3a7a28';
                ctx.beginPath();
                ctx.ellipse(W * 0.5, chunkY + 5, 55, 10, 0, 0, Math.PI);
                ctx.fill();
                ctx.fillStyle = '#2d5a1e';
                ctx.fillRect(W * 0.5 - 55, chunkY - 5, 110, 12);

                // Character on chunk
                drawSmallCharacter(W * 0.5, chunkY - 5);
            }

            // Phase 3: Space (300-420)
            else if (f <= 420) {
                const progress = (f - 300) / 120;

                // Black space
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);

                // Stars
                drawCinematicStars(W, H);

                // Earth appearing and growing
                const earthRadius = progress * H * 0.4;
                if (earthRadius > 5) {
                    drawCinematicEarth(W, H, earthRadius);
                }
            }

            // Phase 4: Landing (420-480)
            else {
                const progress = (f - 420) / 60;

                // Space background
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);
                drawCinematicStars(W, H);

                // Full Earth
                drawCinematicEarth(W, H, H * 0.4);

                // Lunar surface rising from below
                const lunarY = H - progress * H * 0.25;
                ctx.fillStyle = '#8a8a7a';
                ctx.fillRect(0, lunarY, W, H - lunarY + 10);
                ctx.fillStyle = '#9a9a8a';
                ctx.fillRect(0, lunarY, W, 3);

                // Craters
                ctx.fillStyle = '#7a7a6a';
                ctx.beginPath(); ctx.arc(W * 0.2, lunarY + 20, 12, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(W * 0.6, lunarY + 30, 18, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(W * 0.85, lunarY + 15, 10, 0, Math.PI * 2); ctx.fill();

                // Title text
                const textAlpha = Math.min(1, progress * 2);
                ctx.globalAlpha = textAlpha;
                ctx.fillStyle = '#c9a84c';
                ctx.font = `bold ${Math.floor(48 * S)}px Georgia`;
                ctx.textAlign = 'center';
                ctx.fillText('HOLE 9', W * 0.5, H * 0.35);

                ctx.fillStyle = '#fff';
                ctx.font = `${Math.floor(22 * S)}px Georgia`;
                ctx.fillText('THE FINAL FRONTIER', W * 0.5, H * 0.35 + 40 * S);
                ctx.globalAlpha = 1;
                ctx.textAlign = 'left';
            }

            ctx.restore();
        }

        // ---- Ending Cinematic (~10 seconds = 600 frames) ----
        function drawEndingCinematic(W, H, f) {
            ctx.save();

            // Phase 1: Victory (0-120)
            if (f <= 120) {
                // Space background
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);
                drawCinematicStars(W, H);
                drawCinematicEarth(W, H, H * 0.4);

                // Lunar surface
                const lunarY = H * 0.75;
                ctx.fillStyle = '#8a8a7a';
                ctx.fillRect(0, lunarY, W, H - lunarY);
                ctx.fillStyle = '#9a9a8a';
                ctx.fillRect(0, lunarY, W, 3);
                ctx.fillStyle = '#7a7a6a';
                ctx.beginPath(); ctx.arc(W * 0.3, lunarY + 20, 12, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(W * 0.7, lunarY + 25, 15, 0, Math.PI * 2); ctx.fill();

                // Character celebrating with fist pump
                const armBob = Math.sin(f * 0.15) * 0.5 - 1.2;
                drawSmallCharacter(W * 0.5, lunarY, armBob);

                // Celebration particles
                const colors = ['#c9a84c', '#3a7a28', '#4a90d9'];
                for (let i = 0; i < 15; i++) {
                    const px = W * 0.5 + Math.sin(i * 2.1 + f * 0.05) * (80 + i * 5);
                    const py = lunarY - 40 - Math.abs(Math.sin(i * 1.7 + f * 0.08)) * 80;
                    ctx.fillStyle = colors[i % 3];
                    ctx.globalAlpha = 0.7 + Math.sin(f * 0.1 + i) * 0.3;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
            }

            // Phase 2: Spaceship arrives (120-240)
            else if (f <= 240) {
                const progress = (f - 120) / 120;

                // Space background
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);
                drawCinematicStars(W, H);
                drawCinematicEarth(W, H, H * 0.4);

                // Lunar surface
                const lunarY = H * 0.75;
                ctx.fillStyle = '#8a8a7a';
                ctx.fillRect(0, lunarY, W, H - lunarY);
                ctx.fillStyle = '#9a9a8a';
                ctx.fillRect(0, lunarY, W, 3);

                // Character waiting
                drawSmallCharacter(W * 0.45, lunarY);

                // Rocket descending
                const rocketY = -50 + progress * (lunarY - 30);
                drawRocket(W * 0.55, rocketY, false);

                // Thruster flame
                if (progress < 0.9) {
                    ctx.fillStyle = '#ff6600';
                    ctx.globalAlpha = 0.6 + Math.random() * 0.4;
                    ctx.beginPath();
                    ctx.moveTo(W * 0.55 - 8, rocketY + 25);
                    ctx.lineTo(W * 0.55, rocketY + 45 + Math.random() * 10);
                    ctx.lineTo(W * 0.55 + 8, rocketY + 25);
                    ctx.closePath();
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                // Door opens at end
                if (progress > 0.9) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(W * 0.55 - 5, rocketY + 15, 10, 10);
                }
            }

            // Phase 3: Liftoff (240-360)
            else if (f <= 360) {
                const progress = (f - 240) / 120;

                // Space background
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, W, H);
                drawCinematicStars(W, H);

                // Earth growing larger (approaching)
                const earthRadius = H * 0.4 + progress * H * 0.3;
                drawCinematicEarth(W, H, earthRadius);

                // Rocket flying toward Earth (flipped)
                const rocketX = W * 0.5 - progress * W * 0.15;
                const rocketY = H * 0.5 + progress * H * 0.1;
                drawRocket(rocketX, rocketY, true);

                // Thruster flame (on top since flipped)
                ctx.fillStyle = '#ff6600';
                ctx.globalAlpha = 0.6 + Math.random() * 0.4;
                ctx.beginPath();
                ctx.moveTo(rocketX - 8, rocketY - 25);
                ctx.lineTo(rocketX, rocketY - 45 - Math.random() * 10);
                ctx.lineTo(rocketX + 8, rocketY - 25);
                ctx.closePath();
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Phase 4: Home scene (360-540)
            else if (f <= 540) {
                const progress = (f - 360) / 180;

                // Beige walls
                ctx.fillStyle = '#d4c4a0';
                ctx.fillRect(0, 0, W, H);

                // Brown floor
                ctx.fillStyle = '#6b4226';
                ctx.fillRect(0, H * 0.72, W, H * 0.28);
                ctx.fillStyle = '#7a5030';
                ctx.fillRect(0, H * 0.72, W, 3);

                // Window showing night sky
                ctx.fillStyle = '#555';
                ctx.fillRect(W * 0.7, H * 0.1, W * 0.18, H * 0.3);
                ctx.fillStyle = '#0a0a2e';
                ctx.fillRect(W * 0.7 + 4, H * 0.1 + 4, W * 0.18 - 8, H * 0.3 - 8);
                // Stars in window
                ctx.fillStyle = '#fff';
                for (let i = 0; i < 8; i++) {
                    const sx = W * 0.72 + (i % 4) * W * 0.035;
                    const sy = H * 0.14 + Math.floor(i / 4) * H * 0.1;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Blue couch
                ctx.fillStyle = '#3a5a8c';
                ctx.fillRect(W * 0.2, H * 0.52, W * 0.35, H * 0.15);
                // Couch back
                ctx.fillStyle = '#2d4a7a';
                ctx.fillRect(W * 0.18, H * 0.42, W * 0.04, H * 0.25);
                ctx.fillRect(W * 0.18, H * 0.42, W * 0.39, H * 0.1);
                // Armrest right
                ctx.fillRect(W * 0.53, H * 0.42, W * 0.04, H * 0.25);

                // Coffee table
                ctx.fillStyle = '#5a3a1a';
                ctx.fillRect(W * 0.25, H * 0.68, W * 0.25, H * 0.04);
                // Table legs
                ctx.fillRect(W * 0.27, H * 0.72, W * 0.015, H * 0.04);
                ctx.fillRect(W * 0.47, H * 0.72, W * 0.015, H * 0.04);

                // Pizza box
                ctx.fillStyle = '#c4a060';
                ctx.fillRect(W * 0.3, H * 0.66, W * 0.1, H * 0.03);
                // Pizza inside box
                ctx.fillStyle = '#e8a030';
                ctx.beginPath();
                ctx.arc(W * 0.35, H * 0.67, W * 0.03, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#cc3333';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.arc(W * 0.35 + Math.cos(i * 1.3) * W * 0.015, H * 0.67 + Math.sin(i * 1.3) * W * 0.012, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // TV
                ctx.fillStyle = '#222';
                ctx.fillRect(W * 0.12, H * 0.15, W * 0.22, H * 0.22);
                ctx.fillStyle = '#333';
                ctx.fillRect(W * 0.22, H * 0.37, W * 0.02, H * 0.05);
                // TV screen showing golf
                ctx.fillStyle = '#2d8a4e';
                ctx.fillRect(W * 0.13, H * 0.16, W * 0.2, H * 0.2);
                // Small flag on TV
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(W * 0.23, H * 0.32);
                ctx.lineTo(W * 0.23, H * 0.22);
                ctx.stroke();
                ctx.fillStyle = '#cc3333';
                ctx.fillRect(W * 0.23, H * 0.22, 8, 5);

                // Character sitting on couch, relaxed
                const charX = W * 0.38, charY = H * 0.52;
                // Head
                ctx.fillStyle = '#f5d0a0';
                ctx.beginPath();
                ctx.arc(charX, charY - 10, 8, 0, Math.PI * 2);
                ctx.fill();
                // Happy smile
                ctx.strokeStyle = '#a0704a';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(charX, charY - 8, 4, 0.2, Math.PI - 0.2);
                ctx.stroke();
                // Body on couch
                ctx.fillStyle = '#4080b8';
                ctx.fillRect(charX - 6, charY - 2, 12, 16);
                // Legs
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(charX - 5, charY + 14, 4, 10);
                ctx.fillRect(charX + 1, charY + 14, 4, 10);
                // Arm with pizza slice
                ctx.save();
                ctx.translate(charX + 6, charY + 2);
                ctx.rotate(-0.8);
                ctx.fillStyle = '#f5d0a0';
                ctx.fillRect(0, -2, 12, 3);
                // Pizza slice in hand
                ctx.fillStyle = '#e8a030';
                ctx.beginPath();
                ctx.moveTo(12, -4);
                ctx.lineTo(18, -8);
                ctx.lineTo(18, 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // "Home Sweet Home" text
                const textAlpha = Math.min(1, progress * 2);
                ctx.globalAlpha = textAlpha;
                ctx.fillStyle = '#c9a84c';
                ctx.font = `bold ${Math.floor(36 * S)}px Georgia`;
                ctx.textAlign = 'center';
                ctx.fillText('Home Sweet Home', W * 0.5, H * 0.12);
                ctx.globalAlpha = 1;
                ctx.textAlign = 'left';
            }

            // Phase 5: Fade (540-600)
            else {
                const progress = (f - 540) / 60;

                // Redraw home scene (frozen at last frame)
                drawEndingCinematic(W, H, 540);

                // Black overlay fading in
                ctx.fillStyle = `rgba(0,0,0,${progress})`;
                ctx.fillRect(0, 0, W, H);
            }

            ctx.restore();
        }

        // ==================== GAME LOOP ====================
        function loop() {
            if (gameMode === 'cinematic') {
                updateCinematic();
                drawCinematic();
            } else if (gameMode === 'shop') {
                updateShop();
                drawShop();
            } else {
                update();
                draw();
            }
            requestAnimationFrame(loop);
        }

        initHole();
        loop();
    </script>
