<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PH Infra Map — Januarius</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside id="filter-rail" class="filter-rail">
    <button id="filter-toggle" class="filter-toggle" aria-label="Toggle filters">☰</button>
    <div class="filter-content">
      <h2>Filters</h2>
      <div id="filter-groups"></div>
      <button id="reset-filters" class="reset-btn">Reset all</button>
      <p id="result-counter" class="counter"></p>
    </div>
  </aside>

  <main id="map"></main>

  <aside id="detail-panel" class="detail-panel hidden">
    <button id="detail-close" class="detail-close" aria-label="Close">×</button>
    <div id="detail-content"></div>
  </aside>

  <div id="legend" class="legend">
    <h3>Completion horizon</h3>
    <ul>
      <li><span class="swatch swatch-green"></span> ≤ 1 year</li>
      <li><span class="swatch swatch-amber"></span> 1–3 years</li>
      <li><span class="swatch swatch-blue"></span> 3+ years</li>
    </ul>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script type="module" src="app.js"></script>
</body>
</html>
