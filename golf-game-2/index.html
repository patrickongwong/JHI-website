<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JHI Golf Adventure</title>
    <link rel="icon" type="image/png" href="../assets/wheel.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: Georgia, serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        .header {
            display: flex;
            justify-content: space-between;
            width: min(800px, 96vw);
            padding: 8px 0;
            align-items: center;
        }
        .title { font-size: 1.1rem; color: #c9a84c; letter-spacing: 2px; }
        .info { display: flex; gap: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.6); }
        .info strong { color: #c9a84c; }
        #gameCanvas {
            border-radius: 6px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.5);
            touch-action: none;
        }
        .controls-hint {
            width: min(800px, 96vw);
            padding: 8px 0;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            display: flex;
            justify-content: space-between;
        }
        /* Mobile controls */
        .mobile-controls {
            display: none;
            width: min(800px, 96vw);
            justify-content: space-between;
            padding: 8px 0;
            gap: 10px;
        }
        .mobile-btn {
            flex: 1;
            padding: 14px 0;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            font-family: Georgia, serif;
            text-align: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-btn:active { background: rgba(201,168,76,0.2); border-color: #c9a84c; }
        @media (pointer: coarse) {
            .mobile-controls { display: flex; }
            .controls-hint { display: none; }
        }
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(4px);
        }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 2rem; color: #c9a84c; margin-bottom: 8px; }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .overlay button {
            padding: 12px 36px; background: #c9a84c; color: #1a472a;
            border: none; border-radius: 4px; font-size: 1rem;
            font-weight: 700; cursor: pointer; font-family: Georgia, serif;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .overlay button:hover { background: #e0c872; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">JHI GOLF ADVENTURE</div>
    <div class="info">
        <span>Hole <strong id="holeNum">1</strong>/6</span>
        <span>Par <strong id="parNum">3</strong></span>
        <span>Strokes <strong id="strokeNum">0</strong></span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls-hint">
    <span>A/D or Arrow Keys to move | W or Up to jump | Click &amp; drag near ball to hit</span>
    <span id="statusText"></span>
</div>

<div class="mobile-controls">
    <div class="mobile-btn" id="btnLeft">LEFT</div>
    <div class="mobile-btn" id="btnJump">JUMP</div>
    <div class="mobile-btn" id="btnRight">RIGHT</div>
</div>

<div class="overlay hidden" id="holeOverlay">
    <h2 id="holeMsg">Nice!</h2>
    <p id="holeSummary"></p>
    <button id="nextBtn">Next Hole</button>
</div>

<div class="overlay hidden" id="endOverlay">
    <h2>Round Complete!</h2>
    <p id="endSummary"></p>
    <button id="replayBtn">Play Again</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = Math.min(800, window.innerWidth * 0.96);
    canvas.height = Math.min(400, window.innerHeight * 0.55);
}
resize();
window.addEventListener('resize', resize);

// ==================== CONSTANTS ====================
const GRAVITY = 0.5;
const PLAYER_SPEED = 3.5;
const JUMP_FORCE = -10;
const BALL_FRICTION = 0.992;
const BALL_GROUND_FRICTION = 0.97;
const BALL_BOUNCE = 0.55;
const MAX_HIT_POWER = 16;
const HIT_RANGE = 40;

// ==================== LEVEL DEFINITIONS ====================
const levels = [
    { // Hole 1 — Flat & simple
        par: 2,
        playerStart: { x: 80, y: 0 },
        ballStart: { x: 200, y: 0 },
        holePos: { x: 700, y: 0 }, // y=0 means on ground
        terrain: [
            { x: 0, y: 0, w: 1600, h: 0 } // flat
        ],
        platforms: [],
        water: [],
        sand: []
    },
    { // Hole 2 — Hill
        par: 3,
        playerStart: { x: 60, y: 0 },
        ballStart: { x: 180, y: 0 },
        holePos: { x: 900, y: 0 },
        terrain: [
            { x: 0, y: 0, w: 400, h: 0 },
            { x: 400, y: 0, w: 200, h: -60 }, // uphill
            { x: 600, y: -60, w: 200, h: 0 },  // plateau
            { x: 800, y: -60, w: 200, h: 60 }, // downhill
            { x: 1000, y: 0, w: 400, h: 0 }
        ],
        platforms: [],
        water: [],
        sand: [{ x: 650, w: 100 }]
    },
    { // Hole 3 — Gap jump
        par: 3,
        playerStart: { x: 60, y: 0 },
        ballStart: { x: 200, y: 0 },
        holePos: { x: 800, y: 0 },
        terrain: [
            { x: 0, y: 0, w: 350, h: 0 },
            { x: 450, y: 0, w: 600, h: 0 }
        ],
        platforms: [],
        water: [{ x: 350, w: 100 }],
        sand: []
    },
    { // Hole 4 — Elevated green
        par: 3,
        playerStart: { x: 60, y: 0 },
        ballStart: { x: 200, y: 0 },
        holePos: { x: 750, y: -100 },
        terrain: [
            { x: 0, y: 0, w: 500, h: 0 },
            { x: 500, y: 0, w: 100, h: -100 },
            { x: 600, y: -100, w: 400, h: 0 }
        ],
        platforms: [],
        water: [],
        sand: []
    },
    { // Hole 5 — Platforms
        par: 4,
        playerStart: { x: 60, y: 0 },
        ballStart: { x: 180, y: 0 },
        holePos: { x: 900, y: -80 },
        terrain: [
            { x: 0, y: 0, w: 350, h: 0 },
            { x: 550, y: -40, w: 150, h: 0 },
            { x: 800, y: -80, w: 300, h: 0 }
        ],
        platforms: [
            { x: 350, y: -40, w: 80 },
            { x: 470, y: -20, w: 80 }
        ],
        water: [{ x: 350, w: 200 }],
        sand: []
    },
    { // Hole 6 — The Grand Finale
        par: 5,
        playerStart: { x: 40, y: 0 },
        ballStart: { x: 160, y: 0 },
        holePos: { x: 1100, y: -40 },
        terrain: [
            { x: 0, y: 0, w: 300, h: 0 },
            { x: 300, y: 0, w: 150, h: -50 },
            { x: 450, y: -50, w: 150, h: 0 },
            { x: 700, y: -20, w: 200, h: 0 },
            { x: 1000, y: -40, w: 300, h: 0 }
        ],
        platforms: [
            { x: 600, y: -50, w: 80 }
        ],
        water: [{ x: 600, w: 100 }, { x: 900, w: 100 }],
        sand: [{ x: 480, w: 80 }]
    }
];

// ==================== GAME STATE ====================
let currentHole = 0;
let strokes = 0;
let scores = [];
let cameraX = 0;

// Ground height at any x position
const GROUND_BASE_Y = 0; // baseline, adjusted by canvas

function getGroundY(x) {
    const level = levels[currentHole];
    const baseY = canvas.height - 60;

    for (const t of level.terrain) {
        if (x >= t.x && x < t.x + t.w) {
            if (t.h === 0) return baseY + t.y;
            // Slope
            const progress = (x - t.x) / t.w;
            const startY = baseY + t.y;
            const endY = baseY + t.y + t.h;
            return startY + (endY - startY) * progress;
        }
    }
    // Check platforms
    return null; // no ground (gap)
}

function getPlatformAt(x, y, vy) {
    const level = levels[currentHole];
    for (const p of (level.platforms || [])) {
        const platY = canvas.height - 60 + (p.y || 0);
        if (x >= p.x && x <= p.x + p.w) {
            if (y <= platY && y + vy >= platY - 5) {
                return platY;
            }
        }
    }
    return null;
}

// Player object
const player = {
    x: 0, y: 0, vx: 0, vy: 0,
    w: 16, h: 32,
    onGround: false, facing: 1,
    walking: false, walkFrame: 0
};

// Ball object
const ball = {
    x: 0, y: 0, vx: 0, vy: 0, r: 5,
    onGround: false, active: true, sunk: false
};

// Hole target
const hole = { x: 0, y: 0, r: 12 };

// Aim state
let aiming = false;
let aimStart = { x: 0, y: 0 };
let aimEnd = { x: 0, y: 0 };

// Input
const keys = {};

// ==================== INIT ====================
function initHole() {
    const level = levels[currentHole];
    const baseY = canvas.height - 60;

    // Player
    const pGroundY = getGroundY(level.playerStart.x);
    player.x = level.playerStart.x;
    player.y = (pGroundY || baseY) - player.h;
    player.vx = 0; player.vy = 0;
    player.onGround = true; player.facing = 1;

    // Ball
    const bGroundY = getGroundY(level.ballStart.x);
    ball.x = level.ballStart.x;
    ball.y = (bGroundY || baseY) - ball.r;
    ball.vx = 0; ball.vy = 0;
    ball.onGround = true; ball.active = true; ball.sunk = false;

    // Hole
    const hGroundY = getGroundY(level.holePos.x);
    hole.x = level.holePos.x;
    hole.y = (hGroundY || baseY);

    strokes = 0;
    aiming = false;
    cameraX = 0;

    document.getElementById('holeNum').textContent = currentHole + 1;
    document.getElementById('parNum').textContent = level.par;
    document.getElementById('strokeNum').textContent = 0;
    document.getElementById('statusText').textContent = 'Walk to the ball';
}

// ==================== INPUT ====================
document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mobile controls
function setupMobileBtn(id, key) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('touchcancel', e => { keys[key] = false; });
}
setupMobileBtn('btnLeft', 'a');
setupMobileBtn('btnRight', 'd');
setupMobileBtn('btnJump', 'w');

// Aim with mouse/touch
function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left + cameraX, y: t.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => { startAim(getCanvasPos(e)); });
canvas.addEventListener('mousemove', e => { moveAim(getCanvasPos(e)); });
canvas.addEventListener('mouseup', e => { endAim(getCanvasPos(e)); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length === 1) startAim(getCanvasPos(e)); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveAim(getCanvasPos(e)); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endAim(aimEnd); }, { passive: false });

function startAim(pos) {
    if (ball.sunk || !ball.onGround || Math.abs(ball.vx) > 0.5 || Math.abs(ball.vy) > 0.5) return;
    const dx = pos.x - ball.x, dy = pos.y - ball.y;
    if (Math.sqrt(dx * dx + dy * dy) > 80) return;
    aiming = true;
    aimStart = { ...pos };
    aimEnd = { ...pos };
}

function moveAim(pos) {
    if (!aiming) return;
    aimEnd = { ...pos };
}

function endAim(pos) {
    if (!aiming) return;
    aiming = false;
    const dx = aimStart.x - aimEnd.x;
    const dy = aimStart.y - aimEnd.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 8) return;

    const power = Math.min(dist / 8, MAX_HIT_POWER);
    const angle = Math.atan2(dy, dx);
    ball.vx = Math.cos(angle) * power;
    ball.vy = Math.sin(angle) * power;
    ball.onGround = false;
    strokes++;
    document.getElementById('strokeNum').textContent = strokes;
}

// ==================== UPDATE ====================
function update() {
    const level = levels[currentHole];
    if (ball.sunk) return;

    // --- Player movement ---
    player.walking = false;
    if (keys['a'] || keys['arrowleft']) {
        player.vx = -PLAYER_SPEED;
        player.facing = -1;
        player.walking = true;
    } else if (keys['d'] || keys['arrowright']) {
        player.vx = PLAYER_SPEED;
        player.facing = 1;
        player.walking = true;
    } else {
        player.vx = 0;
    }

    if ((keys['w'] || keys['arrowup'] || keys[' ']) && player.onGround) {
        player.vy = JUMP_FORCE;
        player.onGround = false;
    }

    // Player gravity
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // Walk animation
    if (player.walking) {
        player.walkFrame += 0.15;
    } else {
        player.walkFrame = 0;
    }

    // Player ground collision
    const pGroundY = getGroundY(player.x);
    const pPlatY = getPlatformAt(player.x, player.y + player.h, player.vy);
    const effectiveGround = pPlatY !== null ? pPlatY : pGroundY;

    if (effectiveGround !== null && player.y + player.h >= effectiveGround) {
        player.y = effectiveGround - player.h;
        player.vy = 0;
        player.onGround = true;
    } else if (effectiveGround === null) {
        player.onGround = false;
    }

    // Player falls into water/void
    if (player.y > canvas.height + 50) {
        const pGY = getGroundY(level.playerStart.x) || (canvas.height - 60);
        player.x = level.playerStart.x;
        player.y = pGY - player.h;
        player.vx = 0; player.vy = 0;
    }

    // Clamp player
    player.x = Math.max(10, player.x);

    // --- Ball physics ---
    if (ball.active) {
        ball.vy += GRAVITY * 0.8;
        ball.x += ball.vx;
        ball.y += ball.vy;

        // Air friction
        ball.vx *= BALL_FRICTION;
        ball.vy *= BALL_FRICTION;

        // Ground collision
        const bGroundY = getGroundY(ball.x);
        const bPlatY = getPlatformAt(ball.x, ball.y + ball.r, ball.vy);
        const bEffGround = bPlatY !== null ? bPlatY : bGroundY;

        if (bEffGround !== null && ball.y + ball.r >= bEffGround) {
            ball.y = bEffGround - ball.r;

            if (Math.abs(ball.vy) > 1.5) {
                ball.vy = -ball.vy * BALL_BOUNCE;
            } else {
                ball.vy = 0;
                ball.onGround = true;
            }

            // Ground friction
            ball.vx *= BALL_GROUND_FRICTION;

            // Sand trap — extra friction
            for (const s of (level.sand || [])) {
                if (ball.x >= s.x && ball.x <= s.x + s.w) {
                    ball.vx *= 0.92;
                }
            }

            // Slope influence
            const slopeCheck = 3;
            const gyLeft = getGroundY(ball.x - slopeCheck);
            const gyRight = getGroundY(ball.x + slopeCheck);
            if (gyLeft !== null && gyRight !== null) {
                const slope = (gyRight - gyLeft) / (slopeCheck * 2);
                ball.vx += slope * 0.3;
            }
        } else if (bEffGround === null) {
            ball.onGround = false;
        }

        // Ball falls in water
        for (const w of (level.water || [])) {
            const waterY = canvas.height - 60;
            if (ball.x >= w.x && ball.x <= w.x + w.w && ball.y > waterY - 10) {
                // Reset ball to start
                const resetY = getGroundY(level.ballStart.x) || (canvas.height - 60);
                ball.x = level.ballStart.x;
                ball.y = resetY - ball.r;
                ball.vx = 0; ball.vy = 0;
                ball.onGround = true;
                strokes++; // penalty
                document.getElementById('strokeNum').textContent = strokes;
                document.getElementById('statusText').textContent = 'Water! +1 penalty';
                break;
            }
        }

        // Ball falls into void
        if (ball.y > canvas.height + 60) {
            const resetY = getGroundY(level.ballStart.x) || (canvas.height - 60);
            ball.x = level.ballStart.x;
            ball.y = resetY - ball.r;
            ball.vx = 0; ball.vy = 0;
            ball.onGround = true;
            strokes++;
            document.getElementById('strokeNum').textContent = strokes;
        }

        // Stop ball
        if (ball.onGround && Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
            ball.vx = 0; ball.vy = 0;
        }

        // Check hole
        const hDx = ball.x - hole.x;
        const hDy = (ball.y + ball.r) - hole.y;
        const hDist = Math.sqrt(hDx * hDx + hDy * hDy);
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);

        if (hDist < hole.r && speed < 7) {
            ball.sunk = true;
            ball.x = hole.x;
            ball.y = hole.y - ball.r;
            ball.vx = 0; ball.vy = 0;
            onHoleSunk();
        }

        // Gravity pull near hole
        if (hDist < hole.r + 12 && speed < 4 && ball.onGround) {
            ball.vx += (hole.x - ball.x) * 0.008;
        }
    }

    // --- Camera ---
    // Follow ball if it's moving fast, else follow player
    const target = (Math.abs(ball.vx) > 2 || Math.abs(ball.vy) > 2) ? ball.x : player.x;
    const idealCam = target - canvas.width * 0.35;
    cameraX += (idealCam - cameraX) * 0.08;
    cameraX = Math.max(0, cameraX);

    // Status
    if (!ball.sunk) {
        const dToBall = Math.abs(player.x - ball.x);
        if (dToBall < HIT_RANGE && ball.onGround && Math.abs(ball.vx) < 0.5) {
            document.getElementById('statusText').textContent = 'Click & drag the ball to hit!';
        } else if (Math.abs(ball.vx) > 0.5 || Math.abs(ball.vy) > 0.5) {
            document.getElementById('statusText').textContent = '';
        }
    }
}

// ==================== DRAWING ====================
function draw() {
    const W = canvas.width, H = canvas.height;
    const level = levels[currentHole];
    const baseY = H - 60;

    ctx.save();

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#1a3a5c');
    skyGrad.addColorStop(0.6, '#2d6a4f');
    skyGrad.addColorStop(1, '#1a472a');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Clouds (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    const cloudOffset = cameraX * 0.2;
    [100, 300, 550, 750].forEach((cx, i) => {
        const x = cx - cloudOffset + (i % 2) * 50;
        ctx.beginPath();
        ctx.ellipse(x, 50 + i * 15, 60 + i * 10, 18, 0, 0, Math.PI * 2);
        ctx.fill();
    });

    // Camera transform
    ctx.translate(-cameraX, 0);

    // --- Draw terrain ---
    level.terrain.forEach(t => {
        const startY = baseY + t.y;
        const endY = baseY + t.y + t.h;

        // Grass surface
        ctx.fillStyle = '#2d6a4f';
        ctx.beginPath();
        ctx.moveTo(t.x, startY);
        ctx.lineTo(t.x + t.w, endY);
        ctx.lineTo(t.x + t.w, H + 20);
        ctx.lineTo(t.x, H + 20);
        ctx.closePath();
        ctx.fill();

        // Darker earth below
        ctx.fillStyle = '#5a3e1b';
        ctx.beginPath();
        ctx.moveTo(t.x, startY + 8);
        ctx.lineTo(t.x + t.w, endY + 8);
        ctx.lineTo(t.x + t.w, H + 20);
        ctx.lineTo(t.x, H + 20);
        ctx.closePath();
        ctx.fill();

        // Green top
        ctx.fillStyle = '#3a8f5c';
        ctx.beginPath();
        ctx.moveTo(t.x, startY);
        ctx.lineTo(t.x + t.w, endY);
        ctx.lineTo(t.x + t.w, endY + 8);
        ctx.lineTo(t.x, startY + 8);
        ctx.closePath();
        ctx.fill();
    });

    // Platforms
    (level.platforms || []).forEach(p => {
        const py = baseY + (p.y || 0);
        ctx.fillStyle = '#3a8f5c';
        ctx.fillRect(p.x, py, p.w, 10);
        ctx.fillStyle = '#2d6a4f';
        ctx.fillRect(p.x, py + 10, p.w, 20);
    });

    // Water
    (level.water || []).forEach(w => {
        const wy = baseY;
        ctx.fillStyle = 'rgba(30, 100, 200, 0.6)';
        ctx.fillRect(w.x, wy - 5, w.w, H - wy + 20);
        // Ripples
        ctx.strokeStyle = 'rgba(100, 180, 255, 0.3)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            const rx = w.x + w.w / 2 + Math.sin(Date.now() / 500 + i) * 10;
            ctx.ellipse(rx, wy + 5 + i * 6, w.w * 0.3, 3, 0, 0, Math.PI * 2);
            ctx.stroke();
        }
    });

    // Sand traps
    (level.sand || []).forEach(s => {
        const sy = getGroundY(s.x + s.w / 2) || baseY;
        ctx.fillStyle = '#d4b46a';
        ctx.fillRect(s.x, sy - 3, s.w, 6);
        // Dots
        ctx.fillStyle = 'rgba(180,140,60,0.5)';
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.arc(s.x + 10 + i * (s.w / 5), sy, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // --- Hole/flag ---
    // Flag pole
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(hole.x, hole.y);
    ctx.lineTo(hole.x, hole.y - 50);
    ctx.stroke();
    // Flag
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath();
    ctx.moveTo(hole.x, hole.y - 50);
    ctx.lineTo(hole.x + 20, hole.y - 43);
    ctx.lineTo(hole.x, hole.y - 36);
    ctx.fill();
    // Hole
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.ellipse(hole.x, hole.y, hole.r, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Ball ---
    if (ball.active && !ball.sunk) {
        // Shadow
        const bGround = getGroundY(ball.x);
        if (bGround !== null) {
            const shadowY = bGround;
            const shadowDist = Math.max(0, shadowY - (ball.y + ball.r));
            const shadowAlpha = Math.max(0.05, 0.25 - shadowDist * 0.003);
            ctx.beginPath();
            ctx.ellipse(ball.x, shadowY, ball.r + 1, 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
            ctx.fill();
        }
        // Ball
        const bGrad = ctx.createRadialGradient(ball.x - 1.5, ball.y - 1.5, 0.5, ball.x, ball.y, ball.r);
        bGrad.addColorStop(0, '#fff');
        bGrad.addColorStop(0.6, '#eee');
        bGrad.addColorStop(1, '#bbb');
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fillStyle = bGrad;
        ctx.fill();
    }

    // --- Aim line ---
    if (aiming) {
        const dx = aimStart.x - aimEnd.x;
        const dy = aimStart.y - aimEnd.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const power = Math.min(dist / 8, MAX_HIT_POWER);
        const angle = Math.atan2(dy, dx);

        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = `rgba(255,255,255,0.6)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ball.x, ball.y);
        ctx.lineTo(ball.x + Math.cos(angle) * power * 5, ball.y + Math.sin(angle) * power * 5);
        ctx.stroke();
        ctx.setLineDash([]);

        // Power dot
        const pRatio = power / MAX_HIT_POWER;
        const dotColor = pRatio < 0.4 ? '#4ade80' : pRatio < 0.7 ? '#c9a84c' : '#ef4444';
        ctx.beginPath();
        ctx.arc(ball.x + Math.cos(angle) * power * 5, ball.y + Math.sin(angle) * power * 5, 4, 0, Math.PI * 2);
        ctx.fillStyle = dotColor;
        ctx.fill();
    }

    // --- Player ---
    drawPlayer();

    ctx.restore();
}

function drawPlayer() {
    const x = player.x;
    const y = player.y;
    const f = player.facing;

    ctx.save();
    ctx.translate(x, y);
    if (f === -1) ctx.scale(-1, 1);

    const legSwing = player.walking ? Math.sin(player.walkFrame * 4) * 5 : 0;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, player.h, 10, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.strokeStyle = '#2c2c2c';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(-3, 20);
    ctx.lineTo(-3 - legSwing, player.h);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(3, 20);
    ctx.lineTo(3 + legSwing, player.h);
    ctx.stroke();

    // Body (polo shirt)
    ctx.fillStyle = '#1a472a';
    ctx.fillRect(-6, 10, 12, 13);

    // Arms
    ctx.strokeStyle = '#d4a574';
    ctx.lineWidth = 2.5;
    // Left arm
    ctx.beginPath();
    ctx.moveTo(-6, 13);
    ctx.lineTo(-10, 22);
    ctx.stroke();
    // Right arm — holding club if near ball
    const nearBall = Math.abs(player.x - ball.x) < HIT_RANGE && ball.onGround;
    ctx.beginPath();
    ctx.moveTo(6, 13);
    if (nearBall) {
        ctx.lineTo(12, 20);
        ctx.stroke();
        // Golf club
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(12, 20);
        ctx.lineTo(14, 30);
        ctx.stroke();
        ctx.fillStyle = '#888';
        ctx.fillRect(12, 29, 6, 3);
    } else {
        ctx.lineTo(10, 22);
        ctx.stroke();
    }

    // Head
    ctx.fillStyle = '#d4a574';
    ctx.beginPath();
    ctx.arc(0, 6, 7, 0, Math.PI * 2);
    ctx.fill();

    // Cap
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath();
    ctx.ellipse(0, 2, 8, 4, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(-2, -2, 10, 3);

    // Eyes
    ctx.fillStyle = '#222';
    ctx.fillRect(2, 5, 2, 2);

    ctx.restore();
}

// ==================== HOLE COMPLETE ====================
function onHoleSunk() {
    const par = levels[currentHole].par;
    const diff = strokes - par;
    scores.push(strokes);

    let msg;
    if (strokes === 1) msg = 'HOLE IN ONE!';
    else if (diff <= -2) msg = 'Eagle!';
    else if (diff === -1) msg = 'Birdie!';
    else if (diff === 0) msg = 'Par!';
    else if (diff === 1) msg = 'Bogey';
    else if (diff === 2) msg = 'Double Bogey';
    else msg = '+' + diff;

    document.getElementById('holeMsg').textContent = msg;
    document.getElementById('holeSummary').textContent =
        `Hole ${currentHole + 1}: ${strokes} stroke${strokes !== 1 ? 's' : ''} (Par ${par})`;

    const btn = document.getElementById('nextBtn');
    btn.textContent = currentHole >= levels.length - 1 ? 'See Results' : 'Next Hole';

    setTimeout(() => {
        document.getElementById('holeOverlay').classList.remove('hidden');
    }, 600);
}

document.getElementById('nextBtn').addEventListener('click', () => {
    document.getElementById('holeOverlay').classList.add('hidden');
    if (currentHole >= levels.length - 1) {
        showEnd();
    } else {
        currentHole++;
        initHole();
    }
});

function showEnd() {
    const total = scores.reduce((a, b) => a + b, 0);
    const totalPar = levels.reduce((a, l) => a + l.par, 0);
    const diff = total - totalPar;
    const diffStr = diff === 0 ? 'Even' : diff > 0 ? '+' + diff : '' + diff;
    document.getElementById('endSummary').textContent =
        `Total: ${total} strokes (${diffStr} | Par ${totalPar})`;
    document.getElementById('endOverlay').classList.remove('hidden');
}

document.getElementById('replayBtn').addEventListener('click', () => {
    document.getElementById('endOverlay').classList.add('hidden');
    currentHole = 0;
    scores = [];
    initHole();
});

// ==================== GAME LOOP ====================
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

initHole();
loop();
</script>
