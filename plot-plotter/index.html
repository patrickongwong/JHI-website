<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHI Plot Plotter</title>
    <link rel="icon" type="image/png" href="../assets/wheel.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── Brand Colors ── */
        :root {
            --color-green-dark: #1a472a;
            --color-green: #2d6a4f;
            --color-gold: #c9a84c;
            --color-cream: #f5f1e8;
            --color-gold-light: #e0c872;
            --color-green-light: #40916c;
        }

        /* ── Reset & Base ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--color-cream);
            color: #1a1a1a;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: var(--color-green-dark);
            color: var(--color-cream);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        header a {
            color: var(--color-gold);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        header a:hover {
            color: var(--color-gold-light);
        }

        /* ── Main Layout ── */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left Panel (Input) ── */
        .panel-left {
            width: 400px;
            min-width: 320px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .panel-left-inner {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Tab Switcher ── */
        .tab-switcher {
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--color-green);
        }

        .tab-switcher button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: #fff;
            color: var(--color-green);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .tab-switcher button.active {
            background: var(--color-green);
            color: #fff;
        }

        .tab-switcher button:not(.active):hover {
            background: var(--color-cream);
        }

        /* ── Tab Content ── */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Form Elements ── */
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            background: #fff;
            color: #1a1a1a;
            transition: border-color 0.2s;
        }

        select:focus, input[type="number"]:focus, textarea:focus {
            outline: none;
            border-color: var(--color-green);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Inter', monospace;
        }

        /* ── Line-by-Line Form Grid ── */
        .bearing-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .bearing-form .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--color-gold);
            color: var(--color-green-dark);
        }

        .btn-primary:hover {
            background: var(--color-gold-light);
        }

        .btn-secondary {
            background: var(--color-green);
            color: #fff;
        }

        .btn-secondary:hover {
            background: var(--color-green-light);
        }

        .btn-danger {
            background: #c0392b;
            color: #fff;
        }

        .btn-danger:hover {
            background: #e74c3c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-green);
            color: var(--color-green);
        }

        .btn-outline:hover {
            background: var(--color-cream);
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .btn {
            flex: 1;
        }

        /* ── Line List ── */
        #lineList {
            min-height: 60px;
            border: 1px dashed #ccc;
            border-radius: 4px;
            padding: 8px;
            background: var(--color-cream);
        }

        #lineList:empty::before {
            content: "No lines added yet.";
            color: #999;
            font-size: 0.8rem;
            font-style: italic;
        }

        .section-label {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--color-green-dark);
            padding-bottom: 4px;
            border-bottom: 2px solid var(--color-gold);
            margin-bottom: 4px;
        }

        /* ── Right Panel (Canvas) ── */
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--color-cream);
            min-width: 0;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #plotCanvas {
            width: 100%;
            height: 100%;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: block;
        }

        /* ── Closure Status Bar ── */
        .closure-bar {
            padding: 10px 16px;
            background: var(--color-green-dark);
            color: var(--color-cream);
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .closure-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
        }

        .closure-bar .status-dot.closed {
            background: #27ae60;
        }

        .closure-bar .status-dot.open {
            background: var(--color-gold);
        }

        /* ── Footer ── */
        footer {
            background: var(--color-green-dark);
            color: var(--color-cream);
            text-align: center;
            padding: 12px 16px;
            font-size: 0.75rem;
            opacity: 0.9;
            flex-shrink: 0;
        }

        /* ── Mobile Responsive (< 768px) ── */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                overflow: auto;
            }

            .panel-left {
                width: 100%;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid #ddd;
                max-height: none;
            }

            .panel-right {
                min-height: 400px;
            }

            header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>JHI Plot Plotter</h1>
        <a href="../index.html">&larr; Back to JHI</a>
    </header>

    <!-- Main App -->
    <div class="app-container">

        <!-- Left Panel: Input -->
        <div class="panel-left">
            <div class="panel-left-inner">

                <!-- Tab Switcher -->
                <div class="tab-switcher">
                    <button class="active" onclick="switchTab('lineByLine')" id="tabLineByLine">Line by Line</button>
                    <button onclick="switchTab('paste')" id="tabPaste">Paste</button>
                </div>

                <!-- Tab: Line by Line -->
                <div class="tab-content active" id="lineByLineTab">
                    <div class="bearing-form">
                        <div class="form-group">
                            <label for="dir1">Direction 1</label>
                            <select id="dir1">
                                <option value="N">N (North)</option>
                                <option value="S">S (South)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="degrees">Degrees</label>
                            <input type="number" id="degrees" min="0" max="90" step="1" placeholder="0-90">
                        </div>
                        <div class="form-group">
                            <label for="minutes">Minutes</label>
                            <input type="number" id="minutes" min="0" max="59" step="1" placeholder="0-59">
                        </div>
                        <div class="form-group">
                            <label for="dir2">Direction 2</label>
                            <select id="dir2">
                                <option value="E">E (East)</option>
                                <option value="W">W (West)</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="distance">Distance (meters)</label>
                            <input type="number" id="distance" min="0" step="0.01" placeholder="e.g. 25.50">
                        </div>
                        <div class="full-width">
                            <button class="btn btn-primary" style="width:100%;" onclick="addLine()">Add Line</button>
                        </div>
                    </div>
                </div>

                <!-- Tab: Paste -->
                <div class="tab-content" id="pasteTab">
                    <div class="form-group">
                        <label for="pasteInput">Technical Description</label>
                        <textarea id="pasteInput" placeholder="Paste the full technical description here...&#10;&#10;Example:&#10;N. 45 deg. 30 min. E., 25.00 m. to point 2;&#10;S. 12 deg. 15 min. W., 18.75 m. to point 3;"></textarea>
                    </div>
                    <button class="btn btn-secondary" style="width:100%; margin-top: 8px;" onclick="parseDescription()">Parse</button>
                </div>

                <!-- Line List -->
                <div class="section-label">Lines</div>
                <div id="lineList"></div>

                <!-- Action Buttons -->
                <div class="button-row">
                    <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
                    <button class="btn btn-outline" onclick="downloadPNG()">Download PNG</button>
                </div>

            </div>
        </div>

        <!-- Right Panel: Canvas -->
        <div class="panel-right">
            <div class="canvas-wrapper">
                <canvas id="plotCanvas"></canvas>
            </div>
            <div class="closure-bar">
                <span class="status-dot"></span>
                <span id="closureStatus">No lines plotted</span>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>&copy; 2026 Januarius Holdings, Inc.</footer>

</body>

</html>
