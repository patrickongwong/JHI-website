<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHI Lot Plotter</title>
    <link rel="icon" type="image/png" href="../assets/wheel.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ── Brand Colors ── */
        :root {
            --color-green-dark: #1a472a;
            --color-green: #2d6a4f;
            --color-gold: #c9a84c;
            --color-cream: #f5f1e8;
            --color-gold-light: #e0c872;
            --color-green-light: #40916c;
        }

        /* ── Reset & Base ── */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--color-cream);
            color: #1a1a1a;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: var(--color-green-dark);
            color: var(--color-cream);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        header a {
            color: var(--color-gold);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        header a:hover {
            color: var(--color-gold-light);
        }

        /* ── Main Layout ── */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left Panel (Input) ── */
        .panel-left {
            width: 400px;
            min-width: 320px;
            background: #fff;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .panel-left-inner {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Tab Switcher ── */
        .tab-switcher {
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--color-green);
        }

        .tab-switcher button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: #fff;
            color: var(--color-green);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .tab-switcher button.active {
            background: var(--color-green);
            color: #fff;
        }

        .tab-switcher button:not(.active):hover {
            background: var(--color-cream);
        }

        /* ── Tab Content ── */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Form Elements ── */
        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        select, input[type="number"], textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            background: #fff;
            color: #1a1a1a;
            transition: border-color 0.2s;
        }

        select:focus, input[type="number"]:focus, textarea:focus {
            outline: none;
            border-color: var(--color-green);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Inter', monospace;
        }

        /* ── Line-by-Line Form Grid ── */
        .bearing-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .bearing-form .full-width {
            grid-column: 1 / -1;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--color-gold);
            color: var(--color-green-dark);
        }

        .btn-primary:hover {
            background: var(--color-gold-light);
        }

        .btn-secondary {
            background: var(--color-green);
            color: #fff;
        }

        .btn-secondary:hover {
            background: var(--color-green-light);
        }

        .btn-danger {
            background: #c0392b;
            color: #fff;
        }

        .btn-danger:hover {
            background: #e74c3c;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--color-green);
            color: var(--color-green);
        }

        .btn-outline:hover {
            background: var(--color-cream);
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .btn {
            flex: 1;
        }

        /* ── Line List ── */
        #lineList {
            min-height: 60px;
            border: 1px dashed #ccc;
            border-radius: 4px;
            padding: 8px;
            background: var(--color-cream);
        }

        #lineList:empty::before {
            content: "No lines added yet.";
            color: #999;
            font-size: 0.8rem;
            font-style: italic;
        }

        .section-label {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--color-green-dark);
            padding-bottom: 4px;
            border-bottom: 2px solid var(--color-gold);
            margin-bottom: 4px;
        }

        /* ── Right Panel (Canvas) ── */
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--color-cream);
            min-width: 0;
        }

        .canvas-wrapper {
            flex: 1;
            position: relative;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #plotCanvas {
            width: 100%;
            height: 100%;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            display: block;
        }

        /* ── Closure Status Bar ── */
        .closure-bar {
            padding: 10px 16px;
            background: var(--color-green-dark);
            color: var(--color-cream);
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .closure-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
        }

        .closure-bar .status-dot.closed {
            background: #27ae60;
        }

        .closure-bar .status-dot.open {
            background: var(--color-gold);
        }

        /* ── Footer ── */
        footer {
            background: var(--color-green-dark);
            color: var(--color-cream);
            text-align: center;
            padding: 12px 16px;
            font-size: 0.75rem;
            opacity: 0.9;
            flex-shrink: 0;
        }

        /* ── Mobile Responsive (< 768px) ── */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
                overflow: auto;
            }

            .panel-left {
                width: 100%;
                min-width: 0;
                border-right: none;
                border-bottom: 1px solid #ddd;
                max-height: none;
            }

            .panel-right {
                min-height: 400px;
            }

            header h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>JHI Lot Plotter</h1>
        <a href="../index.html">&larr; Back to JHI</a>
    </header>

    <!-- Main App -->
    <div class="app-container">

        <!-- Left Panel: Input -->
        <div class="panel-left">
            <div class="panel-left-inner">

                <!-- Bearing Input Form -->
                <div>
                    <div class="bearing-form">
                        <div class="form-group">
                            <label for="dir1">Direction 1</label>
                            <select id="dir1">
                                <option value="N">N (North)</option>
                                <option value="S">S (South)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="degrees">Degrees</label>
                            <input type="number" id="degrees" min="0" max="90" step="1" placeholder="0-90">
                        </div>
                        <div class="form-group">
                            <label for="minutes">Minutes</label>
                            <input type="number" id="minutes" min="0" max="59" step="1" placeholder="0-59">
                        </div>
                        <div class="form-group">
                            <label for="dir2">Direction 2</label>
                            <select id="dir2">
                                <option value="E">E (East)</option>
                                <option value="W">W (West)</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label for="distance">Distance (meters)</label>
                            <input type="number" id="distance" min="0" step="0.01" placeholder="e.g. 25.50">
                        </div>
                        <div class="full-width">
                            <button class="btn btn-primary" style="width:100%;" onclick="addLine()">Add Line</button>
                        </div>
                    </div>
                </div>

                <!-- Line List -->
                <div class="section-label">Lines</div>
                <div id="lineList"></div>

                <!-- Action Buttons -->
                <div class="button-row">
                    <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
                    <button class="btn btn-outline" onclick="downloadPNG()">Download PNG</button>
                </div>

            </div>
        </div>

        <!-- Right Panel: Canvas -->
        <div class="panel-right">
            <div class="canvas-wrapper">
                <canvas id="plotCanvas"></canvas>
            </div>
            <div class="closure-bar">
                <span class="status-dot"></span>
                <span id="closureStatus">No lines plotted</span>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer>&copy; 2026 Januarius Holdings, Inc.</footer>

    <!-- JavaScript -->
    <script>
        // ── State ──
        let lines = [];

        // ── Tab Switching ──
        function switchTab(tab) {
            document.getElementById('lineByLineTab').classList.toggle('active', tab === 'lineByLine');
            document.getElementById('pasteTab').classList.toggle('active', tab === 'paste');
            document.getElementById('tabLineByLine').classList.toggle('active', tab === 'lineByLine');
            document.getElementById('tabPaste').classList.toggle('active', tab === 'paste');
        }

        // ── Add a single bearing line ──
        function addLine() {
            const dir1 = document.getElementById('dir1').value;
            const deg = parseInt(document.getElementById('degrees').value, 10);
            const min = parseInt(document.getElementById('minutes').value, 10);
            const dir2 = document.getElementById('dir2').value;
            const dist = parseFloat(document.getElementById('distance').value);

            // Validate
            if (isNaN(deg) || deg < 0 || deg > 90) {
                alert('Degrees must be between 0 and 90.');
                return;
            }
            if (isNaN(min) || min < 0 || min > 59) {
                alert('Minutes must be between 0 and 59.');
                return;
            }
            if (isNaN(dist) || dist <= 0) {
                alert('Distance must be greater than 0.');
                return;
            }

            lines.push({ dir1, deg, min, dir2, dist });
            renderLineList();
            drawPlot();

            // Clear form
            document.getElementById('degrees').value = '';
            document.getElementById('minutes').value = '';
            document.getElementById('distance').value = '';
        }

        // ── Delete a line ──
        function deleteLine(index) {
            lines.splice(index, 1);
            renderLineList();
            drawPlot();
        }

        // ── Move a line up or down ──
        function moveLine(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= lines.length) return;
            const temp = lines[index];
            lines[index] = lines[newIndex];
            lines[newIndex] = temp;
            renderLineList();
            drawPlot();
        }

        // ── Render the editable line list ──
        function renderLineList() {
            const container = document.getElementById('lineList');
            if (lines.length === 0) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = lines.map((l, i) => {
                const label = `${i + 1}. ${l.dir1} ${l.deg}\u00b0${l.min}' ${l.dir2} \u2014 ${l.dist.toFixed(2)} m`;
                const upDisabled = i === 0 ? 'opacity:0.3;pointer-events:none;' : '';
                const downDisabled = i === lines.length - 1 ? 'opacity:0.3;pointer-events:none;' : '';
                return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #eee;font-size:0.85rem;">
                    <span>${label}</span>
                    <span style="display:flex;gap:2px;">
                        <button onclick="moveLine(${i},-1)" style="background:none;border:none;cursor:pointer;font-size:0.8rem;${upDisabled}" title="Move up">▲</button>
                        <button onclick="moveLine(${i},1)" style="background:none;border:none;cursor:pointer;font-size:0.8rem;${downDisabled}" title="Move down">▼</button>
                        <button onclick="deleteLine(${i})" style="background:none;border:none;cursor:pointer;font-size:1rem;" title="Delete">🗑</button>
                    </span>
                </div>`;
            }).join('');
        }

        // ── Bearing to math angle (radians) ──
        function bearingToAngle(dir1, deg, min, dir2) {
            const angle = deg + min / 60;
            let azimuth;
            if (dir1 === 'N' && dir2 === 'E') azimuth = angle;
            else if (dir1 === 'N' && dir2 === 'W') azimuth = 360 - angle;
            else if (dir1 === 'S' && dir2 === 'E') azimuth = 180 - angle;
            else /* S-W */ azimuth = 180 + angle;
            return (90 - azimuth) * Math.PI / 180;
        }

        // ── Compute points from lines ──
        function computePoints() {
            const points = [{ x: 0, y: 0 }];
            for (const l of lines) {
                const prev = points[points.length - 1];
                const angle = bearingToAngle(l.dir1, l.deg, l.min, l.dir2);
                points.push({
                    x: prev.x + l.dist * Math.cos(angle),
                    y: prev.y + l.dist * Math.sin(angle)
                });
            }
            return points;
        }

        // ── Draw the plot on canvas ──
        function drawPlot() {
            const canvas = document.getElementById('plotCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;

            // Clear with cream background
            ctx.fillStyle = '#f5f1e8';
            ctx.fillRect(0, 0, W, H);

            if (lines.length === 0) {
                updateClosureStatus(null);
                return;
            }

            const points = computePoints();
            const padding = 60;

            // Bounding box
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            for (const p of points) {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            }

            const rangeX = maxX - minX || 1;
            const rangeY = maxY - minY || 1;
            const scale = Math.min((W - 2 * padding) / rangeX, (H - 2 * padding) / rangeY);

            // Transform: math coords to screen coords (flip Y)
            function toScreen(p) {
                return {
                    x: padding + (p.x - minX) * scale,
                    y: H - padding - (p.y - minY) * scale
                };
            }

            // Draw north arrow (top-right corner)
            const arrowX = W - 40;
            const arrowY = 30;
            ctx.strokeStyle = '#1a472a';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY + 30);
            ctx.lineTo(arrowX, arrowY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(arrowX - 6, arrowY + 10);
            ctx.lineTo(arrowX, arrowY);
            ctx.lineTo(arrowX + 6, arrowY + 10);
            ctx.stroke();
            ctx.fillStyle = '#1a472a';
            ctx.font = 'bold 14px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('N', arrowX, arrowY + 46);

            // Draw line segments
            ctx.strokeStyle = '#2d6a4f';
            ctx.lineWidth = 2;
            for (let i = 0; i < lines.length; i++) {
                const a = toScreen(points[i]);
                const b = toScreen(points[i + 1]);
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();

                // Midpoint label
                const mx = (a.x + b.x) / 2;
                const my = (a.y + b.y) / 2;
                const l = lines[i];
                const bearingText = `${l.dir1} ${l.deg}\u00b0${l.min}' ${l.dir2}`;
                const distText = `${l.dist.toFixed(2)} m`;
                ctx.fillStyle = '#333';
                ctx.font = '10px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(bearingText, mx, my - 6);
                ctx.fillText(distText, mx, my + 6);
            }

            // Draw points and labels
            for (let i = 0; i < points.length; i++) {
                const s = toScreen(points[i]);
                ctx.beginPath();
                ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#c9a84c';
                ctx.fill();
                ctx.strokeStyle = '#1a472a';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.fillStyle = '#1a472a';
                ctx.font = 'bold 11px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${i + 1}`, s.x + 7, s.y - 7);
            }

            // Closure
            if (lines.length >= 2) {
                const last = points[points.length - 1];
                const first = points[0];
                const dx = last.x - first.x;
                const dy = last.y - first.y;
                const error = Math.sqrt(dx * dx + dy * dy);

                const sLast = toScreen(last);
                const sFirst = toScreen(first);

                if (error < 0.10) {
                    // Closed — solid line
                    ctx.strokeStyle = '#2d6a4f';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.moveTo(sLast.x, sLast.y);
                    ctx.lineTo(sFirst.x, sFirst.y);
                    ctx.stroke();
                } else {
                    // Open — dashed red line
                    ctx.strokeStyle = '#c0392b';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 4]);
                    ctx.beginPath();
                    ctx.moveTo(sLast.x, sLast.y);
                    ctx.lineTo(sFirst.x, sFirst.y);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                updateClosureStatus(error);
            } else {
                updateClosureStatus(null);
            }
        }

        // ── Update closure status bar ──
        function updateClosureStatus(error) {
            const dot = document.querySelector('.closure-bar .status-dot');
            const label = document.getElementById('closureStatus');

            if (error === null) {
                dot.className = 'status-dot';
                dot.style.background = '#999';
                label.textContent = lines.length < 2 ? 'Add at least 2 lines' : 'No lines plotted';
                return;
            }

            if (error < 0.10) {
                dot.className = 'status-dot closed';
                dot.style.background = '';
                label.textContent = `Plot CLOSED \u2014 Error: ${error.toFixed(2)} m`;
            } else if (error < 1.0) {
                dot.className = 'status-dot';
                dot.style.background = '#f1c40f';
                label.textContent = `Nearly closed \u2014 Error: ${error.toFixed(2)} m`;
            } else {
                dot.className = 'status-dot open';
                dot.style.background = '';
                label.textContent = `Plot OPEN \u2014 Error: ${error.toFixed(2)} m`;
            }
        }

        // ── Parse pasted technical description ──
        function parseDescription() {
            const text = document.getElementById('pasteInput').value;
            const pattern = /([NS])\.?\s*(\d+)\s*(?:deg\.?|\u00b0)\s*(\d+)\s*(?:min\.?|['\u2032])\s*([EW])\.?\s*[,.]?\s*(\d+\.?\d*)\s*(?:m\.?|meters?)/gi;
            let match;
            let count = 0;
            while ((match = pattern.exec(text)) !== null) {
                lines.push({
                    dir1: match[1].toUpperCase(),
                    deg: parseInt(match[2], 10),
                    min: parseInt(match[3], 10),
                    dir2: match[4].toUpperCase(),
                    dist: parseFloat(match[5])
                });
                count++;
            }
            if (count === 0) {
                alert('No lines found. Check the format and try again.');
                return;
            }
            alert(`Parsed ${count} line(s).`);
            renderLineList();
            drawPlot();
        }

        // ── Download canvas as PNG ──
        function downloadPNG() {
            const canvas = document.getElementById('plotCanvas');
            const link = document.createElement('a');
            link.download = 'plot.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // ── Clear all lines and reset ──
        function clearAll() {
            lines = [];
            renderLineList();
            const canvas = document.getElementById('plotCanvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f5f1e8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            updateClosureStatus(null);
        }

        // ── Canvas Resize Handler ──
        function resizeCanvas() {
            const canvas = document.getElementById('plotCanvas');
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth - 32;
            canvas.height = wrapper.clientHeight - 32;
            drawPlot();
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);
    </script>

</body>

</html>
